// ================= STEP GRATE HYDRAULIC TIMING PANEL =================
function StepGratePanel() {
  const [stroke, setStroke] = useState(175);

  // Fuel type & moisture (biomass only — this furnace/grate is a solid-fuel feed)
  const biomassFuels = FUEL_PRESETS.filter(f => f.kind === "biomass");
  const [fuelLabel, setFuelLabel] = useState(biomassFuels[0].label);
  const [hhvDryKcal, setHhvDryKcal] = useState(biomassFuels[0].hhvDry_kcal);
  const [moisturePct, setMoisturePct] = useState(biomassFuels[0].moisture);
  const [hDryPct, setHDryPct] = useState(biomassFuels[0].hDry);
  const [bulkDensity, setBulkDensity] = useState(biomassFuels[0].bulkDensity);

  const onSelectFuel = (label) => {
    setFuelLabel(label);
    const f = biomassFuels.find(x => x.label === label);
    setHhvDryKcal(f.hhvDry_kcal); setMoisturePct(f.moisture); setHDryPct(f.hDry); setBulkDensity(f.bulkDensity);
  };

  // Boiler capacity -> required firing rate (real heat balance, same method as Fuel Consumption tab)
  const [boilerCapacityTPH, setBoilerCapacityTPH] = useState(10);
  const [steamPressureBar, setSteamPressureBar] = useState(10);
  const [feedwaterTemp, setFeedwaterTemp] = useState(80);
  const [boilerEff, setBoilerEff] = useState(80);

  const firing = useMemo(() => {
    const steamFlow = boilerCapacityTPH * 1000;
    const pBarA = steamPressureBar + 1.01325;
    const steam = steamLookupByPressure(pBarA);
    const hf = feedwaterTemp * 4.186;
    const dutyPerKg = steam.hg - hf;
    const dutyTotal_kJhr = steamFlow * dutyPerKg;
    const lhv_kJkg = lhvAsFiredKJkg(hhvDryKcal, moisturePct, hDryPct);
    const fuelEnergyNeeded_kJhr = dutyTotal_kJhr / (boilerEff / 100);
    const firingRate_kgHr = fuelEnergyNeeded_kJhr / lhv_kJkg;
    return { steamTsat: steam.T, hg: steam.hg, hf, dutyPerKg, dutyTotal_kW: dutyTotal_kJhr / 3600, lhv_kcalkg: lhv_kJkg / KCAL_TO_KJ, firingRate_kgHr };
  }, [boilerCapacityTPH, steamPressureBar, feedwaterTemp, boilerEff, hhvDryKcal, moisturePct, hDryPct]);

  // Grate bed geometry -> suggested Zone 1 speed, from the computed firing rate
  const [grateWidth, setGrateWidth] = useState(2.0);
  const [bedDepth, setBedDepth] = useState(150);

  const suggestedSpeed = useMemo(() => {
    const speed_mHr = firing.firingRate_kgHr / (bulkDensity * grateWidth * (bedDepth / 1000));
    return (speed_mHr * 1000) / 60;
  }, [firing.firingRate_kgHr, bulkDensity, grateWidth, bedDepth]);

  // Feed mechanism
  const [feedType, setFeedType] = useState("screw"); // 'screw' | 'hydraulic'
  const [numScrews, setNumScrews] = useState(4);
  const [ramStroke, setRamStroke] = useState(300);
  const [ramPushSec, setRamPushSec] = useState(6);
  const [ramRetractSec, setRamRetractSec] = useState(5);
  const [ramDwellSec, setRamDwellSec] = useState(20);
  const [ramCrossSection, setRamCrossSection] = useState(0.15);

  const feedCalc = useMemo(() => {
    if (feedType === "screw") {
      const perScrewRate = firing.firingRate_kgHr / numScrews;
      return { perScrewRate };
    } else {
      const cycleTime = ramPushSec + ramRetractSec + ramDwellSec;
      const pushesPerHour = 3600 / cycleTime;
      const volumePerPush_m3 = ramCrossSection * (ramStroke / 1000);
      const massPerPush_kg = volumePerPush_m3 * bulkDensity;
      const deliveredRate_kgHr = massPerPush_kg * pushesPerHour;
      return { cycleTime, pushesPerHour, massPerPush_kg, deliveredRate_kgHr };
    }
  }, [feedType, firing.firingRate_kgHr, numScrews, ramPushSec, ramRetractSec, ramDwellSec, ramStroke, ramCrossSection, bulkDensity]);

  const [zones, setZones] = useState([
    { id: "z1", label: "Zone 1 — Drying", length: 2.0, residence: 8, pushSec: 5, retractSec: 4 },
    { id: "z2", label: "Zone 2 — Combustion", length: 2.5, residence: 6, pushSec: 5, retractSec: 4 },
    { id: "z3", label: "Zone 3 — Burnout", length: 1.5, residence: 4, pushSec: 5, retractSec: 4 },
  ]);
  const updateZone = (id, field, val) => setZones(zones.map(z => (z.id === id ? { ...z, [field]: val } : z)));

  const results = useMemo(() => {
    return zones.map(z => {
      const zoneLength_mm = z.length * 1000;
      const requiredSpeed_mmMin = zoneLength_mm / z.residence;
      const cycleTime_sec = (stroke / requiredSpeed_mmMin) * 60;
      const dwellTime_sec = cycleTime_sec - z.pushSec - z.retractSec;
      const pushesPerHour = 3600 / cycleTime_sec;
      const strokesToTraverse = zoneLength_mm / stroke;
      const feasible = dwellTime_sec >= 0;
      return { ...z, requiredSpeed_mmMin, cycleTime_sec, dwellTime_sec, pushesPerHour, strokesToTraverse, feasible };
    });
  }, [zones, stroke]);

  const totalLength = zones.reduce((s, z) => s + z.length, 0);
  const totalResidence = zones.reduce((s, z) => s + z.residence, 0);
  const anyInfeasible = results.some(r => !r.feasible);

  return (
    <div>
      <StickyResults items={[
        { label: "Firing rate", value: fmt(firing.firingRate_kgHr,0), unit: "kg/hr" },
        { label: "Total residence", value: fmt(totalResidence,1), unit: "min" },
        ...(anyInfeasible ? [{ label: "Timing", value: "infeasible", unit: "", warn: true }] : []),
      ]} />

      <Plate title="Inputs">
        <SubHeader>Fuel type & moisture</SubHeader>
        <Select label="Fuel" value={fuelLabel} onChange={onSelectFuel} options={biomassFuels.map(f => ({ label: f.label }))} />
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="HHV, dry basis" unit="kcal/kg" step="50" value={hhvDryKcal} onChange={setHhvDryKcal} />
          <Field label="Moisture content" unit="% as-fired" step="1" value={moisturePct} onChange={setMoisturePct} hint="Biggest single lever on both LHV and required firing rate — use the actual batch value if known." />
        </div>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Hydrogen, dry basis" unit="%" step="0.5" value={hDryPct} onChange={setHDryPct} />
          <Field label="Bulk density" unit="kg/m³" step="10" value={bulkDensity} onChange={setBulkDensity} hint="Varies a lot by fuel — PKS/pellets are dense, rice husk is very light." />
        </div>
        <Readout label="LHV as-fired" value={fmt(firing.lhv_kcalkg,0)} unit="kcal/kg" />

        <SubHeader>Boiler duty → required firing rate</SubHeader>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Boiler capacity" unit="TPH steam" step="0.5" value={boilerCapacityTPH} onChange={setBoilerCapacityTPH} hint="Sized 3–15 TPH range." />
          <Field label="Steam pressure" unit="barg" step="0.5" value={steamPressureBar} onChange={setSteamPressureBar} />
        </div>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Feedwater temp." unit="°C" step="1" value={feedwaterTemp} onChange={setFeedwaterTemp} />
          <Field label="Boiler efficiency" unit="%" step="1" value={boilerEff} onChange={setBoilerEff} hint="Typical 75–83% for biomass grate-fired." />
        </div>
        <Readout label="Heat duty" value={fmt(firing.dutyTotal_kW,0)} unit="kW" />
        <Readout label="Required firing rate" value={fmt(firing.firingRate_kgHr,0)} unit="kg/hr" big />

        <SubHeader>Grate bed geometry</SubHeader>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Grate width" unit="m" step="0.1" value={grateWidth} onChange={setGrateWidth} />
          <Field label="Average bed depth" unit="mm" step="10" value={bedDepth} onChange={setBedDepth} />
        </div>
        <Readout label="Suggested Zone 1 speed" value={fmt(suggestedSpeed,1)} unit="mm/min" big />

        <SubHeader>Fuel feed mechanism</SubHeader>
        <div className="flex gap-2 mb-3">
          <button onClick={() => setFeedType("screw")} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${feedType === "screw" ? "bg-amber-500 text-neutral-950 border-amber-500" : "border-neutral-700 text-neutral-300"}`}>Screw conveyors (VFD)</button>
          <button onClick={() => setFeedType("hydraulic")} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${feedType === "hydraulic" ? "bg-sky-500 text-neutral-950 border-sky-500" : "border-neutral-700 text-neutral-300"}`}>Hydraulic ram pusher</button>
        </div>
        {feedType === "screw" ? (
          <Field label="Number of screws" unit="units" step="1" value={numScrews} onChange={setNumScrews} hint="Typically 3–6 units across the grate width, each on its own VFD." />
        ) : (
          <>
            <div className="grid grid-cols-2 gap-x-3">
              <Field label="Ram stroke" unit="mm" step="10" value={ramStroke} onChange={setRamStroke} />
              <Field label="Ram cross-section" unit="m²" step="0.01" value={ramCrossSection} onChange={setRamCrossSection} hint="Feed chute/ram bore area." />
            </div>
            <div className="grid grid-cols-3 gap-x-2">
              <Field label="Push" unit="sec" step="0.5" value={ramPushSec} onChange={setRamPushSec} />
              <Field label="Retract" unit="sec" step="0.5" value={ramRetractSec} onChange={setRamRetractSec} />
              <Field label="Dwell" unit="sec" step="0.5" value={ramDwellSec} onChange={setRamDwellSec} />
            </div>
          </>
        )}

        <SubHeader>Zone settings</SubHeader>
        {zones.map((z) => (
          <div key={z.id} className="border border-neutral-800 rounded p-3 mb-3">
            <TextField label="Zone label" value={z.label} onChange={(v) => updateZone(z.id, "label", v)} />
            <div className="grid grid-cols-2 gap-x-3">
              <Field label="Zone length" unit="m" step="0.1" value={z.length} onChange={(v) => updateZone(z.id, "length", v)} />
              <Field label="Desired residence time" unit="min" step="0.5" value={z.residence} onChange={(v) => updateZone(z.id, "residence", v)} />
            </div>
            <div className="grid grid-cols-2 gap-x-3">
              <Field label="Push (extend) time" unit="sec" step="0.5" value={z.pushSec} onChange={(v) => updateZone(z.id, "pushSec", v)} hint="Hydraulic cylinder forward stroke time." />
              <Field label="Retract time" unit="sec" step="0.5" value={z.retractSec} onChange={(v) => updateZone(z.id, "retractSec", v)} />
            </div>
          </div>
        ))}
      </Plate>

      <Plate title="Feed mechanism result">
        {feedType === "screw" ? (
          <>
            <Readout label="Required capacity per screw" value={fmt(feedCalc.perScrewRate,0)} unit="kg/hr" big />
            <div className="mt-2 text-[10px] text-neutral-500 leading-relaxed">
              Use the Screw Conveyor tab to size each screw's diameter/speed/motor for this per-unit capacity.
              With VFD on each, you get fine feed-rate trim per screw — useful for balancing bed depth across
              the grate width, not just overall throughput.
            </div>
          </>
        ) : (
          <>
            <Readout label="Cycle time" value={fmt(feedCalc.cycleTime,1)} unit="sec" />
            <Readout label="Pushes per hour" value={fmt(feedCalc.pushesPerHour,1)} unit="strokes/hr" />
            <Readout label="Mass delivered per push" value={fmt(feedCalc.massPerPush_kg,1)} unit="kg" />
            <Readout label="Delivered feed rate" value={fmt(feedCalc.deliveredRate_kgHr,0)} unit="kg/hr" big />
            <Readout label="Required firing rate" value={fmt(firing.firingRate_kgHr,0)} unit="kg/hr" />
            {Math.abs(feedCalc.deliveredRate_kgHr - firing.firingRate_kgHr) / firing.firingRate_kgHr > 0.1 && (
              <div className="mt-2 text-[11px] text-amber-400 bg-amber-950/30 border border-amber-900 rounded px-2 py-1.5">
                Delivered rate is more than 10% off the required firing rate — adjust dwell time to close the gap.
              </div>
            )}
          </>
        )}
      </Plate>

      <Plate title="Feed mechanism — engineering trade-offs">
        <div className="text-xs text-neutral-300 leading-relaxed space-y-2">
          <p><span className="font-bold text-sky-400">Multiple VFD screws (3–6 units):</span> feed is continuous
          and independently trimmable per screw, which lets you balance fuel distribution across the grate
          <em> width</em> — a common real problem with single-point feeding is the center of the grate running
          fuel-rich while the edges starve for fuel and run excess air. Continuous feed also avoids the
          "feast-famine" cycling that pulsed feeding can cause, generally giving steadier bed temperature and
          more complete combustion with lower CO/unburned carbon. Trade-off: screws don't tolerate oversized
          pieces, tramp metal, or very stringy/wet material well, and each screw is a wear/maintenance point.</p>
          <p><span className="font-bold text-amber-400">Hydraulic ram pusher:</span> more tolerant of irregular,
          oversized, or bulky fuel (wood slabs, larger pieces) since it pushes rather than augers. Feed is
          inherently pulsed rather than continuous — each stroke delivers a "slug" of fuel, which can cause
          periodic bed-depth and temperature fluctuation if strokes are too large or infrequent. This is
          manageable with small strokes and frequent pushes (approximating continuous feed), but gives coarser
          feed-rate control than a VFD screw, and typically only feeds from one point rather than distributing
          across width unless multiple rams are installed.</p>
          <p><span className="font-bold text-neutral-100">On "more complete combustion":</span> the mechanism
          itself doesn't combust anything — the outcome depends on how <em>steady</em> and <em>evenly
          distributed</em> the resulting feed is. A well-tuned multi-screw system usually has an edge for
          this specifically because of continuous, width-distributed feed; a ram system can perform
          comparably if sized with a small stroke and high push frequency relative to the fuel's residence
          time in Zone 1. Both approaches are used successfully across the 3–15 TPH range — the choice is
          often driven as much by fuel characteristics (size, moisture, stringiness) and cost/maintenance
          preference as by combustion performance alone.</p>
        </div>
      </Plate>

      <Plate title="Hydraulic timing result">
        {results.map((r) => (
          <div key={r.id} className="border-b border-neutral-800 last:border-0 py-3">
            <div className="text-sm font-bold text-neutral-100 mb-1">{r.label}</div>
            <Readout label="Required grate speed" value={fmt(r.requiredSpeed_mmMin,1)} unit="mm/min" />
            <Readout label="Cycle time (push→push)" value={fmt(r.cycleTime_sec,1)} unit="sec" big />
            <Readout label="Required dwell (pause) time" value={fmt(r.dwellTime_sec,1)} unit="sec" big />
            <Readout label="Pushes per hour" value={fmt(r.pushesPerHour,1)} unit="strokes/hr" />
            <Readout label="Strokes to traverse zone" value={fmt(r.strokesToTraverse,1)} unit="strokes" />
            {!r.feasible && (
              <div className="mt-2 text-[11px] text-red-400 bg-red-950/40 border border-red-900 rounded px-2 py-1.5">
                Push + retract time alone ({fmt(r.pushSec + r.retractSec,1)}s) exceeds the cycle time needed
                for this residence time — this speed isn't achievable with the current hydraulic cylinder
                speed. Either speed up the push/retract stroke, shorten this zone, or accept a longer residence time.
              </div>
            )}
          </div>
        ))}
      </Plate>

      <div className="text-[10px] text-neutral-500 leading-relaxed px-1">
        Each zone's push frequency (dwell time) is the actual PLC/hydraulic timer setting you'd tune on site —
        stroke and push/retract speed are usually fixed by the cylinder and hydraulic pump, so dwell time is
        the practical control lever for residence time. In real operation, final dwell times are commonly
        trimmed against observed flame front position, grate O2, and ash burnout quality rather than held
        rigidly to a calculated value — treat this as a commissioning starting point.
      </div>
    </div>
  );
}

function bhpFromDuty(capacityKgHr, pressureBarG, feedwaterTempC) {
  const pBarA = pressureBarG + 1.01325;
  const steam = steamLookupByPressure(pBarA);
  const hf = feedwaterTempC * 4.186;
  const dutyPerKg = steam.hg - hf;
  const dutyTotal_kJhr = capacityKgHr * dutyPerKg;
  const equivEvap_kgHr = dutyTotal_kJhr / 2257;
  const bhp = equivEvap_kgHr / 15.65;
  return { dutyTotal_kW: dutyTotal_kJhr / 3600, equivEvap_kgHr, bhp };
}

function KVRow({ item, onChangeKey, onChangeVal, onRemove }) {
  return (
    <div className="flex gap-2 mb-2 items-start">
      <input type="text" value={item.key} onChange={(e) => onChangeKey(e.target.value)} placeholder="Item"
        className="flex-1 bg-neutral-900 border border-neutral-700 focus:border-amber-500 focus:outline-none rounded px-2 py-1.5 text-neutral-100 text-xs" />
      <input type="text" value={item.value} onChange={(e) => onChangeVal(e.target.value)} placeholder="Value/spec"
        className="flex-[1.4] bg-neutral-900 border border-neutral-700 focus:border-amber-500 focus:outline-none rounded px-2 py-1.5 text-neutral-100 text-xs" />
      <button onClick={onRemove} className="text-neutral-500 hover:text-red-400 text-xs px-1 pt-2">✕</button>
    </div>
  );
}

function newId() { return Math.random().toString(36).slice(2); }
function hydrateRows(rows) { return (rows || []).map(r => ({ id: newId(), ...r })); }
function hydrateEquip(sections) {
  return (sections || []).map(s => ({
    id: newId(), title: s.title,
    specs: hydrateRows(s.specs), materials: hydrateRows(s.materials), nozzles: hydrateRows(s.nozzles),
  }));
}

  const [docNo, setDocNo] = useState("");
  const [rev, setRev] = useState("0");
  const [dateStr, setDateStr] = useState("");

  const [modelLine, setModelLine] = useState("CBD_STEP");
  const t0 = MODEL_TEMPLATES.CBD_STEP;

  const [model, setModel] = useState(t0.model);
  const [boilerType, setBoilerType] = useState(t0.boilerType);
  const [capacityKgHr, setCapacityKgHr] = useState(t0.capacityKgHr);
  const [pressureBarG, setPressureBarG] = useState(t0.pressureBarG);
  const [feedwaterTemp, setFeedwaterTemp] = useState(t0.feedwaterTemp);
  const [designCode, setDesignCode] = useState(t0.designCode);
  const [efficiencyPct, setEfficiencyPct] = useState(t0.efficiencyPct);
  const [fuelTypeDesc, setFuelTypeDesc] = useState(t0.fuelTypeDesc);
  const [controlsDesc, setControlsDesc] = useState(t0.controlsDesc);
  const [isBiomass, setIsBiomass] = useState(t0.isBiomass);

  const bhpCalc = useMemo(() => bhpFromDuty(capacityKgHr, pressureBarG, feedwaterTemp), [capacityKgHr, pressureBarG, feedwaterTemp]);

  const [perfGuarantee, setPerfGuarantee] = useState("");
  const defaultPerfGuarantee = `Supplier guarantees the system shall continuously produce ${fmt(capacityKgHr,0)} kg/h saturated steam at ${fmt(pressureBarG,1)} bar(g) using the specified design fuel (at average moisture%) at overall boiler-island efficiency of ${fmt(efficiencyPct,0)}% (Direct Method, ASME PTC-4). If unmet, Supplier will rectify and re-test.`;

  const [mainComponents, setMainComponents] = useState(hydrateRows(t0.mainComponents));
  const [fuelRows, setFuelRows] = useState(hydrateRows(t0.fuelRows));
  const [emissionRows, setEmissionRows] = useState(hydrateRows(t0.emissionRows));
  const [storageRows, setStorageRows] = useState(hydrateRows(t0.storageRows));
  const [techSpecRows, setTechSpecRows] = useState(hydrateRows(t0.techSpecRows));
  const [feedwaterRows, setFeedwaterRows] = useState(hydrateRows(t0.feedwaterRows));
  const [powerSupply, setPowerSupply] = useState(t0.powerSupply);
  const [controlInterface, setControlInterface] = useState(t0.controlInterface);
  const [combustionControlText, setCombustionControlText] = useState(t0.combustionControlText);
  const [feedwaterPumpControlText, setFeedwaterPumpControlText] = useState(t0.feedwaterPumpControlText);
  const [interlockRows, setInterlockRows] = useState(hydrateRows(t0.interlockRows));
  const [equipSections, setEquipSections] = useState(hydrateEquip(t0.equipSections));

  const [ownerScope, setOwnerScope] = useState(t0.ownerScope);
  const [manufacturerScope, setManufacturerScope] = useState(t0.manufacturerScope);
  const [validityDays, setValidityDays] = useState(t0.validityDays);
  const [deliveryDays, setDeliveryDays] = useState(t0.deliveryDays);
  const [installationDays, setInstallationDays] = useState(t0.installationDays);
  const [paymentRows, setPaymentRows] = useState(hydrateRows(t0.paymentRows));
  const [warrantyYears, setWarrantyYears] = useState(t0.warrantyYears);
  const [warrantyText, setWarrantyText] = useState(t0.warrantyText);

  const applyTemplate = (key) => {
    const t = MODEL_TEMPLATES[key];
    setModelLine(key);
    setModel(t.model); setBoilerType(t.boilerType);
    setCapacityKgHr(t.capacityKgHr); setPressureBarG(t.pressureBarG); setFeedwaterTemp(t.feedwaterTemp);
    setDesignCode(t.designCode); setEfficiencyPct(t.efficiencyPct);
    setFuelTypeDesc(t.fuelTypeDesc); setControlsDesc(t.controlsDesc); setIsBiomass(t.isBiomass);
    setPerfGuarantee("");
    setMainComponents(hydrateRows(t.mainComponents));
    setFuelRows(hydrateRows(t.fuelRows));
    setEmissionRows(hydrateRows(t.emissionRows));
    setStorageRows(hydrateRows(t.storageRows));
    setTechSpecRows(hydrateRows(t.techSpecRows));
    setFeedwaterRows(hydrateRows(t.feedwaterRows));
    setPowerSupply(t.powerSupply); setControlInterface(t.controlInterface);
    setCombustionControlText(t.combustionControlText); setFeedwaterPumpControlText(t.feedwaterPumpControlText);
    setInterlockRows(hydrateRows(t.interlockRows));
    setEquipSections(hydrateEquip(t.equipSections));
    setOwnerScope(t.ownerScope); setManufacturerScope(t.manufacturerScope);
    setValidityDays(t.validityDays); setDeliveryDays(t.deliveryDays); setInstallationDays(t.installationDays);
    setPaymentRows(hydrateRows(t.paymentRows)); setWarrantyYears(t.warrantyYears); setWarrantyText(t.warrantyText);
  };

  const addEquipSection = () => setEquipSections([...equipSections, { id: newId(), title: "New Equipment", specs: [], materials: [], nozzles: [] }]);
  const removeEquipSection = (id) => setEquipSections(equipSections.filter(s => s.id !== id));
  const updateEquipTitle = (id, title) => setEquipSections(equipSections.map(s => (s.id === id ? { ...s, title } : s)));

  const addSpecLine = (secId) => setEquipSections(equipSections.map(s => (s.id === secId ? { ...s, specs: [...s.specs, { id: newId(), key: "", value: "" }] } : s)));
  const removeSpecLine = (secId, lineId) => setEquipSections(equipSections.map(s => (s.id === secId ? { ...s, specs: s.specs.filter(l => l.id !== lineId) } : s)));
  const updateSpecLine = (secId, lineId, field, val) => setEquipSections(equipSections.map(s => (s.id === secId ? { ...s, specs: s.specs.map(l => (l.id === lineId ? { ...l, [field]: val } : l)) } : s)));

  const listOps = (list, setList) => ({
    add: (row) => setList([...list, { id: newId(), ...row }]),
    remove: (id) => setList(list.filter(r => r.id !== id)),
    update: (id, field, val) => setList(list.map(r => (r.id === id ? { ...r, [field]: val } : r))),
  });

  const mainCompOps = listOps(mainComponents, setMainComponents);
  const fuelOps = listOps(fuelRows, setFuelRows);
  const emissionOps = listOps(emissionRows, setEmissionRows);
  const storageOps = listOps(storageRows, setStorageRows);
  const techSpecOps = listOps(techSpecRows, setTechSpecRows);
  const feedwaterOps = listOps(feedwaterRows, setFeedwaterRows);
  const interlockOps = listOps(interlockRows, setInterlockRows);
  const paymentOps = listOps(paymentRows, setPaymentRows);

  return (
    <div>
      <style>{`
        @page { size: A4; margin: 12mm; }
        @media print {
          .no-print { display: none !important; }
          .print-sheet { display: block !important; }
          body { background: white; }
          .print-sheet table { page-break-inside: avoid; }
          .print-sheet .print-section { page-break-inside: avoid; }
        }
        .print-sheet { display: none; }
      `}</style>

      <div className="no-print flex justify-end mb-3">
        <button onClick={() => window.print()} className="px-4 py-2 rounded text-xs font-bold uppercase tracking-wide bg-emerald-600 text-white hover:bg-emerald-500">
          🖨 Print / Save as PDF
        </button>
      </div>

      <div className="no-print">
        <StickyResults items={[
          { label: "Model line", value: MODEL_TEMPLATES[modelLine].label.split(" — ")[0], unit: "" },
          { label: "Capacity", value: fmt(capacityKgHr,0), unit: "kg/hr" },
          { label: "BHP", value: fmt(bhpCalc.bhp,1), unit: "BHP" },
        ]} />

        <Plate title="Model line">
          <div className="grid grid-cols-1 gap-2 mb-1">
            {Object.keys(MODEL_TEMPLATES).map((key) => (
              <button key={key} onClick={() => applyTemplate(key)}
                className={`py-2 px-3 rounded text-xs font-semibold text-left border ${modelLine === key ? "bg-amber-500 text-neutral-950 border-amber-500" : "border-neutral-700 text-neutral-300"}`}>
                {MODEL_TEMPLATES[key].label}
              </button>
            ))}
          </div>
          <div className="text-[10px] text-neutral-500 mt-2 leading-relaxed">
            Switching model line replaces all fields below with that model's starting template — any edits
            you've made will be overwritten, so switch first, then customize for the project.
          </div>
        </Plate>

        <Plate title="Identification">
          <div className="grid grid-cols-2 gap-x-3">
            <TextField label="Client" value={client} onChange={setClient} />
            <TextField label="Project name" value={projectName} onChange={setProjectName} />
          </div>
          <div className="grid grid-cols-3 gap-x-2">
            <TextField label="Document no." value={docNo} onChange={setDocNo} />
            <TextField label="Rev." value={rev} onChange={setRev} />
            <TextField label="Date" value={dateStr} onChange={setDateStr} placeholder="DD/MM/YYYY" />
          </div>
        </Plate>

        <Plate title="Boiler system overview">
          <TextField label="Model" value={model} onChange={setModel} />
          <TextField label="Type" value={boilerType} onChange={setBoilerType} />
          <div className="grid grid-cols-2 gap-x-3">
            <Field label="Capacity" unit="kg/hr steam" step="50" value={capacityKgHr} onChange={setCapacityKgHr} />
            <Field label="Design pressure" unit="barg" step="0.5" value={pressureBarG} onChange={setPressureBarG} />
          </div>
          <Field label="Feedwater temperature (for BHP calc)" unit="°C" step="1" value={feedwaterTemp} onChange={setFeedwaterTemp} />
          <TextField label="Design code / certification" value={designCode} onChange={setDesignCode} area />
          <Field label="Efficiency" unit="% (Direct Method, ASME PTC-4)" step="1" value={efficiencyPct} onChange={setEfficiencyPct} />
          <TextField label="Fuel type description" value={fuelTypeDesc} onChange={setFuelTypeDesc} />
          <TextField label="Controls description" value={controlsDesc} onChange={setControlsDesc} />
          <Readout label="Heat duty" value={fmt(bhpCalc.dutyTotal_kW,0)} unit="kW" />
          <Readout label="Equivalent evaporation" value={fmt(bhpCalc.equivEvap_kgHr,0)} unit="kg/hr (f&a 100°C)" />
          <Readout label="Boiler Horsepower (BHP)" value={fmt(bhpCalc.bhp,1)} unit="BHP" big />
        </Plate>

        <Plate title="Performance guarantee">
          <TextField label="Statement (auto-drafted, edit freely)" value={perfGuarantee || defaultPerfGuarantee} onChange={setPerfGuarantee} area />
        </Plate>

        {mainComponents.length > 0 && (
          <Plate title="Main system components">
            {mainComponents.map((r) => (
              <div key={r.id} className="border border-neutral-800 rounded p-2 mb-2 relative">
                <button onClick={() => mainCompOps.remove(r.id)} className="absolute top-1 right-1 text-neutral-500 hover:text-red-400 text-xs px-1">✕</button>
                <TextField label="Category" value={r.key} onChange={(v) => mainCompOps.update(r.id, "key", v)} />
                <TextField label="Key equipment" value={r.value} onChange={(v) => mainCompOps.update(r.id, "value", v)} area />
              </div>
            ))}
            <button onClick={() => mainCompOps.add({ key: "", value: "" })} className="w-full py-2 rounded text-xs font-semibold uppercase tracking-wide border border-neutral-700 text-neutral-300 hover:border-amber-500">+ Add row</button>
          </Plate>
        )}

        <Plate title="Scope of work">
          <TextField label="Project Owner scope" value={ownerScope} onChange={setOwnerScope} area />
          <TextField label="Manufacturer scope" value={manufacturerScope} onChange={setManufacturerScope} area />
        </Plate>

        <Plate title={isBiomass ? "Fuel and heat balance" : "Fuel consumption"}>
          {fuelRows.map((r) => (
            <div key={r.id} className="border border-neutral-800 rounded p-2 mb-2 relative">
              <button onClick={() => fuelOps.remove(r.id)} className="absolute top-1 right-1 text-neutral-500 hover:text-red-400 text-xs px-1">✕</button>
              <TextField label="Fuel type" value={r.fuel} onChange={(v) => fuelOps.update(r.id, "fuel", v)} />
              <div className="grid grid-cols-2 gap-x-2">
                <Field label="LHV" unit="kcal/kg" value={r.lhv} onChange={(v) => fuelOps.update(r.id, "lhv", v)} />
                <Field label="Required fuel" unit="kg/hr" value={r.req} onChange={(v) => fuelOps.update(r.id, "req", v)} />
              </div>
              {isBiomass && (
                <div className="grid grid-cols-2 gap-x-2">
                  <TextField label="Moisture %" value={r.moisture} onChange={(v) => fuelOps.update(r.id, "moisture", v)} />
                  <TextField label="Ash %" value={r.ash} onChange={(v) => fuelOps.update(r.id, "ash", v)} />
                </div>
              )}
            </div>
          ))}
          <button onClick={() => fuelOps.add({ fuel: "", lhv: isBiomass ? 3000 : 11000, req: 1000, moisture: "", ash: "" })} className="w-full py-2 rounded text-xs font-semibold uppercase tracking-wide border border-neutral-700 text-neutral-300 hover:border-amber-500">+ Add fuel row</button>
        </Plate>

        {emissionRows.length > 0 && (
          <Plate title="Emission guarantees at stack">
            {emissionRows.map((r) => <KVRow key={r.id} item={r} onChangeKey={(v) => emissionOps.update(r.id, "key", v)} onChangeVal={(v) => emissionOps.update(r.id, "value", v)} onRemove={() => emissionOps.remove(r.id)} />)}
            <button onClick={() => emissionOps.add({ key: "", value: "" })} className="w-full py-2 rounded text-xs font-semibold uppercase tracking-wide border border-neutral-700 text-neutral-300 hover:border-amber-500">+ Add row</button>
          </Plate>
        )}

        {storageRows.length > 0 && (
          <Plate title={isBiomass ? "Fuel storage design" : "Fuel supply / storage"}>
            {storageRows.map((r) => (
              <div key={r.id} className="border border-neutral-800 rounded p-2 mb-2 relative">
                <button onClick={() => storageOps.remove(r.id)} className="absolute top-1 right-1 text-neutral-500 hover:text-red-400 text-xs px-1">✕</button>
                <TextField label="Fuel" value={r.fuel} onChange={(v) => storageOps.update(r.id, "fuel", v)} />
                <div className="grid grid-cols-2 gap-x-2">
                  <TextField label="Handling/Moving floor" value={r.movingFloor} onChange={(v) => storageOps.update(r.id, "movingFloor", v)} />
                  <TextField label="Storage capacity" value={r.storage} onChange={(v) => storageOps.update(r.id, "storage", v)} />
                </div>
              </div>
            ))}
            <button onClick={() => storageOps.add({ fuel: "", movingFloor: "", storage: "" })} className="w-full py-2 rounded text-xs font-semibold uppercase tracking-wide border border-neutral-700 text-neutral-300 hover:border-amber-500">+ Add row</button>
          </Plate>
        )}

        <Plate title="Technical specification">
          {techSpecRows.map((r) => <KVRow key={r.id} item={r} onChangeKey={(v) => techSpecOps.update(r.id, "key", v)} onChangeVal={(v) => techSpecOps.update(r.id, "value", v)} onRemove={() => techSpecOps.remove(r.id)} />)}
          <button onClick={() => techSpecOps.add({ key: "", value: "" })} className="w-full py-2 rounded text-xs font-semibold uppercase tracking-wide border border-neutral-700 text-neutral-300 hover:border-amber-500">+ Add row</button>
        </Plate>

        <Plate title="Recommended feedwater property">
          {feedwaterRows.map((r) => <KVRow key={r.id} item={r} onChangeKey={(v) => feedwaterOps.update(r.id, "key", v)} onChangeVal={(v) => feedwaterOps.update(r.id, "value", v)} onRemove={() => feedwaterOps.remove(r.id)} />)}
          <button onClick={() => feedwaterOps.add({ key: "", value: "" })} className="w-full py-2 rounded text-xs font-semibold uppercase tracking-wide border border-neutral-700 text-neutral-300 hover:border-amber-500">+ Add row</button>
        </Plate>

        <Plate title="Control system & safety">
          <TextField label="Main power supply" value={powerSupply} onChange={setPowerSupply} />
          <TextField label="Control interface" value={controlInterface} onChange={setControlInterface} area />
          <TextField label="Combustion control" value={combustionControlText} onChange={setCombustionControlText} area />
          <TextField label="Feedwater pump control" value={feedwaterPumpControlText} onChange={setFeedwaterPumpControlText} area />
          <SubHeader>Interlocks & alarms</SubHeader>
          {interlockRows.map((r) => (
            <div key={r.id} className="border border-neutral-800 rounded p-2 mb-2 relative">
              <button onClick={() => interlockOps.remove(r.id)} className="absolute top-1 right-1 text-neutral-500 hover:text-red-400 text-xs px-1">✕</button>
              <TextField label="Condition" value={r.condition} onChange={(v) => interlockOps.update(r.id, "condition", v)} />
              <TextField label="Trigger" value={r.trigger} onChange={(v) => interlockOps.update(r.id, "trigger", v)} />
              <TextField label="Response" value={r.response} onChange={(v) => interlockOps.update(r.id, "response", v)} />
            </div>
          ))}
          <button onClick={() => interlockOps.add({ condition: "", trigger: "", response: "" })} className="w-full py-2 rounded text-xs font-semibold uppercase tracking-wide border border-neutral-700 text-neutral-300 hover:border-amber-500">+ Add interlock</button>
        </Plate>

        <Plate title="Commercial terms & warranty">
          <div className="grid grid-cols-3 gap-x-2">
            <Field label="Validity" unit="days" value={validityDays} onChange={setValidityDays} />
            <Field label="Delivery" unit="days" value={deliveryDays} onChange={setDeliveryDays} />
            <Field label="Installation" unit="days" value={installationDays} onChange={setInstallationDays} />
          </div>
          <SubHeader>Payment milestones</SubHeader>
          {paymentRows.map((r) => (
            <div key={r.id} className="border border-neutral-800 rounded p-2 mb-2 relative">
              <button onClick={() => paymentOps.remove(r.id)} className="absolute top-1 right-1 text-neutral-500 hover:text-red-400 text-xs px-1">✕</button>
              <div className="grid grid-cols-2 gap-x-2">
                <TextField label="Milestone" value={r.milestone} onChange={(v) => paymentOps.update(r.id, "milestone", v)} />
                <TextField label="%" value={r.pct} onChange={(v) => paymentOps.update(r.id, "pct", v)} />
              </div>
              <TextField label="Description" value={r.desc} onChange={(v) => paymentOps.update(r.id, "desc", v)} area />
            </div>
          ))}
          <button onClick={() => paymentOps.add({ milestone: "", pct: "", desc: "" })} className="w-full py-2 mb-3 rounded text-xs font-semibold uppercase tracking-wide border border-neutral-700 text-neutral-300 hover:border-amber-500">+ Add milestone</button>
          <SubHeader>Warranty</SubHeader>
          <Field label="Warranty period" unit="years" value={warrantyYears} onChange={setWarrantyYears} />
          <TextField label="Warranty terms" value={warrantyText} onChange={setWarrantyText} area />
        </Plate>

        <Plate title="Equipment sections">
          <div className="text-[10px] text-neutral-500 mb-3 leading-relaxed">
            One card per major piece of equipment. Each has free-form specs, and optional material/nozzle
            tables for pressure-part equipment. Pre-filled per model line — edit numbers/text for the new
            project, or add/remove entire sections.
          </div>
          {equipSections.map((sec) => (
            <div key={sec.id} className="border border-neutral-700 rounded p-3 mb-4 relative">
              <button onClick={() => removeEquipSection(sec.id)} className="absolute top-2 right-2 text-neutral-500 hover:text-red-400 text-xs px-1">✕ remove section</button>
              <TextField label="Section title" value={sec.title} onChange={(v) => updateEquipTitle(sec.id, v)} />
              <SubHeader>Specs</SubHeader>
              {sec.specs.map((l) => (
                <KVRow key={l.id} item={l} onChangeKey={(v) => updateSpecLine(sec.id, l.id, "key", v)} onChangeVal={(v) => updateSpecLine(sec.id, l.id, "value", v)} onRemove={() => removeSpecLine(sec.id, l.id)} />
              ))}
              <button onClick={() => addSpecLine(sec.id)} className="w-full py-1.5 mb-2 rounded text-[10px] font-semibold uppercase tracking-wide border border-neutral-700 text-neutral-300 hover:border-amber-500">+ Add spec line</button>

              {sec.materials.length > 0 && (
                <>
                  <SubHeader>Material list</SubHeader>
                  {sec.materials.map((m) => (
                    <div key={m.id} className="grid grid-cols-5 gap-1 mb-1 text-[10px]">
                      <input value={m.desc} onChange={(e) => setEquipSections(equipSections.map(s => s.id === sec.id ? { ...s, materials: s.materials.map(x => x.id === m.id ? { ...x, desc: e.target.value } : x) } : s))} placeholder="Description" className="bg-neutral-900 border border-neutral-700 rounded px-1.5 py-1 text-neutral-100 col-span-2" />
                      <input value={m.material} onChange={(e) => setEquipSections(equipSections.map(s => s.id === sec.id ? { ...s, materials: s.materials.map(x => x.id === m.id ? { ...x, material: e.target.value } : x) } : s))} placeholder="Material" className="bg-neutral-900 border border-neutral-700 rounded px-1.5 py-1 text-neutral-100" />
                      <input value={m.thk} onChange={(e) => setEquipSections(equipSections.map(s => s.id === sec.id ? { ...s, materials: s.materials.map(x => x.id === m.id ? { ...x, thk: e.target.value } : x) } : s))} placeholder="Thickness" className="bg-neutral-900 border border-neutral-700 rounded px-1.5 py-1 text-neutral-100" />
                      <button onClick={() => setEquipSections(equipSections.map(s => s.id === sec.id ? { ...s, materials: s.materials.filter(x => x.id !== m.id) } : s))} className="text-neutral-500 hover:text-red-400">✕</button>
                    </div>
                  ))}
                </>
              )}
              {sec.nozzles.length > 0 && (
                <>
                  <SubHeader>Nozzle table</SubHeader>
                  {sec.nozzles.map((n) => (
                    <div key={n.id} className="grid grid-cols-4 gap-1 mb-1 text-[10px]">
                      <input value={n.desc} onChange={(e) => setEquipSections(equipSections.map(s => s.id === sec.id ? { ...s, nozzles: s.nozzles.map(x => x.id === n.id ? { ...x, desc: e.target.value } : x) } : s))} placeholder="Description" className="bg-neutral-900 border border-neutral-700 rounded px-1.5 py-1 text-neutral-100 col-span-2" />
                      <input value={n.tag} onChange={(e) => setEquipSections(equipSections.map(s => s.id === sec.id ? { ...s, nozzles: s.nozzles.map(x => x.id === n.id ? { ...x, tag: e.target.value } : x) } : s))} placeholder="Tag" className="bg-neutral-900 border border-neutral-700 rounded px-1.5 py-1 text-neutral-100" />
                      <input value={n.size} onChange={(e) => setEquipSections(equipSections.map(s => s.id === sec.id ? { ...s, nozzles: s.nozzles.map(x => x.id === n.id ? { ...x, size: e.target.value } : x) } : s))} placeholder="Size" className="bg-neutral-900 border border-neutral-700 rounded px-1.5 py-1 text-neutral-100" />
                    </div>
                  ))}
                </>
              )}
            </div>
          ))}
          <button onClick={addEquipSection} className="w-full py-2 rounded text-xs font-semibold uppercase tracking-wide border border-neutral-700 text-neutral-300 hover:border-amber-500">+ Add equipment section</button>
        </Plate>
      </div>

      <div className="print-sheet text-black bg-white p-6" style={{ fontFamily: "Arial, sans-serif" }}>
        <div className="border-b-2 border-black pb-2 mb-3">
          <div className="text-lg font-bold">{model}</div>
          <div className="text-xs">{boilerType}</div>
          <div className="text-xs mt-1">Client: {client || "—"} | Project: {projectName || "—"} | Doc: {docNo || "—"} Rev.{rev} | Date: {dateStr || "—"}</div>
        </div>

        <div className="font-bold text-sm mb-1">BOILER SYSTEM OVERVIEW</div>
        <table className="w-full text-xs mb-3" style={{ borderCollapse: "collapse" }}>
          <tbody>
            <tr><td className="border border-black px-2 py-1 font-bold w-1/4">Capacity</td><td className="border border-black px-2 py-1 w-1/4">{fmt(capacityKgHr,0)} kg/h @ {fmt(pressureBarG,1)} barg</td>
                <td className="border border-black px-2 py-1 font-bold w-1/4">BHP</td><td className="border border-black px-2 py-1 w-1/4">{fmt(bhpCalc.bhp,1)} BHP</td></tr>
            <tr><td className="border border-black px-2 py-1 font-bold">Design Code</td><td className="border border-black px-2 py-1" colSpan="3">{designCode}</td></tr>
            <tr><td className="border border-black px-2 py-1 font-bold">Efficiency</td><td className="border border-black px-2 py-1">{fmt(efficiencyPct,0)}% (Direct Method, ASME PTC-4)</td>
                <td className="border border-black px-2 py-1 font-bold">Fuel</td><td className="border border-black px-2 py-1">{fuelTypeDesc}</td></tr>
            <tr><td className="border border-black px-2 py-1 font-bold">Controls</td><td className="border border-black px-2 py-1" colSpan="3">{controlsDesc}</td></tr>
          </tbody>
        </table>

        <div className="font-bold text-sm mb-1">PERFORMANCE GUARANTEE</div>
        <div className="text-xs mb-3 border border-black p-2">{perfGuarantee || defaultPerfGuarantee}</div>

        {mainComponents.length > 0 && (
          <>
            <div className="font-bold text-sm mb-1">MAIN SYSTEM COMPONENTS</div>
            <table className="w-full text-xs mb-3" style={{ borderCollapse: "collapse" }}>
              <thead><tr><th className="border border-black px-2 py-1 w-1/3">Category</th><th className="border border-black px-2 py-1">Key Equipment</th></tr></thead>
              <tbody>{mainComponents.map((r,i) => <tr key={i}><td className="border border-black px-2 py-1 font-bold">{r.key}</td><td className="border border-black px-2 py-1">{r.value}</td></tr>)}</tbody>
            </table>
          </>
        )}

        <div className="font-bold text-sm mb-1">SCOPE OF WORK</div>
        <table className="w-full text-xs mb-3" style={{ borderCollapse: "collapse" }}>
          <tbody>
            <tr><td className="border border-black px-2 py-1 font-bold w-1/2 align-top">Project Owner Scope</td><td className="border border-black px-2 py-1 font-bold w-1/2 align-top">Manufacturer Scope</td></tr>
            <tr><td className="border border-black px-2 py-1 align-top" style={{whiteSpace:"pre-line"}}>{ownerScope}</td><td className="border border-black px-2 py-1 align-top" style={{whiteSpace:"pre-line"}}>{manufacturerScope}</td></tr>
          </tbody>
        </table>

        <div className="font-bold text-sm mb-1">{isBiomass ? "FUEL AND HEAT BALANCE" : "FUEL CONSUMPTION"}</div>
        <table className="w-full text-xs mb-3" style={{ borderCollapse: "collapse" }}>
          <thead><tr><th className="border border-black px-2 py-1">Fuel</th><th className="border border-black px-2 py-1">LHV (kcal/kg)</th><th className="border border-black px-2 py-1">Req. Fuel (kg/hr)</th>{isBiomass && <><th className="border border-black px-2 py-1">Moisture</th><th className="border border-black px-2 py-1">Ash</th></>}</tr></thead>
          <tbody>{fuelRows.map((r,i) => <tr key={i}><td className="border border-black px-2 py-1">{r.fuel}</td><td className="border border-black px-2 py-1">{fmt(r.lhv,0)}</td><td className="border border-black px-2 py-1">{fmt(r.req,0)}</td>{isBiomass && <><td className="border border-black px-2 py-1">{r.moisture}</td><td className="border border-black px-2 py-1">{r.ash}</td></>}</tr>)}</tbody>
        </table>

        {emissionRows.length > 0 && (

// ================= GEOMETRY CALCULATOR HELPERS =================
const SHAPES = ["Rectangle", "Circle", "Triangle", "Ellipse", "Cube / Rectangular Prism", "Cylinder", "Sphere", "Cone", "Pyramid (rectangular base)", "Trapezoidal Prism"];

function geometryCalc(shape, d) {
  switch (shape) {
    case "Rectangle":
      return { primary: [["Area", d.L * d.W, "m²"]], secondary: [["Perimeter", 2 * (d.L + d.W), "m"]] };
    case "Circle":
      return { primary: [["Area", Math.PI * d.r * d.r, "m²"]], secondary: [["Circumference", 2 * Math.PI * d.r, "m"]] };
    case "Triangle":
      return { primary: [["Area", 0.5 * d.b * d.h, "m²"]], secondary: [] };
    case "Ellipse": {
      const peri = Math.PI * (3 * (d.a + d.b) - Math.sqrt((3 * d.a + d.b) * (d.a + 3 * d.b)));
      return { primary: [["Area", Math.PI * d.a * d.b, "m²"]], secondary: [["Perimeter (approx.)", peri, "m"]] };
    }
    case "Cube / Rectangular Prism":
      return {
        primary: [["Volume", d.L * d.W * d.H, "m³"]],
        secondary: [["Surface Area", 2 * (d.L * d.W + d.L * d.H + d.W * d.H), "m²"]],
      };
    case "Cylinder": {
      const vol = Math.PI * d.r * d.r * d.h;
      const lateral = 2 * Math.PI * d.r * d.h;
      const total = 2 * Math.PI * d.r * (d.r + d.h);
      return { primary: [["Volume", vol, "m³"]], secondary: [["Lateral Surface", lateral, "m²"], ["Total Surface", total, "m²"]] };
    }
    case "Sphere": {
      const vol = (4 / 3) * Math.PI * d.r ** 3;
      const surf = 4 * Math.PI * d.r * d.r;
      return { primary: [["Volume", vol, "m³"]], secondary: [["Surface Area", surf, "m²"]] };
    }
    case "Cone": {
      const vol = (1 / 3) * Math.PI * d.r * d.r * d.h;
      const slant = Math.sqrt(d.r * d.r + d.h * d.h);
      const lateral = Math.PI * d.r * slant;
      const total = Math.PI * d.r * (d.r + slant);
      return { primary: [["Volume", vol, "m³"]], secondary: [["Slant Height", slant, "m"], ["Lateral Surface", lateral, "m²"], ["Total Surface", total, "m²"]] };
    }
    case "Pyramid (rectangular base)": {
      const vol = (1 / 3) * d.L * d.W * d.h;
      return { primary: [["Volume", vol, "m³"]], secondary: [["Base Area", d.L * d.W, "m²"]] };
    }
    case "Trapezoidal Prism": {
      const area = 0.5 * (d.a + d.b) * d.h;
      const vol = area * d.depth;
      return { primary: [["Cross-section Area", area, "m²"], ["Volume", vol, "m³"]], secondary: [] };
    }
    default:
      return { primary: [], secondary: [] };
  }
}

const SHAPE_FIELDS = {
  "Rectangle": [["L", "Length", "m"], ["W", "Width", "m"]],
  "Circle": [["r", "Radius", "m"]],
  "Triangle": [["b", "Base", "m"], ["h", "Height", "m"]],
  "Ellipse": [["a", "Semi-major axis (a)", "m"], ["b", "Semi-minor axis (b)", "m"]],
  "Cube / Rectangular Prism": [["L", "Length", "m"], ["W", "Width", "m"], ["H", "Height", "m"]],
  "Cylinder": [["r", "Radius", "m"], ["h", "Height", "m"]],
  "Sphere": [["r", "Radius", "m"]],
  "Cone": [["r", "Base radius", "m"], ["h", "Height", "m"]],
  "Pyramid (rectangular base)": [["L", "Base length", "m"], ["W", "Base width", "m"], ["h", "Height", "m"]],
  "Trapezoidal Prism": [["a", "Top width (a)", "m"], ["b", "Bottom width (b)", "m"], ["h", "Trapezoid height", "m"], ["depth", "Extrusion depth", "m"]],
};

function GeometryCalculator() {
  const [shape, setShape] = useState("Cylinder");
  const [dims, setDims] = useState({ L: 2, W: 1.5, H: 1, r: 0.5, h: 2, b: 1, a: 1, depth: 3 });

  const updateDim = (key, val) => setDims({ ...dims, [key]: val });
  const result = useMemo(() => geometryCalc(shape, dims), [shape, dims]);

  return (
    <div>
      <Plate title="Shape">
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
          {SHAPES.map((s) => (
            <button key={s} onClick={() => setShape(s)} className={`py-2 px-2 rounded text-[11px] font-semibold border ${shape === s ? "bg-amber-500 text-neutral-950 border-amber-500" : "border-neutral-700 text-neutral-300"}`}>
              {s}
            </button>
          ))}
        </div>
      </Plate>

      <Plate title="Dimensions">
        <div className="grid grid-cols-2 gap-x-3">
          {SHAPE_FIELDS[shape].map(([key, label, unit]) => (
            <Field key={key} label={label} unit={unit} step="0.01" value={dims[key]} onChange={(v) => updateDim(key, v)} />
          ))}
        </div>
      </Plate>

      <Plate title="Result">
        {result.primary.map(([label, val, unit], i) => (
          <Readout key={i} label={label} value={fmt(val,4)} unit={unit} big />
        ))}
        {result.secondary.map(([label, val, unit], i) => (
          <Readout key={i} label={label} value={fmt(val,4)} unit={unit} />
        ))}
      </Plate>
      <div className="text-[10px] text-neutral-500 leading-relaxed px-1">
        Exact closed-form geometry (ellipse perimeter uses the standard Ramanujan approximation, accurate to
        well under 0.1% for any practical aspect ratio). All inputs in metres — for mm, divide by 1000 first
        or just treat the unit as whatever consistent length unit you're working in (results scale accordingly).
      </div>
    </div>
  );
}

// ================= STANDALONE STEAM TABLE PANEL =================
function SteamTableStandalonePanel() {
  const [steamMode, setSteamMode] = useState("byPressure");
  const [pressureInput, setPressureInput] = useState(9);
  const [pressureIsGauge, setPressureIsGauge] = useState(true);
  const [tempInput, setTempInput] = useState(175);

  const steam = useMemo(() => {
    if (steamMode === "byPressure") {
      const pBarA = pressureIsGauge ? pressureInput + 1.01325 : pressureInput;
      const r = steamLookupByPressure(pBarA);
      return { ...r, pBarA, hfg: r.hg - r.hf };
    } else {
      const r = steamLookupByTemperature(tempInput);
      return { ...r, T: tempInput, hfg: r.hg - r.hf };
    }
  }, [steamMode, pressureInput, pressureIsGauge, tempInput]);

  return (
    <div>
      <Plate title="Saturated steam table">
        <div className="flex gap-2 mb-3">
          <button onClick={() => setSteamMode("byPressure")} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${steamMode === "byPressure" ? "bg-amber-500 text-neutral-950 border-amber-500" : "border-neutral-700 text-neutral-300"}`}>By pressure</button>
          <button onClick={() => setSteamMode("byTemp")} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${steamMode === "byTemp" ? "bg-sky-500 text-neutral-950 border-sky-500" : "border-neutral-700 text-neutral-300"}`}>By temperature</button>
        </div>
        {steamMode === "byPressure" ? (
          <>
            <Field label="Pressure" unit={pressureIsGauge ? "barg" : "bara"} step="0.1" value={pressureInput} onChange={setPressureInput} />
            <button onClick={() => setPressureIsGauge(!pressureIsGauge)} className="text-[10px] text-sky-400 underline mb-2">
              Switch to {pressureIsGauge ? "absolute" : "gauge"}
            </button>
            <Readout label="Saturation temperature" value={fmt(steam.T,1)} unit="°C" big />
          </>
        ) : (
          <>
            <Field label="Temperature" unit="°C" step="1" value={tempInput} onChange={setTempInput} />
            <Readout label="Saturation pressure" value={fmt(steam.pBarA ?? steam.P,2)} unit="bar abs" big />
          </>
        )}
        <Readout label="hf (sat. liquid)" value={fmt(steam.hf,1)} unit="kJ/kg" />
        <Readout label="hg (sat. vapour)" value={fmt(steam.hg,1)} unit="kJ/kg" />
        <Readout label="hfg (latent heat)" value={fmt(steam.hfg,1)} unit="kJ/kg" />
        <Readout label="vg (specific volume)" value={fmt(steam.vg,4)} unit="m³/kg" />
        <div className="mt-2 text-[10px] text-neutral-500 leading-relaxed">
          Table interpolated from verified reference data (cross-checked against two independent published
          sources); exact at tabulated pressures, small interpolation error between — well under 1% across
          the 1–30 bar range most boiler work falls in.
        </div>
      </Plate>
    </div>
  );
}

        <path d="M12 3 L21 8 L12 13 L3 8 Z" />
        <path d="M3 13 L12 18 L21 13" />
        <path d="M3 17 L12 22 L21 17" />
      </svg>
    );
    case "steel": return (
      <svg {...p}>
        <line x1="4" y1="4" x2="20" y2="4" />
        <line x1="4" y1="20" x2="20" y2="20" />
        <line x1="12" y1="4" x2="12" y2="20" />
      </svg>
    );
    case "unitconv": return (
      <svg {...p}>
        <path d="M4 8 H18 M14 4 L18 8 L14 12" />
        <path d="M20 16 H6 M10 12 L6 16 L10 20" />
      </svg>
    );
    case "geometry": return (
      <svg {...p}>
        <rect x="3" y="9" width="18" height="6" rx="1" />
        <line x1="6" y1="9" x2="6" y2="12" />
        <line x1="9" y1="9" x2="9" y2="12" />
        <line x1="12" y1="9" x2="12" y2="13" />
        <line x1="15" y1="9" x2="15" y2="12" />
        <line x1="18" y1="9" x2="18" y2="12" />
      </svg>
    );
    case "steamtable": return (
      <svg {...p}>
        <path d="M12 2 C8 6 6 10 8 14 C9 16.5 12 18 12 18 C12 18 15 16.5 16 14 C18 10 16 6 12 2 Z" />
        <line x1="6" y1="20" x2="18" y2="20" />
      </svg>
    );
    case "bolttorque": return (
      <svg {...p}>
        <path d="M12 3 L19 7 V15 L12 19 L5 15 V7 Z" />
        <circle cx="12" cy="11" r="2.4" />
      </svg>
    );
    case "motorcable": return (
      <svg {...p}>
        <circle cx="10" cy="12" r="6" />
        <line x1="16" y1="10" x2="21" y2="10" />
        <line x1="16" y1="14" x2="21" y2="14" />
      </svg>
    );
    case "signalscale": return (
      <svg {...p}>
        <path d="M2 12 H6 L9 5 L13 19 L16 12 H22" />
      </svg>
    );
    default: return (
      <svg {...p}><circle cx="12" cy="12" r="8" /></svg>
    );
  }
}

const CATEGORY_COLORS = {
  "Conveyor & Material Handling": "text-sky-400 group-hover:border-sky-500",
  "Pressure Vessel": "text-violet-400 group-hover:border-violet-500",
  "Water Treatment": "text-cyan-400 group-hover:border-cyan-500",
  "Boiler Engineering": "text-orange-400 group-hover:border-orange-500",
  "Reference / Materials": "text-teal-400 group-hover:border-teal-500",
  "Electrical & Instrumentation": "text-amber-400 group-hover:border-amber-500",
};

function ToolboxHome({ onSelect }) {
  return (
    <div>
      <div className="mb-4 text-center">
        <h1 className="text-base font-bold text-neutral-50 tracking-tight">Engineering Toolbox</h1>
      </div>
      <div className="space-y-5">
        {TOOL_CATALOG.map((group) => (
          <div key={group.category}>
            <div className="text-[9px] uppercase tracking-wider text-neutral-500 font-bold mb-2 text-center">{group.category}</div>
            <div className="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 gap-3 justify-items-center">
              {group.tools.map((t) => (
                <button
                  key={t.id}
                  onClick={() => onSelect(t.id)}
                  title={t.desc}
                  className="group flex flex-col items-center gap-1"
                >
                  <div className={`w-14 h-14 rounded-2xl bg-neutral-900 border border-neutral-700 flex items-center justify-center transition-all group-hover:scale-105 group-active:scale-95 ${CATEGORY_COLORS[group.category]}`}>
                    <ToolIcon id={t.id} className="w-6 h-6" />
                  </div>
                  <span className="text-[10px] text-neutral-400 text-center leading-tight w-16">{t.name}</span>
                </button>
              ))}
            </div>
          </div>
        ))}
      </div>
      <div className="text-[9px] text-neutral-600 mt-4 text-center leading-snug">
        Preliminary sizing tools — confirm against manufacturer data and applicable codes before finalizing.
      </div>
    </div>
  );
}

function ConveyorSizingCalculator() {
  const [tab, setTab] = useState(null); // null = home screen
  const [sharedCapacityTPH, setSharedCapacityTPH] = useState(20);

  const currentTool = TOOL_CATALOG.flatMap((g) => g.tools).find((t) => t.id === tab);

  return (
    <div className="min-h-screen bg-neutral-950 text-neutral-100 p-4 md:p-6">
      <div className="max-w-5xl mx-auto">
        {tab === null ? (
          <ToolboxHome onSelect={setTab} />
        ) : (
          <>
            <div className="flex items-center gap-3 mb-5 border-b border-neutral-800 pb-4">
              <button
                onClick={() => setTab(null)}
                className="px-3 py-1.5 rounded text-xs font-bold uppercase tracking-wide border border-neutral-700 text-neutral-300 hover:border-amber-500 hover:text-amber-400 shrink-0"
              >
                ← Toolbox
              </button>
              <div className="min-w-0">
                <div className="text-[10px] uppercase tracking-[0.15em] text-neutral-500 font-semibold truncate">
                  {TOOL_CATALOG.find((g) => g.tools.some((t) => t.id === tab))?.category}
                </div>
                <h1 className="text-lg font-bold text-neutral-50 tracking-tight truncate">{currentTool?.name}</h1>
              </div>
            </div>

            {tab === "belt" ? (
              <BeltConveyorPanel capacityTPH={sharedCapacityTPH} setCapacityTPH={setSharedCapacityTPH} />
            ) : tab === "screw" ? (
              <ScrewConveyorPanel beltCapacityTPH={sharedCapacityTPH} />
            ) : tab === "silo" ? (
              <SiloHopperPanel />
            ) : tab === "tank" ? (
              <TankVesselPanel />
            ) : tab === "watertreatment" ? (
              <WaterTreatmentPanel />
            ) : tab === "boiler" ? (
              <BoilerPanel />
            ) : tab === "fuelconsumption" ? (
              <FuelConsumptionPanel />
            ) : tab === "stepgrate" ? (
              <StepGratePanel />
            ) : tab === "pressuredrop" ? (
              <SystemPressureDropPanel />
            ) : tab === "refractory" ? (
              <RefractoryPanel />
            ) : tab === "insulation" ? (
              <InsulationPanel />
            ) : tab === "specsheet" ? (
              <SpecSheetPanel />
            ) : tab === "steel" ? (
              <SteelPropertiesPanel />
            ) : tab === "unitconv" ? (
              <UnitConverterPanel />
            ) : tab === "bolttorque" ? (
              <BoltTorquePanel />
            ) : tab === "geometry" ? (
              <GeometryCalculator />
            ) : tab === "steamtable" ? (
              <SteamTableStandalonePanel />
            ) : tab === "motorcable" ? (
              <MotorCablePanel />
            ) : (
              <SignalScalingPanel />
            )}
          </>
        )}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(ConveyorSizingCalculator));
</script>
</body>
</html>
