function steamLookupByPressure(pBar) {
  const t = STEAM_TABLE;
  const clamp = pBar <= t[0][0] ? 0 : pBar >= t[t.length - 1][0] ? t.length - 2 : null;
  if (pBar <= t[0][0]) return { T: t[0][1], hf: t[0][2], hg: t[0][3], vg: t[0][4] };
  if (pBar >= t[t.length - 1][0]) { const l = t[t.length - 1]; return { T: l[1], hf: l[2], hg: l[3], vg: l[4] }; }
  for (let i = 0; i < t.length - 1; i++) {
    if (pBar >= t[i][0] && pBar <= t[i + 1][0]) {
      const f = (pBar - t[i][0]) / (t[i + 1][0] - t[i][0]);
      return { T: lerp(t[i][1], t[i + 1][1], f), hf: lerp(t[i][2], t[i + 1][2], f), hg: lerp(t[i][3], t[i + 1][3], f), vg: lerp(t[i][4], t[i + 1][4], f) };
    }
  }
}

function steamLookupByTemperature(tC) {
  const t = STEAM_TABLE;
  if (tC <= t[0][1]) return { P: t[0][0], hf: t[0][2], hg: t[0][3], vg: t[0][4] };
  if (tC >= t[t.length - 1][1]) { const l = t[t.length - 1]; return { P: l[0], hf: l[2], hg: l[3], vg: l[4] }; }
  for (let i = 0; i < t.length - 1; i++) {
    if (tC >= t[i][1] && tC <= t[i + 1][1]) {
      const f = (tC - t[i][1]) / (t[i + 1][1] - t[i][1]);
      return { P: lerp(t[i][0], t[i + 1][0], f), hf: lerp(t[i][2], t[i + 1][2], f), hg: lerp(t[i][3], t[i + 1][3], f), vg: lerp(t[i][4], t[i + 1][4], f) };
    }
  }
}

// Combustion & flue gas — rigorous molar balance from as-fired ultimate analysis (mass % incl. moisture/ash).
// Verified: pure-carbon case reproduces the classic CO2max=20.9% theoretical result; cross-checked
// against the widely-used EA=O2/(20.9-O2)*100 simplified relationship for the no-fuel-N2 case.
function combustionCalc(Cpct, Hpct, Opct, Npct, Spct, Mpct, EA) {
  const C = Cpct / 100, H = Hpct / 100, O = Opct / 100, N = Npct / 100, S = Spct / 100, M = Mpct / 100;
  const Ath = 11.5 * C + 34.5 * (H - O / 8) + 4.3 * S; // kg theoretical air / kg fuel
  const nCO2 = C / 12.011, nSO2 = S / 32.06, nH2Ocomb = H / 2.016, nH2Omoist = M / 18.015, nN2fuel = N / 28.014;
  const O2th = C / 12.011 + H / 4.032 + S / 32.06 - O / 32.0; // kmol O2 / kg fuel
  const DryAirTh = O2th / 0.209; // kmol dry air / kg fuel
  const O2excess = O2th * EA;
  const DryAirActual = DryAirTh * (1 + EA);
  const N2total = DryAirActual * 0.791 + nN2fuel;
  const DryTotal = nCO2 + nSO2 + O2excess + N2total;
  const WetTotal = DryTotal + nH2Ocomb + nH2Omoist;
  const flueGasMass = nCO2 * 44.01 + nSO2 * 64.06 + O2excess * 32 + N2total * 28.014 + (nH2Ocomb + nH2Omoist) * 18.015;
  return {
    Ath, Aactual: Ath * (1 + EA),
    CO2pct: (nCO2 / DryTotal) * 100,
    O2pct: (O2excess / DryTotal) * 100,
    N2pct: (N2total / DryTotal) * 100,
    SO2ppm: (nSO2 / DryTotal) * 1e6,
    H2Opct_wet: ((nH2Ocomb + nH2Omoist) / WetTotal) * 100,
    flueGasMass,
  };
}

function solveEAfromO2(Cpct, Hpct, Opct, Npct, Spct, Mpct, targetO2pct) {
  let lo = 0, hi = 3.0;
  for (let i = 0; i < 60; i++) {
    const mid = (lo + hi) / 2;
    const o2 = combustionCalc(Cpct, Hpct, Opct, Npct, Spct, Mpct, mid).O2pct;
    if (o2 < targetO2pct) lo = mid; else hi = mid;
  }
  return (lo + hi) / 2;
}

// ================= BOILER PANEL =================
function BoilerPanel() {
  // --- Combustion & flue gas ---
  const [Cpct, setCpct] = useState(28);
  const [Hpct, setHpct] = useState(3.4);
  const [Opct, setOpct] = useState(22.6);
  const [Npct, setNpct] = useState(0.3);
  const [Spct, setSpct] = useState(0.03);
  const [Mpct, setMpct] = useState(35);
  const [combMode, setCombMode] = useState("givenEA"); // 'givenEA' | 'givenO2'
  const [eaPct, setEaPct] = useState(30);
  const [measuredO2, setMeasuredO2] = useState(5);
  const [firingRate, setFiringRate] = useState(1000);

  const ashPct = 100 - (Cpct + Hpct + Opct + Npct + Spct + Mpct);
  const sumOk = ashPct >= -0.5 && ashPct <= 100;

  const comb = useMemo(() => {
    const EA = combMode === "givenEA" ? eaPct / 100 : solveEAfromO2(Cpct, Hpct, Opct, Npct, Spct, Mpct, measuredO2);
    const r = combustionCalc(Cpct, Hpct, Opct, Npct, Spct, Mpct, EA);
    const flueGasFlow_kgHr = r.flueGasMass * firingRate;
    return { ...r, EA, flueGasFlow_kgHr };
  }, [Cpct, Hpct, Opct, Npct, Spct, Mpct, combMode, eaPct, measuredO2, firingRate]);

  // --- Steam table ---
  const [steamMode, setSteamMode] = useState("byPressure");
  const [pressureInput, setPressureInput] = useState(9);
  const [pressureIsGauge, setPressureIsGauge] = useState(true);
  const [tempInput, setTempInput] = useState(175);
  const [feedwaterTempC, setFeedwaterTempC] = useState(80);

  const steam = useMemo(() => {
    if (steamMode === "byPressure") {
      const pBarA = pressureIsGauge ? pressureInput + 1.01325 : pressureInput;
      const r = steamLookupByPressure(pBarA);
      return { ...r, pBarA, hfg: r.hg - r.hf };
    } else {
      const r = steamLookupByTemperature(tempInput);
      return { ...r, T: tempInput, hfg: r.hg - r.hf };
    }
  }, [steamMode, pressureInput, pressureIsGauge, tempInput]);

  const feedwaterH = feedwaterTempC * 4.186; // approx subcooled liquid enthalpy, kJ/kg
  const evapDuty = steam.hg - feedwaterH; // kJ/kg feedwater -> steam at this pressure

  // --- Draft & fan sizing ---
  const [stackHeight, setStackHeight] = useState(20);
  const [ambientTempC, setAmbientTempC] = useState(33); // typical hot-season day, Thailand
  const [flueGasTempC, setFlueGasTempC] = useState(180);
  const [flueGasFlowInput, setFlueGasFlowInput] = useState(5000);
  const [systemResistancePa, setSystemResistancePa] = useState(1500);
  const [fanEff, setFanEff] = useState(0.7);
  const [fanServiceFactor, setFanServiceFactor] = useState(1.2);

  const draft = useMemo(() => {
    const Tamb = ambientTempC + 273.15, Tgas = flueGasTempC + 273.15;
    const Pa = stackHeight * 3464.6 * (1 / Tamb - 1 / Tgas);
    const rhoGas = 101325 / (287 * Tgas); // kg/m3, air-like approximation
    const Q_m3s = flueGasFlowInput / 3600 / rhoGas;
    const netResistance_Pa = Math.max(0, systemResistancePa - Pa);
    const P_kW_running = (Q_m3s * netResistance_Pa) / 1000 / fanEff;
    const P_kW = P_kW_running * fanServiceFactor;
    return { Pa, mmH2O: Pa / 9.81, rhoGas, Q_m3s, Q_m3hr: Q_m3s * 3600, netResistance_Pa, P_kW_running, P_kW, P_HP: P_kW / 0.7457 };
  }, [stackHeight, ambientTempC, flueGasTempC, flueGasFlowInput, systemResistancePa, fanEff, fanServiceFactor]);

  return (
    <div>
      <StickyResults items={[
        { label: "O2", value: fmt(comb.O2pct,2), unit: "%" },
        { label: "CO2", value: fmt(comb.CO2pct,2), unit: "%" },
        { label: "Steam Tsat", value: fmt(steam.T,1), unit: "°C" },
        { label: "Fan motor", value: fmt(nearestStandardMotor(draft.P_kW),2), unit: "kW" },
      ]} />

      <Plate title="Inputs — combustion & draft">
        <SubHeader>Fuel ultimate analysis (as-fired, wt%)</SubHeader>
        <div className="grid grid-cols-3 gap-x-2">
          <Field label="C" unit="%" step="0.1" value={Cpct} onChange={setCpct} />
          <Field label="H" unit="%" step="0.1" value={Hpct} onChange={setHpct} />
          <Field label="O" unit="%" step="0.1" value={Opct} onChange={setOpct} />
        </div>
        <div className="grid grid-cols-3 gap-x-2">
          <Field label="N" unit="%" step="0.01" value={Npct} onChange={setNpct} />
          <Field label="S" unit="%" step="0.01" value={Spct} onChange={setSpct} />
          <Field label="Moisture" unit="%" step="0.1" value={Mpct} onChange={setMpct} />
        </div>
        <Readout label="Ash (remainder)" value={fmt(ashPct,2)} unit="%" />
        {!sumOk && (
          <div className="mt-1 text-[11px] text-red-400 bg-red-950/40 border border-red-900 rounded px-2 py-1.5">
            C+H+O+N+S+Moisture exceeds 100% — check your ultimate analysis figures.
          </div>
        )}

        <SubHeader>Excess air / O2</SubHeader>
        <div className="flex gap-2 mb-3">
          <button onClick={() => setCombMode("givenEA")} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${combMode === "givenEA" ? "bg-amber-500 text-neutral-950 border-amber-500" : "border-neutral-700 text-neutral-300"}`}>Given excess air %</button>
          <button onClick={() => setCombMode("givenO2")} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${combMode === "givenO2" ? "bg-sky-500 text-neutral-950 border-sky-500" : "border-neutral-700 text-neutral-300"}`}>Given measured O2%</button>
        </div>
        {combMode === "givenEA" ? (
          <Field label="Excess air" unit="%" step="1" value={eaPct} onChange={setEaPct} />
        ) : (
          <Field label="Measured O2 (dry, flue gas analyzer)" unit="%" step="0.1" value={measuredO2} onChange={setMeasuredO2} />
        )}
        <Field label="Firing rate" unit="kg fuel/hr" step="10" value={firingRate} onChange={setFiringRate} hint="Used to scale flue gas mass flow for the fan sizing section." />

        <SubHeader>Draft & ID/FD fan</SubHeader>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Stack height" unit="m" step="0.5" value={stackHeight} onChange={setStackHeight} />
          <Field label="Ambient temp." unit="°C" value={ambientTempC} onChange={setAmbientTempC} hint="Default 33°C represents a typical hot-season day in Thailand — adjust for your actual site design condition." />
        </div>
        <Field label="Flue gas temperature" unit="°C" value={flueGasTempC} onChange={setFlueGasTempC} />
        <Field label="Flue gas mass flow" unit="kg/hr" step="50" value={flueGasFlowInput} onChange={setFlueGasFlowInput} hint={`From combustion calc at this firing rate: ${fmt(comb.flueGasFlow_kgHr,0)} kg/hr — copy across manually.`} />
        <Field label="Required system resistance" unit="Pa" step="50" value={systemResistancePa} onChange={setSystemResistancePa} hint="Sum of boiler passes + ductwork + dust collector pressure drop (from equipment data)." />
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Fan efficiency" unit="0–1" step="0.01" value={fanEff} onChange={setFanEff} />
          <Field label="Service factor" unit="×" step="0.05" value={fanServiceFactor} onChange={setFanServiceFactor} />
        </div>
      </Plate>

      <Plate title="Combustion result">
        <Readout label="Theoretical air" value={fmt(comb.Ath,3)} unit="kg air/kg fuel" />
        <Readout label="Actual air (at set excess)" value={fmt(comb.Aactual,3)} unit="kg air/kg fuel" />
        <Readout label="Excess air" value={fmt(comb.EA*100,1)} unit="%" big />
        <Readout label="O2 (dry)" value={fmt(comb.O2pct,2)} unit="%" />
        <Readout label="CO2 (dry)" value={fmt(comb.CO2pct,2)} unit="%" />
        <Readout label="N2 (dry)" value={fmt(comb.N2pct,2)} unit="%" />
        <Readout label="SO2 (dry)" value={fmt(comb.SO2ppm,0)} unit="ppm" />
        <Readout label="H2O (wet basis)" value={fmt(comb.H2Opct_wet,2)} unit="%" />
        <Readout label="Flue gas mass" value={fmt(comb.flueGasMass,3)} unit="kg/kg fuel" />
        <Readout label="Flue gas flow (at firing rate)" value={fmt(comb.flueGasFlow_kgHr,0)} unit="kg/hr" big />
        <div className="mt-2 text-[10px] text-neutral-500 leading-relaxed">
          Rigorous molar combustion balance from ultimate analysis — not the simplified EA≈O2/(20.9-O2)
          rule of thumb, though the two agree closely when fuel-bound N2 is small (typical for biomass).
        </div>
      </Plate>

      <Plate title="Saturated steam table">
        <div className="flex gap-2 mb-3">
          <button onClick={() => setSteamMode("byPressure")} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${steamMode === "byPressure" ? "bg-amber-500 text-neutral-950 border-amber-500" : "border-neutral-700 text-neutral-300"}`}>By pressure</button>
          <button onClick={() => setSteamMode("byTemp")} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${steamMode === "byTemp" ? "bg-sky-500 text-neutral-950 border-sky-500" : "border-neutral-700 text-neutral-300"}`}>By temperature</button>
        </div>
        {steamMode === "byPressure" ? (
          <>
            <Field label="Pressure" unit={pressureIsGauge ? "barg" : "bara"} step="0.1" value={pressureInput} onChange={setPressureInput} />
            <button onClick={() => setPressureIsGauge(!pressureIsGauge)} className="text-[10px] text-sky-400 underline mb-2">
              Switch to {pressureIsGauge ? "absolute" : "gauge"}
            </button>
            <Readout label="Saturation temperature" value={fmt(steam.T,1)} unit="°C" big />
          </>
        ) : (
          <>
            <Field label="Temperature" unit="°C" step="1" value={tempInput} onChange={setTempInput} />
            <Readout label="Saturation pressure" value={fmt(steam.pBarA ?? steam.P,2)} unit="bar abs" big />
          </>
        )}
        <Readout label="hf (sat. liquid)" value={fmt(steam.hf,1)} unit="kJ/kg" />
        <Readout label="hg (sat. vapour)" value={fmt(steam.hg,1)} unit="kJ/kg" />
        <Readout label="hfg (latent heat)" value={fmt(steam.hfg,1)} unit="kJ/kg" />
        <Readout label="vg (specific volume)" value={fmt(steam.vg,4)} unit="m³/kg" />
        <Field label="Feedwater temperature" unit="°C" step="1" value={feedwaterTempC} onChange={setFeedwaterTempC} hint="For evaporation duty below (approx. cp×T for subcooled liquid)." />
        <Readout label="Evaporation duty (feedwater → steam)" value={fmt(evapDuty,1)} unit="kJ/kg" big />
        <div className="mt-2 text-[10px] text-neutral-500 leading-relaxed">
          Table interpolated from verified reference data points; exact at tabulated pressures, small
          interpolation error between (well under 1% in the 1–30 bar range most boiler work falls in).
        </div>
      </Plate>

      <Plate title="Draft & fan result">
        <Readout label="Theoretical natural draft" value={fmt(draft.Pa,1)} unit="Pa" />
        <Readout label="Theoretical natural draft" value={fmt(draft.mmH2O,2)} unit="mmH₂O" big />
        <Readout label="Flue gas density at stack temp" value={fmt(draft.rhoGas,3)} unit="kg/m³" />
        <Readout label="Flue gas volumetric flow" value={fmt(draft.Q_m3hr,0)} unit="Am³/hr" />
        <Readout label="Net resistance after natural draft" value={fmt(draft.netResistance_Pa,0)} unit="Pa" />
        <Readout label="Calculated running power" value={fmt(draft.P_kW_running,2)} unit="kW" />
        <Readout label="With service factor" value={fmt(draft.P_kW,2)} unit="kW" />
        <Readout label="Nearest standard motor" value={fmt(nearestStandardMotor(draft.P_kW),2)} unit="kW" big />
        <div className="mt-2 text-[10px] text-neutral-500 leading-relaxed">
          Natural draft is a first-principles density-difference calc (standard "H×3465×(1/Ta−1/Tg)" form).
          Fan power assumes the natural draft partially offsets the required system resistance — verify
          against actual measured/quoted system pressure drop for a real fan selection.
        </div>
      </Plate>
    </div>
  );
}

// ================= REFRACTORY HELPERS =================
const BRICK_PRESETS = [
  { label: "Standard straight (230×114×64mm)", L: 230, H: 114, D: 64 },
  { label: "Standard straight (230×114×76mm)", L: 230, H: 114, D: 76 },
  { label: "Standard straight, deep (230×114×114mm)", L: 230, H: 114, D: 114 },
  { label: "Custom…", L: null, H: null, D: null },
];

const CASTABLE_PRESETS = [
  { label: "Dense castable (~2300–2500 kg/m³)", density: 2400, water: 9 },
  { label: "Medium-density castable (~1800–2000 kg/m³)", density: 1900, water: 11 },
  { label: "Insulating castable (~1000–1400 kg/m³)", density: 1200, water: 16 },
  { label: "Lightweight insulating (~600–900 kg/m³)", density: 750, water: 20 },
  { label: "Custom…", density: null, water: null },
];

// ================= REFRACTORY PANEL =================
function RefractoryPanel() {
  const [wallType, setWallType] = useState("brick"); // 'brick' | 'castable'
  const [area, setArea] = useState(10);
  const [thickness, setThickness] = useState(230);

  // brick
  const [brickPreset, setBrickPreset] = useState("Standard straight (230×114×64mm)");
  const [customL, setCustomL] = useState(230);
  const [customH, setCustomH] = useState(114);
  const [customD, setCustomD] = useState(64);
  const [jointMm, setJointMm] = useState(3);
  const [brickWaste, setBrickWaste] = useState(5);
  const [brickDensity, setBrickDensity] = useState(2100);
  const [mortarDensity, setMortarDensity] = useState(1900);
  const [mortarBagKg, setMortarBagKg] = useState(25);

  // castable
  const [castablePreset, setCastablePreset] = useState("Dense castable (~2300–2500 kg/m³)");
  const [customCastableDensity, setCustomCastableDensity] = useState(2400);
  const [castableWaste, setCastableWaste] = useState(10);
  const [castableBagKg, setCastableBagKg] = useState(25);
  const [waterPct, setWaterPct] = useState(9);

  const brickDims = useMemo(() => {
    if (brickPreset === "Custom…") return { L: customL, H: customH, D: customD };
    const p = BRICK_PRESETS.find(b => b.label === brickPreset);
    return { L: p.L, H: p.H, D: p.D };
  }, [brickPreset, customL, customH, customD]);

  // keep water% default in sync with castable preset choice, unless user picked Custom
  const castableDensity = castablePreset === "Custom…" ? customCastableDensity : CASTABLE_PRESETS.find(c => c.label === castablePreset)?.density ?? customCastableDensity;

  const brick = useMemo(() => {
    const { L, H, D } = brickDims;
    if (!L || !H || !D) return null;
    const layers = Math.ceil(thickness / D);
    const actualThickness = layers * D;
    const effL = (L + jointMm) / 1000, effH = (H + jointMm) / 1000;
    const bricksPerM2PerLayer = 1 / (effL * effH);
    const totalBricksRaw = bricksPerM2PerLayer * area * layers;
    const totalBricksOrdered = Math.ceil(totalBricksRaw * (1 + brickWaste / 100));
    const brickVolEach = (L / 1000) * (H / 1000) * (D / 1000);
    const totalBrickVolume = totalBricksRaw * brickVolEach;
    const wallVolume = area * (actualThickness / 1000);
    const mortarVolume = Math.max(0, wallVolume - totalBrickVolume);
    const mortarWeight = mortarVolume * mortarDensity;
    const mortarBags = Math.ceil(mortarWeight / mortarBagKg);
    const brickWeightInstalled = totalBricksRaw * brickVolEach * brickDensity;
    const brickWeightOrdered = totalBricksOrdered * brickVolEach * brickDensity;
    const thicknessMismatch = Math.abs(actualThickness - thickness) > 0.5;
    return {
      layers, actualThickness, bricksPerM2PerLayer, totalBricksRaw, totalBricksOrdered,
      wallVolume, totalBrickVolume, mortarVolume, mortarWeight, mortarBags,
      brickWeightInstalled, brickWeightOrdered, thicknessMismatch,
    };
  }, [brickDims, thickness, area, jointMm, brickWaste, mortarDensity, mortarBagKg, brickDensity]);

  const castable = useMemo(() => {
    const volume = area * (thickness / 1000);
    const weightRaw = volume * castableDensity;
    const weightOrdered = weightRaw * (1 + castableWaste / 100);
    const bags = Math.ceil(weightOrdered / castableBagKg);
    const waterWeight = weightOrdered * (waterPct / 100);
    return { volume, weightRaw, weightOrdered, bags, waterWeight };
  }, [area, thickness, castableDensity, castableWaste, castableBagKg, waterPct]);

  return (
    <div>
      <StickyResults items={
        wallType === "brick"
          ? [
              { label: "Bricks", value: brick ? fmt(brick.totalBricksOrdered, 0) : "—", unit: "pcs" },
              { label: "Mortar", value: brick ? fmt(brick.mortarBags, 0) : "—", unit: "bags" },
              { label: "Thickness", value: brick ? fmt(brick.actualThickness, 0) : "—", unit: "mm", warn: brick?.thicknessMismatch },
            ]
          : [
              { label: "Castable", value: fmt(castable.weightOrdered, 0), unit: "kg" },
              { label: "Bags", value: fmt(castable.bags, 0), unit: "bags" },
              { label: "Water", value: fmt(castable.waterWeight, 0), unit: "kg" },
            ]
      } />

      <Plate title="Inputs">
        <SubHeader>Wall</SubHeader>
        <div className="flex gap-2 mb-3">
          <button onClick={() => setWallType("brick")} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${wallType === "brick" ? "bg-amber-500 text-neutral-950 border-amber-500" : "border-neutral-700 text-neutral-300"}`}>Brick wall</button>
          <button onClick={() => setWallType("castable")} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${wallType === "castable" ? "bg-sky-500 text-neutral-950 border-sky-500" : "border-neutral-700 text-neutral-300"}`}>Castable wall</button>
        </div>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Wall area" unit="m²" step="0.1" value={area} onChange={setArea} />
          <Field label="Wall thickness" unit="mm" step="1" value={thickness} onChange={setThickness} />
        </div>

        {wallType === "brick" ? (
          <>
            <SubHeader>Brick</SubHeader>
            <Select label="Brick size" value={brickPreset} onChange={setBrickPreset} options={BRICK_PRESETS.map(b => ({ label: b.label }))} />
            {brickPreset === "Custom…" && (
              <div className="grid grid-cols-3 gap-x-2">
                <Field label="Length" unit="mm" value={customL} onChange={setCustomL} />
                <Field label="Height" unit="mm" value={customH} onChange={setCustomH} />
                <Field label="Depth" unit="mm" value={customD} onChange={setCustomD} hint="Into the wall thickness direction." />
              </div>
            )}
            <Field label="Mortar joint thickness" unit="mm" step="0.5" value={jointMm} onChange={setJointMm} hint="Refractory joints are usually thinner than regular masonry — 2–5mm typical." />
            <div className="grid grid-cols-2 gap-x-3">
              <Field label="Brick waste allowance" unit="%" step="1" value={brickWaste} onChange={setBrickWaste} hint="Breakage/cutting allowance — 5–10% typical." />
              <Field label="Brick density" unit="kg/m³" step="50" value={brickDensity} onChange={setBrickDensity} hint="~1900–2300 for fireclay; confirm from product data." />
            </div>

            <Readout label="Actual achieved thickness" value={fmt(brick.actualThickness,0)} unit="mm" />
            {brick.thicknessMismatch && (
              <div className="mb-2 text-[11px] text-amber-400 bg-amber-950/30 border border-amber-900 rounded px-2 py-1.5">
                Requested thickness ({fmt(thickness,0)}mm) doesn't divide evenly by the brick depth — actual
                built thickness will be {fmt(brick.actualThickness,0)}mm. Pick a brick depth that divides
                evenly into your target thickness if this matters.

            <Readout label="Bricks required (as built)" value={fmt(brick.totalBricksRaw,0)} unit="pcs" />
            <Readout label="Bricks to order (+ waste)" value={fmt(brick.totalBricksOrdered,0)} unit="pcs" big />
            <Readout label="Mortar volume" value={fmt(brick.mortarVolume,3)} unit="m³" />
            <Readout label="Mortar weight" value={fmt(brick.mortarWeight,0)} unit="kg" />
            <Readout label="Mortar bags to order" value={fmt(brick.mortarBags,0)} unit="bags" big />
          </Plate>

          <Plate title="Weight (for structural / handling reference)">
            <Readout label="Installed brick weight" value={fmt(brick.brickWeightInstalled/1000,2)} unit="tonnes" />
            <Readout label="Ordered brick weight (+ waste)" value={fmt(brick.brickWeightOrdered/1000,2)} unit="tonnes" />
          </Plate>
        </>
      )}

      {wallType === "castable" && (
        <Plate title="Castable quantities">
          <Readout label="Volume" value={fmt(castable.volume,3)} unit="m³" />
          <Readout label="Weight (as-designed)" value={fmt(castable.weightRaw,0)} unit="kg" />
          <Readout label="Weight to order (+ waste)" value={fmt(castable.weightOrdered,0)} unit="kg" big />
          <Readout label="Bags to order" value={fmt(castable.bags,0)} unit="bags" big />
          <Readout label="Water required (approx.)" value={fmt(castable.waterWeight,0)} unit="kg (≈ litres)" />
        </Plate>
      )}

      <div className="text-[10px] text-neutral-500 leading-relaxed px-1">
        Density, water addition, and joint figures vary significantly by manufacturer and product grade
        (refractory bulk densities alone span roughly 400–2900 kg/m³ across product types) — the defaults here
        are indicative starting points, not universal constants. Always confirm against the actual product's
        technical data sheet before ordering. This tool doesn't cover anchor/hexmesh spacing, expansion
        joints, or curing/dry-out schedules — plan those separately.
      </div>
    </div>
  );
}

const STEEL_DENSITY = 7850; // kg/m3

// ================= STEEL PROPERTIES PANEL =================
function SteelPropertiesPanel() {
  const [section, setSection] = useState("pipe"); // 'pipe' | 'plate' | 'channel' | 'beam'

  // pipe
  const [pipeNps, setPipeNps] = useState("4");
  const [pipeSch, setPipeSch] = useState("40");
  const [pipeLength, setPipeLength] = useState(6.0);

  // plate
  const [plateThk, setPlateThk] = useState(6);
  const [plateWidth, setPlateWidth] = useState(1.5);
  const [plateLength, setPlateLength] = useState(6.0);

  // channel
  const [channelSize, setChannelSize] = useState(CHANNEL_TABLE[2].size);
  const [channelLength, setChannelLength] = useState(6.0);

  // beam
  const [beamType, setBeamType] = useState("H"); // 'H' | 'I'
  const [beamSize, setBeamSize] = useState(HBEAM_TABLE[3].size);
  const [beamLength, setBeamLength] = useState(6.0);

  const pipe = useMemo(() => {
    const row = PIPE_TABLE.find(p => p.nps === pipeNps);
    const t = row?.sch[pipeSch];
    if (!row || t === undefined) return null;
    const od = row.od;
    const id = od - 2 * t;
    const kgm = pipeWeightKgM(od, t);
    const totalWeight = kgm * pipeLength;
    return { dn: row.dn, od, t, id, kgm, totalWeight, availableSch: Object.keys(row.sch) };
  }, [pipeNps, pipeSch, pipeLength]);

  const plate = useMemo(() => {
    const kgm2 = (plateThk / 1000) * STEEL_DENSITY; // kg per m² for this thickness
    const weight = kgm2 * plateWidth * plateLength;
    return { kgm2, weight };
  }, [plateThk, plateWidth, plateLength]);

  const channel = useMemo(() => {
    const row = CHANNEL_TABLE.find(c => c.size === channelSize);
    const kgm = row?.kgm ?? 0;
    return { kgm, weight: kgm * channelLength };
  }, [channelSize, channelLength]);

  const beam = useMemo(() => {
    const table = beamType === "H" ? HBEAM_TABLE : IBEAM_TABLE;
    const row = table.find(b => b.size === beamSize);
    const kgm = row?.kgm ?? 0;
    return { kgm, weight: kgm * beamLength };
  }, [beamType, beamSize, beamLength]);

  return (
    <div>
      <StickyResults items={
        section === "pipe" ? (pipe ? [
          { label: "OD", value: fmt(pipe.od,2), unit: "mm" },
          { label: "WT", value: fmt(pipe.t,2), unit: "mm" },
          { label: "Weight", value: fmt(pipe.kgm,2), unit: "kg/m" },
        ] : [{ label: "Schedule", value: "not available", unit: "for this size", warn: true }])
        : section === "plate" ? [
          { label: "kg/m²", value: fmt(plate.kgm2,2), unit: "" },
          { label: "Weight", value: fmt(plate.weight,1), unit: "kg" },
        ]
        : section === "channel" ? [
          { label: "Unit weight", value: fmt(channel.kgm,2), unit: "kg/m" },
          { label: "Weight", value: fmt(channel.weight,1), unit: "kg" },
        ] : [
          { label: "Unit weight", value: fmt(beam.kgm,2), unit: "kg/m" },
          { label: "Weight", value: fmt(beam.weight,1), unit: "kg" },
        ]
      } />

      <Plate title="Section">
        <div className="grid grid-cols-2 gap-2 mb-1">
          <button onClick={() => setSection("pipe")} className={`py-2 rounded text-xs font-semibold uppercase tracking-wide border ${section === "pipe" ? "bg-amber-500 text-neutral-950 border-amber-500" : "border-neutral-700 text-neutral-300"}`}>Pipe schedule</button>
          <button onClick={() => setSection("plate")} className={`py-2 rounded text-xs font-semibold uppercase tracking-wide border ${section === "plate" ? "bg-amber-500 text-neutral-950 border-amber-500" : "border-neutral-700 text-neutral-300"}`}>Plate</button>
          <button onClick={() => setSection("channel")} className={`py-2 rounded text-xs font-semibold uppercase tracking-wide border ${section === "channel" ? "bg-amber-500 text-neutral-950 border-amber-500" : "border-neutral-700 text-neutral-300"}`}>Channel</button>
          <button onClick={() => setSection("beam")} className={`py-2 rounded text-xs font-semibold uppercase tracking-wide border ${section === "beam" ? "bg-amber-500 text-neutral-950 border-amber-500" : "border-neutral-700 text-neutral-300"}`}>Beam</button>
        </div>
      </Plate>

      {section === "pipe" && (
        <>
          <Plate title="Inputs">
            <Select label="Nominal pipe size (NPS)" value={pipeNps} onChange={(v) => { setPipeNps(v); const row = PIPE_TABLE.find(p => p.nps === v); if (row && !row.sch[pipeSch]) setPipeSch(Object.keys(row.sch)[0]); }} options={PIPE_TABLE.map(p => ({ label: p.nps }))} />
            <Select label="Schedule" value={pipeSch} onChange={setPipeSch} options={(PIPE_TABLE.find(p => p.nps === pipeNps)?.sch ? Object.keys(PIPE_TABLE.find(p => p.nps === pipeNps).sch) : []).map(s => ({ label: s }))} />
            <Field label="Length" unit="m" step="0.1" value={pipeLength} onChange={setPipeLength} />
          </Plate>
          {pipe && (
            <Plate title="Pipe dimensions & weight (ASME B36.10M)">
              <Readout label="DN" value={fmt(pipe.dn,0)} unit="mm" />
              <Readout label="Outside diameter (OD)" value={fmt(pipe.od,2)} unit="mm" big />
              <Readout label="Wall thickness" value={fmt(pipe.t,2)} unit="mm" big />
              <Readout label="Inside diameter (ID)" value={fmt(pipe.id,2)} unit="mm" />
              <Readout label="Unit weight" value={fmt(pipe.kgm,2)} unit="kg/m" big />
              <Readout label={`Total weight (${fmt(pipeLength,1)}m)`} value={fmt(pipe.totalWeight,1)} unit="kg" />
              <div className="mt-2 text-[10px] text-neutral-500 leading-relaxed">
                Covers NPS 1/2"–12". STD and Sch40 (and XS/Sch80) are shown separately since they diverge
                above NPS 10 — e.g. at NPS 12, STD = 9.53mm but Sch40 = 10.31mm. Don't assume they're
                interchangeable at larger sizes. For NPS 14" and above, consult ASME B36.10M directly.
              </div>
            </Plate>
          )}
        </>
      )}

      {section === "plate" && (
        <>
          <Plate title="Inputs">
            <Field label="Thickness" unit="mm" step="0.5" value={plateThk} onChange={setPlateThk} />
            <div className="grid grid-cols-2 gap-x-3">
              <Field label="Width" unit="m" step="0.05" value={plateWidth} onChange={setPlateWidth} />
              <Field label="Length" unit="m" step="0.1" value={plateLength} onChange={setPlateLength} hint="Standard mill length is often 6.0m." />
            </div>
          </Plate>
          <Plate title="Plate weight">
            <Readout label="Weight per m²" value={fmt(plate.kgm2,2)} unit="kg/m²" />
            <Readout label="Sheet weight" value={fmt(plate.weight,1)} unit="kg" big />
            <div className="mt-2 text-[10px] text-neutral-500 leading-relaxed">
              Pure geometry: thickness × width × length × 7850 kg/m³. Rule of thumb: 1mm thickness ≈
              7.85 kg/m², so a 6mm plate ≈ 47.1 kg/m² — quick to sanity-check by hand.
            </div>
          </Plate>
        </>
      )}

      {section === "channel" && (
        <>
          <Plate title="Inputs">
            <Select label="Channel size (JIS)" value={channelSize} onChange={setChannelSize} options={CHANNEL_TABLE.map(c => ({ label: c.size }))} />
            <Field label="Length" unit="m" step="0.1" value={channelLength} onChange={setChannelLength} hint="Standard mill length is often 6.0m." />
          </Plate>
          <Plate title="Channel weight">
            <Readout label="Unit weight" value={fmt(channel.kgm,2)} unit="kg/m" big />
            <Readout label={`Piece weight (${fmt(channelLength,1)}m)`} value={fmt(channel.weight,1)} unit="kg" big />
          </Plate>
        </>
      )}

      {section === "beam" && (
        <>
          <Plate title="Inputs">
            <div className="flex gap-2 mb-3">
              <button onClick={() => { setBeamType("H"); setBeamSize(HBEAM_TABLE[0].size); }} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${beamType === "H" ? "bg-amber-500 text-neutral-950 border-amber-500" : "border-neutral-700 text-neutral-300"}`}>H-beam (JIS, equal flange)</button>
              <button onClick={() => { setBeamType("I"); setBeamSize(IBEAM_TABLE[0].size); }} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${beamType === "I" ? "bg-sky-500 text-neutral-950 border-sky-500" : "border-neutral-700 text-neutral-300"}`}>I-beam (GB standard)</button>
            </div>
            <Select label="Size" value={beamSize} onChange={setBeamSize} options={(beamType === "H" ? HBEAM_TABLE : IBEAM_TABLE).map(b => ({ label: b.size }))} />
            <Field label="Length" unit="m" step="0.1" value={beamLength} onChange={setBeamLength} hint="Standard mill length is often 6.0m." />
          </Plate>
          <Plate title="Beam weight">
            <Readout label="Unit weight" value={fmt(beam.kgm,2)} unit="kg/m" big />
            <Readout label={`Piece weight (${fmt(beamLength,1)}m)`} value={fmt(beam.weight,1)} unit="kg" big />
          </Plate>
        </>
      )}

      <div className="text-[10px] text-neutral-500 leading-relaxed px-1">
        Pipe dimensions from ASME B36.10M (cross-checked against published weight data). H-beam, I-beam,
        and channel unit weights from JIS G3192 / commonly available GB-standard supplier data, cross-checked
        between independent sources including a Thai supplier's published table for channels. Actual mill
        tolerances mean real piece weights can vary a percent or two — confirm against the mill certificate
        for anything going into a final BOQ.
      </div>
    </div>
  );
}

// ================= UNIT CONVERTER =================
const UNIT_CATEGORIES = {
  Pressure: { base: "kPa", units: { kPa: 1, MPa: 1000, bar: 100, psi: 6.89476, "kgf/cm²": 98.0665, mmHg: 0.133322, atm: 101.325 } },
  Flow: { base: "m³/hr", units: { "m³/hr": 1, "m³/s": 3600, "L/min": 0.06, "US gpm": 0.227125, "kg/hr (water)": 0.001 } },
  Power: { base: "kW", units: { kW: 1, HP: 0.7457, "BTU/hr": 0.000293071, "kcal/hr": 0.00116222, MW: 1000 } },
  Length: { base: "m", units: { m: 1, mm: 0.001, cm: 0.01, in: 0.0254, ft: 0.3048, km: 1000 } },
  Mass: { base: "kg", units: { kg: 1, ton: 1000, lb: 0.453592, g: 0.001 } },
};

function UnitConverterPanel() {
  const [category, setCategory] = useState("Pressure");
  const [fromUnit, setFromUnit] = useState("bar");
  const [toUnit, setToUnit] = useState("psi");
  const [value, setValue] = useState(1);
  const [tempFrom, setTempFrom] = useState("C");
  const [tempValue, setTempValue] = useState(100);

  const cat = UNIT_CATEGORIES[category];
  const unitList = category === "Temperature" ? ["C", "F", "K"] : Object.keys(cat.units);

  const result = useMemo(() => {
    if (category === "Temperature") {
      let c;
      if (tempFrom === "C") c = tempValue;
      else if (tempFrom === "F") c = (tempValue - 32) * 5 / 9;
      else c = tempValue - 273.15;
      return { C: c, F: c * 9 / 5 + 32, K: c + 273.15 };
    }
    const baseVal = value * cat.units[fromUnit];
    const converted = baseVal / cat.units[toUnit];
    return { converted };
  }, [category, fromUnit, toUnit, value, tempFrom, tempValue, cat]);

  return (
    <div>
      <StickyResults items={
        category === "Temperature"
          ? [{ label: "°C", value: fmt(result.C,2), unit: "" }, { label: "°F", value: fmt(result.F,2), unit: "" }, { label: "K", value: fmt(result.K,2), unit: "" }]
          : [{ label: "Result", value: fmt(result.converted,4), unit: toUnit }]
      } />

      <Plate title="Inputs">
        <Select label="Category" value={category} onChange={(v) => {
          setCategory(v);
          if (v !== "Temperature") {
            const units = Object.keys(UNIT_CATEGORIES[v].units);
            setFromUnit(units[0]); setToUnit(units[1] ?? units[0]);
          }
        }} options={[...Object.keys(UNIT_CATEGORIES), "Temperature"].map(c => ({ label: c }))} />

        {category === "Temperature" ? (
          <>
            <Field label="Value" unit="" step="0.1" value={tempValue} onChange={setTempValue} />
            <Select label="Unit" value={tempFrom} onChange={setTempFrom} options={["C","F","K"].map(u => ({ label: u }))} />
          </>
        ) : (
          <>
            <Field label="Value" unit="" step="0.01" value={value} onChange={setValue} />
            <div className="grid grid-cols-2 gap-x-3">
              <Select label="From" value={fromUnit} onChange={setFromUnit} options={unitList.map(u => ({ label: u }))} />
              <Select label="To" value={toUnit} onChange={setToUnit} options={unitList.map(u => ({ label: u }))} />
            </div>
          </>
        )}
      </Plate>

      {category !== "Temperature" && (

}

// ================= BOLT TORQUE CALCULATOR =================
const BOLT_AS_TABLE = { M8: 36.6, M10: 58.0, M12: 84.3, M14: 115, M16: 157, M18: 192, M20: 245, M22: 303, M24: 353, M27: 459, M30: 561, M33: 694, M36: 817 };
// ISO 898-1 proof stress Sp (MPa). 8.8 is size-dependent: 580 for d ≤ M16, 600 above.
// A193-B7 has no ISO "proof" — 720 here is ~yield for ≤2.5" dia; treat preload as %-of-yield for B7.
const PROOF_STRESS_TABLE = { "4.6": 225, "8.8": 600, "10.9": 830, "12.9": 970, "A193-B7": 720 };
const K_FACTOR_OPTIONS = [
  { label: "As received / dry (K≈0.20)", K: 0.20 },
  { label: "Lightly oiled (K≈0.18)", K: 0.18 },
  { label: "PTFE / moly-coated (K≈0.13)", K: 0.13 },
];

function BoltTorquePanel() {
  const [boltSize, setBoltSize] = useState("M20");
  const [propClass, setPropClass] = useState("8.8");
  const [kLabel, setKLabel] = useState(K_FACTOR_OPTIONS[0].label);
  const [utilPct, setUtilPct] = useState(75);

  const calc = useMemo(() => {
    const As = BOLT_AS_TABLE[boltSize];
    const D_mm = parseFloat(boltSize.replace("M", ""));
    let proof = PROOF_STRESS_TABLE[propClass];
    if (propClass === "8.8" && D_mm <= 16) proof = 580; // ISO 898-1: Sp = 580 MPa for 8.8 up to M16
    const K = K_FACTOR_OPTIONS.find(k => k.label === kLabel)?.K ?? 0.2;
    const preload_N = As * proof * (utilPct / 100);
    const torque_Nm = K * (D_mm / 1000) * preload_N;
    return { As, proof, K, D_mm, preload_N, torque_Nm };
  }, [boltSize, propClass, kLabel, utilPct]);

  return (
    <div>
      <StickyResults items={[
        { label: "Preload", value: fmt(calc.preload_N/1000,1), unit: "kN" },
        { label: "Torque", value: fmt(calc.torque_Nm,1), unit: "N·m" },
      ]} />

      <Plate title="Inputs">
        <Select label="Bolt size" value={boltSize} onChange={setBoltSize} options={Object.keys(BOLT_AS_TABLE).map(b => ({ label: b }))} />
        <Select label="Property class" value={propClass} onChange={setPropClass} options={Object.keys(PROOF_STRESS_TABLE).map(p => ({ label: p }))} />
        <Select label="Friction condition (K factor)" value={kLabel} onChange={setKLabel} options={K_FACTOR_OPTIONS.map(k => ({ label: k.label }))} />
        <Field label="Target utilization of proof load" unit="%" step="1" value={utilPct} onChange={setUtilPct} hint="75% of proof load is a common assembly target; adjust per your standard/spec." />
      </Plate>

      <Plate title="Result">
        <Readout label="Tensile stress area" value={fmt(calc.As,1)} unit="mm²" />
        <Readout label="Proof stress" value={fmt(calc.proof,0)} unit="MPa" />
        <Readout label="Target preload" value={fmt(calc.preload_N/1000,2)} unit="kN" big />
        <Readout label="Recommended torque" value={fmt(calc.torque_Nm,1)} unit="N·m" big />
        <div className="mt-2 text-[10px] text-neutral-500 leading-relaxed">
          Formula: T = K × D × F (short-form nut-factor method) — standard approach for general bolted
          joints, but NOT a substitute for a gasket manufacturer's recommended seating stress on flanged
          joints (spiral-wound gaskets typically need 55–70 MPa seating stress, which can govern over the
          pure bolt-strength calc here). Cross-check against your bolting standard/spec where one applies.
        </div>
      </Plate>
    </div>
  );
}

// ================= MOTOR FLA & CABLE SIZING =================
function MotorCablePanel() {
  const [kW, setKW] = useState(30);
  const [voltage, setVoltage] = useState(400);
  const [powerFactor, setPowerFactor] = useState(0.85);
  const [efficiency, setEfficiency] = useState(0.90);
  const [cableLength, setCableLength] = useState(50);
  const [allowedDropPct, setAllowedDropPct] = useState(2.5);
  const [conductorTemp, setConductorTemp] = useState("70");

  const RHO_TABLE = { "20": 0.0178, "70": 0.0212, "90": 0.0225 }; // copper resistivity, ohm.mm2/m, by conductor temp (C)

  const calc = useMemo(() => {
    const FLA = (kW * 1000) / (Math.sqrt(3) * voltage * powerFactor * efficiency);
    const rho = RHO_TABLE[conductorTemp];
    const allowedDropV = voltage * (allowedDropPct / 100);
    const csaReq = (Math.sqrt(3) * FLA * cableLength * rho) / allowedDropV;
    return { FLA, rho, allowedDropV, csaReq };
  }, [kW, voltage, powerFactor, efficiency, cableLength, allowedDropPct, conductorTemp]);

  return (
    <div>
      <StickyResults items={[
        { label: "FLA", value: fmt(calc.FLA,1), unit: "A" },
        { label: "Min. CSA (V-drop)", value: fmt(calc.csaReq,1), unit: "mm²" },
      ]} />

      <Plate title="Inputs">
        <SubHeader>Motor</SubHeader>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Motor rating" unit="kW" step="0.5" value={kW} onChange={setKW} />
          <Field label="Supply voltage" unit="V (3-ph, L-L)" step="10" value={voltage} onChange={setVoltage} />
        </div>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Power factor" unit="0–1" step="0.01" value={powerFactor} onChange={setPowerFactor} hint="~0.80–0.88 typical for induction motors near full load." />
          <Field label="Efficiency" unit="0–1" step="0.01" value={efficiency} onChange={setEfficiency} hint="~0.88–0.95 depending on size/IE class." />
        </div>
        <div className="mt-1 text-[10px] text-neutral-500 leading-relaxed">
          This estimates FLA from rated power — always use the motor's actual nameplate FLA once one is
          selected, since PF/efficiency vary by manufacturer and this is only a pre-selection estimate.
        </div>

        <SubHeader>Cable (voltage drop check)</SubHeader>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="One-way cable length" unit="m" step="1" value={cableLength} onChange={setCableLength} />
          <Field label="Allowed voltage drop" unit="%" step="0.1" value={allowedDropPct} onChange={setAllowedDropPct} hint="2–3% for a motor feeder is a common target; check your site standard." />
        </div>
        <Select label="Conductor operating temp (resistivity)" value={conductorTemp} onChange={setConductorTemp} options={[{label:"20"},{label:"70"},{label:"90"}]} />
      </Plate>

      <Plate title="Result">
        <Readout label="Full load current (FLA)" value={fmt(calc.FLA,1)} unit="A" big />
        <Readout label="Allowed voltage drop" value={fmt(calc.allowedDropV,1)} unit="V" />
        <Readout label="Minimum CSA for voltage drop" value={fmt(calc.csaReq,2)} unit="mm²" big />
        <div className="mt-2 text-[10px] text-neutral-500 leading-relaxed">
          This checks voltage drop only (simplified resistive model, ignoring reactance — reasonable for
          smaller cables, less accurate above roughly 95mm²). It does NOT check current-carrying capacity
          (ampacity), which depends on installation method (conduit, tray, buried, grouping) and is a
          separate check against the cable manufacturer's rating table or IEC 60364-5-52 — always confirm
          the larger of the two required sizes governs your final selection.
        </div>
      </Plate>
    </div>
  );
}

// ================= INSULATION SELECTION HELPERS =================
// Thermal conductivity model: linear interpolation on density between published reference points at
// two mean temperatures (10C, 100C), then linear interpolation/extrapolation on mean temperature.
// Reference data (ScienceDirect "Mineral Wool" overview, cross-consistent with several manufacturer
// datasheets showing glass wool ~0.030-0.045 W/mK and rock wool ~0.033-0.045 W/mK in this density range):
//   Glass wool: 10 kg/m³ -> 0.040 W/mK @10°C, 0.070 W/mK @100°C
//               75 kg/m³ -> 0.030 W/mK @10°C, 0.044 W/mK @100°C
//   Rock wool:  23 kg/m³ -> 0.037 W/mK @10°C, 0.052 W/mK @100°C
//               200 kg/m³-> 0.033 W/mK @10°C, 0.042 W/mK @100°C
function insulationK(material, density, Tmean) {
  let d0, d1, k10_0, k10_1, k100_0, k100_1;
  if (material === "glass") { d0 = 10; d1 = 75; k10_0 = 0.040; k10_1 = 0.030; k100_0 = 0.070; k100_1 = 0.044; }
  else { d0 = 23; d1 = 200; k10_0 = 0.037; k10_1 = 0.033; k100_0 = 0.052; k100_1 = 0.042; }
  const f = Math.max(0, Math.min(1, (density - d0) / (d1 - d0)));
  const k10 = k10_0 + f * (k10_1 - k10_0);
  const k100 = k100_0 + f * (k100_1 - k100_0);
  return k10 + (Tmean - 10) * (k100 - k10) / 90;
}

const JACKET_OPTIONS = [
  { label: "Aluminum jacket, bright (ε≈0.10)", eps: 0.10 },
  { label: "Aluminum jacket, weathered (ε≈0.30)", eps: 0.30 },
  { label: "Painted metal / canvas (ε≈0.90)", eps: 0.90 },
];

// Iterative solve for outer surface temperature — pipe (cylindrical) case
function solvePipeInsulation(Ti, Ta, od_mm, t_mm, material, density, emissivity) {
  const r1 = od_mm / 2000, r2 = r1 + t_mm / 1000;
  let lo = Ta, hi = Ti;
  for (let i = 0; i < 60; i++) {
    const Ts = (lo + hi) / 2;
    const Tmean = (Ti + Ts) / 2;
    const k = insulationK(material, density, Tmean);
    const Rins = Math.log(r2 / r1) / (2 * Math.PI * k);
    const Q_through = (Ti - Ts) / Rins;
    const dT = Math.max(0.001, Ts - Ta);
    const hConv = 1.32 * Math.pow(dT / (2 * r2), 0.25);
    const hRad = emissivity * 5.67e-8 * (Math.pow(Ts + 273.15, 4) - Math.pow(Ta + 273.15, 4)) / dT;
    const Q_out = (hConv + hRad) * (2 * Math.PI * r2) * dT;
    if (Q_through > Q_out) lo = Ts; else hi = Ts;
  }
  const Ts = (lo + hi) / 2;
  const Tmean = (Ti + Ts) / 2;
  const k = insulationK(material, density, Tmean);
  const Rins = Math.log(r2 / r1) / (2 * Math.PI * k);
  const Q = (Ti - Ts) / Rins; // W/m run
  return { Ts, k, Q };
}

// Iterative solve — flat wall case (per m²)
function solveFlatInsulation(Ti, Ta, t_mm, material, density, emissivity) {
  const t = t_mm / 1000;
  let lo = Ta, hi = Ti;
  for (let i = 0; i < 60; i++) {
    const Ts = (lo + hi) / 2;
    const Tmean = (Ti + Ts) / 2;
    const k = insulationK(material, density, Tmean);
    const Q_through = k * (Ti - Ts) / t;
    const dT = Math.max(0.001, Ts - Ta);
    const hConv = 1.42 * Math.pow(dT / 1.0, 0.25); // Lc=1m assumed vertical surface
    const hRad = emissivity * 5.67e-8 * (Math.pow(Ts + 273.15, 4) - Math.pow(Ta + 273.15, 4)) / dT;
    const Q_out = (hConv + hRad) * dT;
    if (Q_through > Q_out) lo = Ts; else hi = Ts;
  }
  const Ts = (lo + hi) / 2;
  const Tmean = (Ti + Ts) / 2;
  const k = insulationK(material, density, Tmean);
  const Q = k * (Ti - Ts) / t; // W/m2
  return { Ts, k, Q };
}

const STANDARD_THICKNESSES_MM = [25, 50, 75, 100]; // 1", 2", 3", 4"
const THICKNESS_LABELS = { 25: "1\"", 50: "2\"", 75: "3\"", 100: "4\"" };

// ================= INSULATION PANEL =================
function InsulationPanel() {
  const [surfaceType, setSurfaceType] = useState("pipe"); // 'pipe' | 'flat'

  const emissivity = JACKET_OPTIONS.find(j => j.label === jacketLabel)?.eps ?? 0.15;

        <div className="grid grid-cols-2 gap-x-3">

        <SubHeader>Insulation material</SubHeader>
        <div className="flex gap-2 mb-3">

          <button onClick={() => setMaterial("rock")} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${material === "rock" ? "bg-sky-500 text-neutral-950 border-sky-500" : "border-neutral-700 text-neutral-300"}`}>Rock wool</button>

        <Select label="Outer jacket / cladding" value={jacketLabel} onChange={setJacketLabel} options={JACKET_OPTIONS.map(j => ({ label: j.label }))} />
        <Field label="Surface temperature safety limit" unit="°C" step="1" value={safetyLimit} onChange={setSafetyLimit} hint="60°C is a common personnel-protection ('touch-safe') target; some standards use 50°C." />
      </Plate>

      <Plate title="Thickness comparison">
        {results.map((r) => (
          <div key={r.t} className={`flex items-center justify-between py-2 border-b border-neutral-800 last:border-0 ${r === recommended ? "bg-emerald-950/20 -mx-3 px-3 rounded" : ""}`}>
            <div>
              <div className="text-sm font-bold text-neutral-100">{THICKNESS_LABELS[r.t]} ({r.t}mm)</div>
              <div className="text-[10px] text-neutral-500">k = {fmt(r.k*1000,1)} mW/m·K at mean temp</div>
            </div>

          </div>
        ) : (
          <div className="mt-3 text-[11px] text-red-400 bg-red-950/40 border border-red-900 rounded px-2 py-1.5">

            temperature — consider a thicker layer, a double-layer system, or a lower-conductivity material.
          </div>

        Conductivity (k) is modeled from published density- and mean-temperature-dependent reference data for
        glass/rock wool — verify against your actual product's datasheet for anything final, since real
        products vary by manufacturer. Outer surface heat transfer uses natural-convection + radiation
        correlations for still air; outdoor/windy conditions will run cooler with higher heat loss (forced
        convection isn't modeled here). Heat loss figures assume steady-state, single-layer insulation with
        no thermal bridging (bands, supports, penetrations) — real installed performance is typically somewhat
        worse than this ideal calculation.
      </div>
    </div>

  switch (row.type) {
    case "Multicyclone / dust collector":
      return row.nH * 0.5 * rho * row.velocity ** 2;
    case "Ductwork (straight, friction)":
      return row.frictionFactor * (row.length / (row.diameter / 1000)) * 0.5 * rho * row.velocity ** 2;
    case "Duct fitting (elbow/tee/damper)": {
      const preset = FITTING_K_PRESETS.find(k => k.label === row.fittingPreset);
      const K = preset && preset.K !== null ? preset.K : row.customK;
      return K * 0.5 * rho * row.velocity ** 2;
    }
    default:
      return row.manualPa;
  }
}

// ================= FUEL CONSUMPTION HELPERS =================
const KCAL_TO_KJ = 4.1868;

// Dry-basis HHV (kcal/kg) and typical default moisture/hydrogen fractions for solid biomass.
// Cross-checked: rice husk dry HHV ~15.8 MJ/kg (3774 kcal/kg) and woody biomass ~19-20.5 MJ/kg dry
// against published proximate-analysis data before setting these.
const FUEL_PRESETS = [
  { label: "LPG (แก๊ส LPG)", kind: "liquidgas", lhv_kcal: 11000, density_kgL: 0.54 },
  { label: "Heavy oil (น้ำมันเตา)", kind: "liquidgas", lhv_kcal: 9600, density_kgL: 0.96 },
  { label: "Wood chips (ไม้สับ)", kind: "biomass", hhvDry_kcal: 4700, moisture: 35, hDry: 6.0, bulkDensity: 280 },
  { label: "Sawdust (ขี้เลื่อย)", kind: "biomass", hhvDry_kcal: 4700, moisture: 40, hDry: 6.0, bulkDensity: 220 },
  { label: "Wood wings/slabs (ปีกไม้)", kind: "biomass", hhvDry_kcal: 4700, moisture: 30, hDry: 6.0, bulkDensity: 250 },
  { label: "Palm kernel shell (กะลาปาล์ม)", kind: "biomass", hhvDry_kcal: 4900, moisture: 15, hDry: 6.5, bulkDensity: 620 },
  { label: "Rice husk (แกลบ)", kind: "biomass", hhvDry_kcal: 3750, moisture: 10, hDry: 5.0, bulkDensity: 120 },
  { label: "Wood pellets (ขี้เลื่อยอัดเม็ด)", kind: "biomass", hhvDry_kcal: 4700, moisture: 8, hDry: 6.0, bulkDensity: 620 },
  { label: "Other (อื่นๆ)", kind: "biomass", hhvDry_kcal: 4200, moisture: 25, hDry: 6.0, bulkDensity: 300 },
];

// LHV as-fired from dry-basis HHV, moisture fraction M (0-1), dry-basis hydrogen fraction Hdry (0-1)
function lhvAsFiredKJkg(hhvDryKcal, Mpct, hDryPct) {
  const HHVdry_kJ = hhvDryKcal * KCAL_TO_KJ;
  const M = Mpct / 100, Hdry = hDryPct / 100;
  const HHVar = HHVdry_kJ * (1 - M);
  const waterTotal = M + 9 * Hdry * (1 - M);
  return HHVar - 2443 * waterTotal;
}

// ================= FUEL CONSUMPTION PANEL =================
function FuelConsumptionPanel() {
  const [steamFlow, setSteamFlow] = useState(5000);
  const [steamPressure, setSteamPressure] = useState(9);
  const [pressureIsGauge, setPressureIsGauge] = useState(true);
  const [feedwaterTemp, setFeedwaterTemp] = useState(80);

  const [fuelLabel, setFuelLabel] = useState("Wood chips (ไม้สับ)");
  const [customLhvKcal, setCustomLhvKcal] = useState(9600);
  const [customDensity, setCustomDensity] = useState(0.96);
  const [hhvDryKcal, setHhvDryKcal] = useState(4700);
  const [moisturePct, setMoisturePct] = useState(35);
  const [hDryPct, setHDryPct] = useState(6.0);

  const [boilerEff, setBoilerEff] = useState(80);

  const fuel = FUEL_PRESETS.find(f => f.label === fuelLabel);

  // sync editable fields when fuel selection changes
  const onSelectFuel = (label) => {
    setFuelLabel(label);
    const f = FUEL_PRESETS.find(x => x.label === label);
    if (f.kind === "liquidgas") { setCustomLhvKcal(f.lhv_kcal); setCustomDensity(f.density_kgL); }
    else { setHhvDryKcal(f.hhvDry_kcal); setMoisturePct(f.moisture); setHDryPct(f.hDry); }
  };

  const steam = useMemo(() => {
    const pBarA = pressureIsGauge ? steamPressure + 1.01325 : steamPressure;
    const r = steamLookupByPressure(pBarA);
    return { hg: r.hg, T: r.T };
  }, [steamPressure, pressureIsGauge]);

  const calc = useMemo(() => {
    const hf = feedwaterTemp * 4.186; // approx subcooled liquid enthalpy, kJ/kg
    const dutyPerKg = steam.hg - hf; // kJ/kg steam
    const dutyTotal_kJhr = steamFlow * dutyPerKg; // kJ/hr
    const dutyTotal_kW = dutyTotal_kJhr / 3600;
    const dutyTotal_kcalhr = dutyTotal_kJhr / KCAL_TO_KJ;

    let lhv_kJkg, lhv_kcalkg;
    if (fuel.kind === "liquidgas") {
      lhv_kcalkg = customLhvKcal;
      lhv_kJkg = customLhvKcal * KCAL_TO_KJ;
    } else {
      lhv_kJkg = lhvAsFiredKJkg(hhvDryKcal, moisturePct, hDryPct);
      lhv_kcalkg = lhv_kJkg / KCAL_TO_KJ;
    }

    const fuelEnergyNeeded_kJhr = dutyTotal_kJhr / (boilerEff / 100);
    const fuelConsumption_kgHr = fuelEnergyNeeded_kJhr / lhv_kJkg;

    const literHr = fuel.kind === "liquidgas" ? fuelConsumption_kgHr / customDensity : null;
    const tonDay = (fuelConsumption_kgHr * 24) / 1000;
    const tonMonth = tonDay * 30;
    const cylinders15kgDay = fuelLabel.startsWith("LPG") ? (fuelConsumption_kgHr * 24) / 15 : null;

    return { hf, dutyPerKg, dutyTotal_kJhr, dutyTotal_kW, dutyTotal_kcalhr, lhv_kJkg, lhv_kcalkg,
              fuelConsumption_kgHr, literHr, tonDay, tonMonth, cylinders15kgDay };
  }, [steam, feedwaterTemp, steamFlow, fuel, customLhvKcal, hhvDryKcal, moisturePct, hDryPct, boilerEff, fuelLabel]);

  return (
    <div>
      <StickyResults items={[
        { label: "Fuel", value: fmt(calc.fuelConsumption_kgHr,1), unit: "kg/hr" },
        { label: "LHV (as-fired)", value: fmt(calc.lhv_kcalkg,0), unit: "kcal/kg" },
        { label: "Duty", value: fmt(calc.dutyTotal_kW,0), unit: "kW" },
      ]} />

      <Plate title="Inputs">
        <SubHeader>Steam duty</SubHeader>
        <Field label="Steam capacity" unit="kg/hr" step="50" value={steamFlow} onChange={setSteamFlow} />
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Steam pressure" unit={pressureIsGauge ? "barg" : "bara"} step="0.1" value={steamPressure} onChange={setSteamPressure} />
          <Field label="Feedwater temp." unit="°C" step="1" value={feedwaterTemp} onChange={setFeedwaterTemp} />
        </div>
        <button onClick={() => setPressureIsGauge(!pressureIsGauge)} className="text-[10px] text-sky-400 underline mb-2">
          Switch to {pressureIsGauge ? "absolute" : "gauge"}
        </button>

        <SubHeader>Fuel type</SubHeader>
        <Select label="Fuel" value={fuelLabel} onChange={onSelectFuel} options={FUEL_PRESETS.map(f => ({ label: f.label }))} />

        {fuel.kind === "liquidgas" ? (
          <div className="grid grid-cols-2 gap-x-3">
            <Field label="LHV" unit="kcal/kg" step="50" value={customLhvKcal} onChange={setCustomLhvKcal} />
            <Field label="Density" unit="kg/L" step="0.01" value={customDensity} onChange={setCustomDensity} />
          </div>
        ) : (
          <>
            <Field label="HHV, dry basis" unit="kcal/kg" step="50" value={hhvDryKcal} onChange={setHhvDryKcal} hint="Higher heating value of the bone-dry fuel — a proximate/ultimate analysis certificate gives this precisely." />
            <div className="grid grid-cols-2 gap-x-3">
              <Field label="Moisture content" unit="% as-fired" step="1" value={moisturePct} onChange={setMoisturePct} hint="This is the single biggest lever on fuel consumption — use your actual batch moisture, not a generic default." />
              <Field label="Hydrogen, dry basis" unit="%" step="0.5" value={hDryPct} onChange={setHDryPct} hint="~5–7% typical for woody biomass." />
            </div>
          </>
        )}

        <SubHeader>Boiler</SubHeader>
        <Field label="Boiler efficiency" unit="%" step="1" value={boilerEff} onChange={setBoilerEff} hint="Typical: 85–90% oil/gas, 75–83% biomass grate-fired." />
      </Plate>

      <Plate title="Steam duty">
        <Readout label="Saturation temperature" value={fmt(steam.T,1)} unit="°C" />
        <Readout label="hg (steam)" value={fmt(steam.hg,1)} unit="kJ/kg" />
        <Readout label="hf (feedwater, approx.)" value={fmt(calc.hf,1)} unit="kJ/kg" />
        <Readout label="Duty per kg steam" value={fmt(calc.dutyPerKg,1)} unit="kJ/kg" />
        <Readout label="Total heat duty" value={fmt(calc.dutyTotal_kW,0)} unit="kW" big />
        <Readout label="Total heat duty" value={fmt(calc.dutyTotal_kcalhr,0)} unit="kcal/hr" />
      </Plate>

      <Plate title="Fuel consumption">
        <Readout label="LHV (as-fired)" value={fmt(calc.lhv_kcalkg,0)} unit="kcal/kg" />
        <Readout label="LHV (as-fired)" value={fmt(calc.lhv_kJkg,0)} unit="kJ/kg" />
        <Readout label="Fuel consumption" value={fmt(calc.fuelConsumption_kgHr,1)} unit="kg/hr" big />
        {calc.literHr !== null && (
          <Readout label="Fuel consumption" value={fmt(calc.literHr,1)} unit="L/hr" big />
        )}
        {calc.cylinders15kgDay !== null && (
          <Readout label="Equivalent 15kg cylinders/day" value={fmt(calc.cylinders15kgDay,1)} unit="cylinders/day" />
        )}
        <Readout label="Daily consumption" value={fmt(calc.tonDay,2)} unit="ton/day" />
        <Readout label="Monthly consumption (30-day)" value={fmt(calc.tonMonth,1)} unit="ton/month" />
        <div className="mt-2 text-[10px] text-neutral-500 leading-relaxed">
          For solid biomass, moisture content is the dominant source of variability — a 10-point swing in
          moisture can change fuel consumption more than any other single input. If you have a proximate/
          ultimate analysis for the actual delivered batch, use it instead of the defaults here. This ton/day
          figure is a good cross-check against the Silo/Hopper tab's autonomy calculation for storage sizing.
        </div>
      </Plate>
    </div>
  );
}

function suggestPipeSizeMm(flow_m3hr, velocity_ms) {
  const flow_m3s = flow_m3hr / 3600;
  const area_m2 = flow_m3s / velocity_ms;
  return Math.sqrt((4 * area_m2) / Math.PI) * 1000;
}

// ================= ROUGH VESSEL DRAWING (vertical elevation) =================
function WaterTankDrawing({ diameter_mm, freeboard_mm, layers, headType, filterType }) {
  const margin = 34;
  const px = 180 / Math.max(diameter_mm, freeboard_mm + layers.reduce((s, l) => s + l.depth, 0));
  const dim = (v) => v * px;

  const D = dim(diameter_mm);
  const headDepth = headType === "Flat" ? 6 : D * 0.22;
  const stackHeights = [freeboard_mm, ...layers.map(l => l.depth)];
  const totalStack = stackHeights.reduce((a, b) => a + b, 0);
  const stackPx = dim(totalStack);

  const svgW = D + margin * 2 + 70;
  const svgH = stackPx + headDepth * 2 + margin * 2 + 20;

  const left = margin + 60, right = left + D;
  let y = margin + headDepth;
  const bands = [{ label: "Freeboard / water", depth: freeboard_mm, fill: "#2b4a63" }, ...layers.map(l => ({ label: l.label, depth: l.depth, fill: l.fill }))];

  const bandRects = [];
  for (const b of bands) {
    const h = dim(b.depth);
    bandRects.push({ ...b, y, h });
    y += h;
  }
  const shellBottom = y;

  return (
    <div className="bg-neutral-950 border border-neutral-800 rounded p-2">
      <svg viewBox={`0 0 ${svgW} ${svgH}`} className="w-full h-auto">
        <path d={`M ${left} ${margin + headDepth} Q ${left + D / 2} ${margin - headDepth * 0.4} ${right} ${margin + headDepth}`} fill="#2a2d33" stroke="#8b9098" strokeWidth="1.5" />
        {bandRects.map((b, i) => (
          <rect key={i} x={left} y={b.y} width={D} height={b.h} fill={b.fill} stroke="#8b9098" strokeWidth="0.75" />
        ))}
        <path d={`M ${left} ${shellBottom} Q ${left + D / 2} ${shellBottom + headDepth * 1.6} ${right} ${shellBottom}`} fill="#2a2d33" stroke="#8b9098" strokeWidth="1.5" />
        <line x1={left} y1={margin + headDepth} x2={left} y2={shellBottom} stroke="#8b9098" strokeWidth="1.5" />
        <line x1={right} y1={margin + headDepth} x2={right} y2={shellBottom} stroke="#8b9098" strokeWidth="1.5" />

        {bandRects.map((b, i) => (
          <text key={i} x={right + 8} y={b.y + b.h / 2 + 3} fontSize="8.5" fill="#9aa0a8" fontFamily="monospace">
            {b.label} ({fmt(b.depth,0)}mm)
          </text>
        ))}

        <line x1={left} y1={margin - headDepth * 0.4 - 8} x2={right} y2={margin - headDepth * 0.4 - 8} stroke="#5b616b" />
        <text x={left + D / 2} y={margin - headDepth * 0.4 - 12} fontSize="9" fill="#9aa0a8" fontFamily="monospace" textAnchor="middle">⌀{fmt(diameter_mm,0)}mm</text>

        <line x1={left - 10} y1={margin + headDepth + 4} x2={left} y2={margin + headDepth + 4} stroke="#e8a33d" strokeWidth="2" />
        <text x={left - 12} y={margin + headDepth + 2} fontSize="7.5" fill="#e8a33d" fontFamily="monospace" textAnchor="end">Inlet</text>
        <line x1={left - 10} y1={shellBottom - 4} x2={left} y2={shellBottom - 4} stroke="#5B8FA8" strokeWidth="2" />
        <text x={left - 12} y={shellBottom - 6} fontSize="7.5" fill="#5B8FA8" fontFamily="monospace" textAnchor="end">Outlet</text>
      </svg>
      <div className="text-[9px] text-neutral-500 mt-1 text-center">
        Schematic elevation — {filterType}, {headType.toLowerCase()} heads. Not a fabrication drawing.
      </div>
    </div>
  );
}

    return [{ id: Math.random().toString(36).slice(2), label: "Support gravel", brand: "", model: "", mode: "depth", value: 150 }];
