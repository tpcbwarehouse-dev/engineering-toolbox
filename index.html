const INCLINE_FACTOR_TABLE = [
  { deg: 0, f: 1.0 }, { deg: 5, f: 0.95 }, { deg: 10, f: 0.9 }, { deg: 15, f: 0.8 },
  { deg: 20, f: 0.7 }, { deg: 25, f: 0.58 }, { deg: 30, f: 0.45 }, { deg: 35, f: 0.3 },
];

function inclineFactor(deg) {
  const d = Math.max(0, Math.min(35, deg));
  for (let i = 0; i < INCLINE_FACTOR_TABLE.length - 1; i++) {
    const a = INCLINE_FACTOR_TABLE[i], b = INCLINE_FACTOR_TABLE[i + 1];
    if (d >= a.deg && d <= b.deg) {
      const t = (d - a.deg) / (b.deg - a.deg);
      return a.f + t * (b.f - a.f);
    }
  }
  return 0.3;
}

function screwMaxRpmGuideline(D_mm) {
  // rough CEMA-style guideline, decreasing with diameter
  const table = [ [100,170], [150,140], [200,120], [250,105], [300,95], [350,85], [400,75], [450,70], [500,65], [600,55] ];
  if (D_mm <= table[0][0]) return table[0][1];
  if (D_mm >= table[table.length-1][0]) return table[table.length-1][1];
  for (let i=0;i<table.length-1;i++){
    const [d0,r0]=table[i], [d1,r1]=table[i+1];
    if (D_mm>=d0 && D_mm<=d1){
      const t=(D_mm-d0)/(d1-d0);
      return r0 + t*(r1-r0);
    }
  }
  return 60;
}

// Screw conveyor "Diameter Factor" (Fd) — represents frictional resistance of the screw's own
// weight, independent of load. Table values from published screw conveyor engineering guide data
// (4"–12" primary source; 20" point from a separate worked example, used only to shape extrapolation
// for larger diameters — treat results above ~12" as more approximate).
const FD_TABLE = [[4,10],[5,13],[6,16],[8,24],[10,33],[12,49],[20,165]];
function diameterFactor(D_in) {
  const t = FD_TABLE;
  if (D_in <= t[0][0]) return t[0][1];
  if (D_in >= t[t.length-1][0]) return t[t.length-1][1];
  for (let i=0;i<t.length-1;i++){
    if (D_in>=t[i][0] && D_in<=t[i+1][0]){
      const f=(D_in-t[i][0])/(t[i+1][0]-t[i][0]);
      return t[i][1]+f*(t[i+1][1]-t[i][1]);
    }
  }
}

// "Corrected Material HP" factor — published screw conveyor guides apply an overload correction
// whenever calculated Material HP is small (<5HP), since torque margin for upset conditions (a
// choke, a lump) dominates at low power. Anchored on two verified points from a worked example
// (0.21→0.5 HP and 0.56→1.32 HP, both ≈2.37×) plus no correction needed at the 5HP cutoff.
// This is an approximation of the published curve's shape from limited extracted data, not a
// digitization of the full chart — treat as indicative, particularly well above 1 HP (0.75 kW).
function correctedMaterialHpFactor_kW(mhpKw) {
  const HP_TO_KW = 0.7457;
  const pts = [[0.21*HP_TO_KW, 2.38], [0.56*HP_TO_KW, 2.357], [5*HP_TO_KW, 1.0]];
  if (mhpKw <= pts[0][0]) return pts[0][1];
  if (mhpKw >= pts[pts.length-1][0]) return 1.0;
  for (let i=0;i<pts.length-1;i++){
    if (mhpKw>=pts[i][0] && mhpKw<=pts[i+1][0]){
      const f=(mhpKw-pts[i][0])/(pts[i+1][0]-pts[i][0]);
      return pts[i][1]+f*(pts[i+1][1]-pts[i][1]);
    }
  }
  return 1.0;
}

const HEAD_TYPES = ["Flat", "2:1 Ellipsoidal", "Hemispherical", "Torispherical (F&D)"];

// Volume + depth (sagitta) for each head type. D in metres. Returns { depth_m, volume_m3 }.
function headGeometry(type, D, ellipRatio, torisL_D, torisR_D) {
  if (type === "Flat") return { depth_m: 0, volume_m3: 0 };
  if (type === "Hemispherical") {
    const h = D / 2;
    return { depth_m: h, volume_m3: (Math.PI * D ** 3) / 12 };
  }
  if (type === "2:1 Ellipsoidal") {
    const h = D / (2 * ellipRatio);
    return { depth_m: h, volume_m3: (Math.PI * D * D * h) / 6 };
  }
  // Torispherical (ASME F&D) — exact via numerical integration of the axisymmetric profile
  const L = torisL_D * D;
  const r = torisR_D * D;
  const sf = L - Math.sqrt((L - r) ** 2 - (D / 2 - r) ** 2);
  const zt = (r * (L - sf)) / (L - r);
  const steps = 800;
  const dz = sf / steps;
  let vol = 0;
  for (let i = 0; i < steps; i++) {
    const z = (i + 0.5) * dz;
    let rho;
    if (z <= zt) rho = (D / 2 - r) + Math.sqrt(Math.max(0, r * r - z * z));
    else rho = Math.sqrt(Math.max(0, L * L - (z - (sf - L)) ** 2));
    vol += Math.PI * rho * rho * dz;
  }
  return { depth_m: sf, volume_m3: vol };
}

// Required thickness (mm) per ASME BPVC Sec. VIII Div.1, given P,S in MPa and D,L,CA in mm.
function headReqThickness(type, P, S, E, D, ellipRatio, torisL_D, flatC, CA) {
  if (type === "Flat") return D * Math.sqrt((flatC * P) / (S * E)) + CA;
  if (type === "Hemispherical") return (P * (D / 2)) / (2 * S * E - 0.2 * P) + CA;
  if (type === "2:1 Ellipsoidal") {
    const K = (1 / 6) * (2 + ellipRatio ** 2);
    return (P * D * K) / (2 * S * E - 0.2 * P) + CA;
  }
  // Torispherical
  const L = torisL_D * D;
  return (0.885 * P * L) / (S * E - 0.1 * P) + CA;
}

// MAWP (MPa) for a given corroded thickness tc (mm), inverse of the above.
function headMawp(type, tc, S, E, D, ellipRatio, torisL_D, flatC) {
  if (type === "Flat") return (tc * tc * S * E) / (D * D * flatC);
  if (type === "Hemispherical") return (2 * S * E * tc) / (D / 2 + 0.2 * tc);
  if (type === "2:1 Ellipsoidal") {
    const K = (1 / 6) * (2 + ellipRatio ** 2);
    return (2 * S * E * tc) / (D * K + 0.2 * tc);
  }
  const L = torisL_D * D;
  return (S * E * tc) / (0.885 * L + 0.1 * tc);
}

// Formula + substitution strings for the printed ASME calculation report.
// P in MPa, S in MPa, D in mm. Mirrors headReqThickness()/headMawp() exactly.
function headFormulaInfo(type, P, S, E, D, ellipRatio, torisL_D, flatC, ca) {
  const p3 = (x) => Number(x).toFixed(3);
  if (type === "Flat") {
    return {
      ref: "UG-34, Eq. (1), C = " + p3(flatC),
      formula: "t = d·√(C·P / (S·E)) + CA",
      sub: `t = ${fmt(D,0)} × √(${p3(flatC)} × ${p3(P)} / (${fmt(S,1)} × ${p3(E)})) + ${fmt(ca,1)}`,
      mawpFormula: "MAWP = t_c²·S·E / (d²·C)",
    };
  }
  if (type === "Hemispherical") {
    return {
      ref: "UG-32(f)",
      formula: "t = P·L / (2·S·E − 0.2·P) + CA,  L = D/2",
      sub: `t = ${p3(P)} × ${fmt(D/2,0)} / (2 × ${fmt(S,1)} × ${p3(E)} − 0.2 × ${p3(P)}) + ${fmt(ca,1)}`,
      mawpFormula: "MAWP = 2·S·E·t_c / (L + 0.2·t_c)",
    };
  }
  if (type === "2:1 Ellipsoidal") {
    const K = (1 / 6) * (2 + ellipRatio ** 2);
    return {
      ref: ellipRatio === 2 ? "UG-32(d)" : "App. 1-4(c), K = " + p3(K),
      formula: "t = P·D·K / (2·S·E − 0.2·P) + CA,  K = (1/6)·[2 + (D/2h)²]" + (ellipRatio === 2 ? " = 1.0" : ""),
      sub: `t = ${p3(P)} × ${fmt(D,0)} × ${p3(K)} / (2 × ${fmt(S,1)} × ${p3(E)} − 0.2 × ${p3(P)}) + ${fmt(ca,1)}`,
      mawpFormula: "MAWP = 2·S·E·t_c / (D·K + 0.2·t_c)",
    };
  }
  const L = torisL_D * D;
  return {
    ref: "UG-32(e) — standard torispherical (r ≈ 0.06·L)",
    formula: "t = 0.885·P·L / (S·E − 0.1·P) + CA,  L = " + fmt(torisL_D,2) + "·D = " + fmt(L,0) + " mm",
    sub: `t = 0.885 × ${p3(P)} × ${fmt(L,0)} / (${fmt(S,1)} × ${p3(E)} − 0.1 × ${p3(P)}) + ${fmt(ca,1)}`,
    mawpFormula: "MAWP = S·E·t_c / (0.885·L + 0.1·t_c)",
  };
}

function nearestStandardMotor(kw) {
  for (const m of STD_MOTORS_KW) if (m >= kw) return m;
  return STD_MOTORS_KW[STD_MOTORS_KW.length - 1];
}

function nearestGearboxAtOrBelow(ratio) {
  let best = STD_GEARBOX_RATIOS[0];
  for (const g of STD_GEARBOX_RATIOS) if (g <= ratio) best = g;
  return best;
}

function nearestGearboxRatio(ratio) {
  let best = STD_GEARBOX_RATIOS[0], bestDiff = Infinity;
  for (const g of STD_GEARBOX_RATIOS) {
    const diff = Math.abs(g - ratio);
    if (diff < bestDiff) { bestDiff = diff; best = g; }
  }
  return best;
}

function fmt(n, d = 2) {
  if (!isFinite(n)) return "—";
  return n.toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d });
}

function tr(s) {
  if (CURRENT_LANG === "en" || typeof s !== "string") return s;
  return TH[s] || s;
}

function Field({ label, unit, value, onChange, step = "any", min, hint }) {
  return (
    <label className="block mb-3">
      <div className="flex items-baseline justify-between mb-1">
        <span className="text-[11px] uppercase tracking-wider text-neutral-400 font-semibold">{label}</span>
        {unit && <span className="text-[10px] text-neutral-500 font-mono">{unit}</span>}
      </div>
      <input
        type="number"
        step={step}
        min={min}
        value={value}
        onChange={(e) => onChange(parseFloat(e.target.value))}
        className="w-full bg-neutral-900 border border-neutral-700 focus:border-amber-500 focus:outline-none rounded px-3 py-2 text-neutral-100 font-mono text-sm"
      />
      {hint && <div className="text-[10px] text-neutral-500 mt-1">{hint}</div>}
    </label>
  );
}

function Select({ label, value, onChange, options }) {
  return (
    <label className="block mb-3">
      <div className="text-[11px] uppercase tracking-wider text-neutral-400 font-semibold mb-1">{tr(label)}</div>
      <select
        value={value}
        onChange={(e) => onChange(e.target.value)}
        className="w-full bg-neutral-900 border border-neutral-700 focus:border-amber-500 focus:outline-none rounded px-3 py-2 text-neutral-100 font-mono text-sm"
      >
        {options.map((o) => (
          <option key={o.label} value={o.label}>{o.label}</option>
        ))}
      </select>
    </label>
  );
}

function Plate({ title, children }) {
  return (
    <div className="bg-neutral-900/60 border border-neutral-700 rounded-md p-4 mb-4">
      <div className="text-[11px] uppercase tracking-[0.15em] text-amber-500 font-bold mb-3 border-b border-neutral-700 pb-2">
        {tr(title)}
      </div>
      {children}
    </div>
  );
}

function Readout({ label, value, unit, big }) {
  return (
    <div className="flex items-baseline justify-between py-1.5 border-b border-neutral-800 last:border-0">
      <span className="text-xs text-neutral-400">{tr(label)}</span>
      <span className={`font-mono text-neutral-100 ${big ? "text-lg font-bold text-amber-400" : "text-sm"}`}>
        {value} <span className="text-neutral-500 text-xs">{unit}</span>
      </span>

}

function SubHeader({ children }) {

    <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-bold mt-5 mb-2 pt-3 border-t border-neutral-800 first:mt-0 first:pt-0 first:border-0">

// ================= BELT CONVEYOR MODULE =================
function BeltConveyorPanel({ capacityTPH, setCapacityTPH }) {
  const [densityPreset, setDensityPreset] = useState("Wood chip (biomass)");
  const [customDensity, setCustomDensity] = useState(300);
  const [beltWidth, setBeltWidth] = useState(500);
  const [sidewallHeight, setSidewallHeight] = useState(150);
  const [shapeFactor, setShapeFactor] = useState(0.55);
  const [beltSpeed, setBeltSpeed] = useState(1.0);
  const [length, setLength] = useState(12);
  const [angle, setAngle] = useState(60);
  const [frictionFactor, setFrictionFactor] = useState(0.035);
  const [beltWeightPerM, setBeltWeightPerM] = useState(15);
  const [skirtResistance, setSkirtResistance] = useState(300);
  const [driveEff, setDriveEff] = useState(0.9);
  const [serviceFactor, setServiceFactor] = useState(1.25);
  const [pulleyDia, setPulleyDia] = useState(315);
  const [motorRpm, setMotorRpm] = useState(1450);
  const [driveType, setDriveType] = useState("sprocket"); // 'direct' | 'sprocket'
  const [driverTeeth, setDriverTeeth] = useState(15);

  const density = densityPreset === "Custom…" ? customDensity : BULK_DENSITY_PRESETS.find(p => p.label === densityPreset)?.value ?? customDensity;

  const r = useMemo(() => {
    const A = (beltWidth / 1000) * (sidewallHeight / 1000) * shapeFactor; // m2
    const geomCapacity_m3hr = A * beltSpeed * 3600;
    const geomCapacity_TPH = geomCapacity_m3hr * density / 1000;

    const H = length * Math.sin((angle * Math.PI) / 180);
    const qm = (capacityTPH * 1000) / 3600; // kg/s

    const Wm = qm / beltSpeed; // material mass per metre of belt (kg/m)
    const Wb = beltWeightPerM; // belt mass per metre, single strand (kg/m)

    const Te_lift_N = qm * 9.81 * H; // material lift only — empty belt self-cancels around the loop
    const Te_stdFriction_N = frictionFactor * 9.81 * length * (2 * Wb + Wm); // idler/roller drag on belt + material
    const Te_skirt_N = skirtResistance * length; // sidewall/skirt rubbing seal drag — load-independent
    const Te_total_N = Te_lift_N + Te_stdFriction_N + Te_skirt_N;

    const P_lift_kW = Te_lift_N * beltSpeed / 1000;
    const P_fric_kW = Te_stdFriction_N * beltSpeed / 1000;
    const P_skirt_kW = Te_skirt_N * beltSpeed / 1000;
    const P_shaft_kW = (Te_total_N * beltSpeed) / 1000 / driveEff;
    const P_motor_kW = P_shaft_kW * serviceFactor;
    const P_motor_HP = P_motor_kW / 0.7457;
    const motorSelected = nearestStandardMotor(P_motor_kW);

    const pulleyRpm = (beltSpeed * 60) / (Math.PI * (pulleyDia / 1000));
    const overallRatio = motorRpm / pulleyRpm;

    let gearboxSelected, trimRatio, drivenTeeth, actualTrim, actualOverall, actualPulleyRpm, actualBeltSpeed, speedError, needsSprocket;
    if (driveType === "direct") {
      // No sprocket trim available — pick the closest standard gearbox ratio outright.
      gearboxSelected = nearestGearboxRatio(overallRatio);
      trimRatio = 1; drivenTeeth = driverTeeth; actualTrim = 1;
      actualOverall = gearboxSelected;
      actualPulleyRpm = motorRpm / actualOverall;
      actualBeltSpeed = (actualPulleyRpm * Math.PI * (pulleyDia / 1000)) / 60;
      speedError = ((actualBeltSpeed - beltSpeed) / beltSpeed) * 100;
      needsSprocket = false;
    } else {
      gearboxSelected = nearestGearboxAtOrBelow(overallRatio);
      trimRatio = overallRatio / gearboxSelected;
      drivenTeeth = Math.round(driverTeeth * trimRatio);
      actualTrim = drivenTeeth / driverTeeth;
      actualOverall = gearboxSelected * actualTrim;
      actualPulleyRpm = motorRpm / actualOverall;
      actualBeltSpeed = (actualPulleyRpm * Math.PI * (pulleyDia / 1000)) / 60;
      speedError = ((actualBeltSpeed - beltSpeed) / beltSpeed) * 100;
      needsSprocket = Math.abs(trimRatio - 1) > 0.03;
    }

    return {
      A, geomCapacity_m3hr, geomCapacity_TPH, H,
      P_lift_kW, P_fric_kW, P_skirt_kW, P_shaft_kW, P_motor_kW, P_motor_HP, motorSelected,
      pulleyRpm, overallRatio, gearboxSelected, trimRatio, drivenTeeth, actualTrim,
      actualOverall, actualPulleyRpm, actualBeltSpeed, speedError, needsSprocket,
    };
  }, [capacityTPH, density, beltWidth, sidewallHeight, shapeFactor, beltSpeed, length, angle, frictionFactor, beltWeightPerM, skirtResistance, driveEff, serviceFactor, pulleyDia, motorRpm, driveType, driverTeeth]);

  const capacityWarning = r.geomCapacity_TPH < capacityTPH * 0.98;

  return (
    <div>
      <StickyResults items={[
        { label: "Motor", value: fmt(r.motorSelected,2), unit: "kW" },
        { label: "Gearbox", value: fmt(r.gearboxSelected,1), unit: ":1" },
        { label: "Belt speed", value: fmt(beltSpeed,2), unit: "m/s" },
        ...(capacityWarning ? [{ label: "Capacity", value: "short", unit: "", warn: true }] : []),
      ]} />

      <Plate title="Inputs">
        <SubHeader>Material & duty</SubHeader>
        <Field label="Target capacity" unit="TPH" value={capacityTPH} onChange={setCapacityTPH} />
        <Select label="Material (bulk density)" value={densityPreset} onChange={setDensityPreset} options={BULK_DENSITY_PRESETS} />
        {densityPreset === "Custom…" && (
          <Field label="Bulk density" unit="kg/m³" value={customDensity} onChange={setCustomDensity} />
        )}

        <SubHeader>Belt & pocket geometry</SubHeader>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Belt width" unit="mm" value={beltWidth} onChange={setBeltWidth} />
          <Field label="Sidewall height" unit="mm" value={sidewallHeight} onChange={setSidewallHeight} />
        </div>
        <Field label="Fill / shape factor" unit="0–1" step="0.01" value={shapeFactor} onChange={setShapeFactor} hint="Fraction of belt-width × sidewall-height box actually filled. 0.45–0.65 typical for cleated sidewall belts." />
        <Field label="Belt speed" unit="m/s" step="0.05" value={beltSpeed} onChange={setBeltSpeed} hint="Sidewall belts usually run 0.5–2.0 m/s to limit spillage." />

        <SubHeader>Layout & resistance</SubHeader>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Conveyor length (slope)" unit="m" value={length} onChange={setLength} />
          <Field label="Incline angle" unit="deg" value={angle} onChange={setAngle} />
        </div>
        <Field label="Friction factor (idlers/rollers)" unit="—" step="0.005" value={frictionFactor} onChange={setFrictionFactor} hint="Rolling resistance coefficient for belt+material over idlers. 0.02–0.04 typical." />
        <Field label="Belt weight (single strand)" unit="kg/m" step="0.5" value={beltWeightPerM} onChange={setBeltWeightPerM} hint="Sidewall/cleated belting is heavy — corrugated sidewalls, cleats, thick covers. Often 10–30 kg/m depending on width/height/rating; get this from the belt manufacturer's data sheet if possible." />
        <Field label="Sidewall/skirt rubbing resistance" unit="N/m" step="10" value={skirtResistance} onChange={setSkirtResistance} hint="Drag from rubbing skirts/seals against the sidewalls — usually the dominant resistance term on this belt type, and roughly independent of load. Verify against seal type/pressure; 150–600 N/m is a common range." />
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Drive efficiency" unit="0–1" step="0.01" value={driveEff} onChange={setDriveEff} />
          <Field label="Service factor" unit="×" step="0.05" value={serviceFactor} onChange={setServiceFactor} />
        </div>

        <SubHeader>Gear ratio / sprocket</SubHeader>
        <div className="flex gap-2 mb-3">
          <button onClick={() => setDriveType("direct")} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${driveType === "direct" ? "bg-amber-500 text-neutral-950 border-amber-500" : "border-neutral-700 text-neutral-300"}`}>Direct to gearbox</button>
          <button onClick={() => setDriveType("sprocket")} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${driveType === "sprocket" ? "bg-sky-500 text-neutral-950 border-sky-500" : "border-neutral-700 text-neutral-300"}`}>Gearbox + sprocket trim</button>
        </div>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Pulley diameter" unit="mm" value={pulleyDia} onChange={setPulleyDia} />
          <Select label="Motor sync speed" value={String(motorRpm)} onChange={(v) => setMotorRpm(parseFloat(v))} options={SYNC_RPM.map(v => ({ label: String(v) }))} />
        </div>
        {driveType === "sprocket" && (
          <Field label="Drive sprocket teeth (assumed)" unit="T" value={driverTeeth} onChange={setDriverTeeth} />
        )}
      </Plate>

      <Plate title="Capacity check">
        <Readout label="Geometry-derived capacity" value={fmt(r.geomCapacity_m3hr,1)} unit="m³/hr" />
        <Readout label="Geometry-derived capacity" value={fmt(r.geomCapacity_TPH,2)} unit="TPH" />
        <Readout label="Lift height" value={fmt(r.H,2)} unit="m" />
        {capacityWarning && (
          <div className="mt-2 text-[11px] text-red-400 bg-red-950/40 border border-red-900 rounded px-2 py-1.5">
            Geometry gives less capacity than target — increase belt width, sidewall height, fill factor, or speed.
          </div>
        )}
      </Plate>

      <Plate title="Power & motor selection">
        <Readout label="Power to lift material" value={fmt(r.P_lift_kW,2)} unit="kW" />
        <Readout label="Power — idler/roller friction" value={fmt(r.P_fric_kW,2)} unit="kW" />
        <Readout label="Power — sidewall/skirt rubbing" value={fmt(r.P_skirt_kW,2)} unit="kW" />
        <Readout label="Shaft power (÷ drive eff.)" value={fmt(r.P_shaft_kW,2)} unit="kW" />
        <Readout label="Required motor power" value={fmt(r.P_motor_kW,2)} unit="kW" />
        <Readout label="Required motor power" value={fmt(r.P_motor_HP,2)} unit="HP" />
        <Readout label="Selected standard motor" value={fmt(r.motorSelected,2)} unit="kW" big />
      </Plate>

      <Plate title="Gear ratio / sprocket selection">
        <Readout label="Required pulley speed" value={fmt(r.pulleyRpm,2)} unit="rpm" />
        <Readout label="Overall reduction required" value={fmt(r.overallRatio,2)} unit=":1" />
        <Readout label="Selected gearbox ratio" value={fmt(r.gearboxSelected,1)} unit=":1" big />
        {driveType === "direct" ? (
          <>
            <Readout label="Actual belt speed achieved" value={fmt(r.actualBeltSpeed,3)} unit="m/s" />
            <Readout label="Speed deviation from target" value={fmt(r.speedError,2)} unit="%" />
            {Math.abs(r.speedError) > 5 && (
              <div className="mt-2 text-[11px] text-amber-400 bg-amber-950/30 border border-amber-900 rounded px-2 py-1.5">
                Direct-to-gearbox deviation exceeds 5% — standard ratios don't land close to target here.
                Switch to gearbox + sprocket trim for a precise match, or check for a non-standard ratio option.
              </div>
            )}
          </>
        ) : r.needsSprocket ? (
          <>
            <Readout label="Sprocket trim ratio needed" value={fmt(r.trimRatio,3)} unit=":1" />
            <Readout label="Driven sprocket" value={`${driverTeeth}T → ${r.drivenTeeth}T`} unit="" />
            <Readout label="Actual belt speed achieved" value={fmt(r.actualBeltSpeed,3)} unit="m/s" />
            <Readout label="Speed deviation from target" value={fmt(r.speedError,2)} unit="%" />
          </>
        ) : (
          <div className="mt-2 text-[11px] text-emerald-400 bg-emerald-950/30 border border-emerald-900 rounded px-2 py-1.5">
            Gearbox ratio alone is within 3% of target — no trim sprocket needed, couple direct.
          </div>
        )}
      </Plate>
    </div>
  );
}

// ================= SCREW CONVEYOR MODULE =================
function ScrewConveyorPanel({ beltCapacityTPH }) {
  const [mode, setMode] = useState("rpmToCapacity"); // 'rpmToCapacity' | 'targetToRpm' | 'matchBelt'
  const [diaD, setDiaD] = useState(300);
  const [shaftD, setShaftD] = useState(89);
  const [pitch, setPitch] = useState(300);
  const [loadingEff, setLoadingEff] = useState(0.32);
  const [inclineDeg, setInclineDeg] = useState(0);
  const [densityPreset, setDensityPreset] = useState("Wood chip (biomass)");
  const [customDensity, setCustomDensity] = useState(300);
  const [rpm, setRpm] = useState(40);
  const [targetTPH, setTargetTPH] = useState(15);
  const [convLength, setConvLength] = useState(8);
  const [liftHeight, setLiftHeight] = useState(0);
  const [materialFactor, setMaterialFactor] = useState(2.5);
  const [powerEff, setPowerEff] = useState(0.85);
  const [screwServiceFactor, setScrewServiceFactor] = useState(1.2);
  const [hangerBearing, setHangerBearing] = useState("Bronze / babbitt / oil-impregnated wood");
  const [motorRpm, setMotorRpm] = useState(1450);
  const [driveType, setDriveType] = useState("sprocket"); // 'direct' | 'sprocket'
  const [driverTeeth, setDriverTeeth] = useState(15);

  const density = densityPreset === "Custom…" ? customDensity : BULK_DENSITY_PRESETS.find(p => p.label === densityPreset)?.value ?? customDensity;

  const r = useMemo(() => {
    const A = (Math.PI / 4) * ((diaD / 1000) ** 2 - (shaftD / 1000) ** 2); // m2
    const kfactor = inclineFactor(inclineDeg);
    const perRpm_m3hr = A * (pitch / 1000) * 60 * loadingEff * kfactor; // m3/hr per 1 rpm

    let usedRpm, capacity_m3hr, capacity_TPH;
    const targetForMatch = mode === "matchBelt" ? beltCapacityTPH : targetTPH;
    if (mode === "rpmToCapacity") {
      usedRpm = rpm;
      capacity_m3hr = perRpm_m3hr * rpm;
      capacity_TPH = (capacity_m3hr * density) / 1000;
    } else {
      capacity_TPH = targetForMatch;
      capacity_m3hr = (targetForMatch * 1000) / density;
      usedRpm = perRpm_m3hr > 0 ? capacity_m3hr / perRpm_m3hr : 0;
    }

    const maxRpmGuideline = screwMaxRpmGuideline(diaD);
    const overspeed = usedRpm > maxRpmGuideline;

    // Material HP (before correction) + lift component
    const MHP_kW_raw = (capacity_TPH * convLength * materialFactor) / 367
                      + (capacity_TPH * liftHeight * 2) / 367;
    const overloadFactor = correctedMaterialHpFactor_kW(MHP_kW_raw);
    const MHP_kW_corrected = MHP_kW_raw * overloadFactor;

    // Friction HP — diameter- and speed-dependent, was previously missing entirely
    const Fd = diameterFactor(diaD / 25.4);
    const Fb = HANGER_BEARING_FACTORS.find(h => h.label === hangerBearing)?.Fb ?? 1.7;
    const FHP_kW = convLength * usedRpm * Fd * Fb * 2.44622e-6;

    const P_kW_running = (MHP_kW_corrected + FHP_kW) / powerEff;
    const P_kW = P_kW_running * screwServiceFactor;
    const P_HP = P_kW / 0.7457;

    // Drive selection — screw shaft target speed is usedRpm itself (no pulley conversion needed)
    const overallRatio = usedRpm > 0 ? motorRpm / usedRpm : 0;
    let gearboxSelected, trimRatio, drivenTeeth, actualTrim, actualOverall, actualShaftRpm, speedError, needsSprocket;
    if (driveType === "direct") {
      gearboxSelected = nearestGearboxRatio(overallRatio);
      trimRatio = 1; drivenTeeth = driverTeeth; actualTrim = 1;
      actualOverall = gearboxSelected;
      actualShaftRpm = actualOverall > 0 ? motorRpm / actualOverall : 0;
      speedError = usedRpm > 0 ? ((actualShaftRpm - usedRpm) / usedRpm) * 100 : 0;
      needsSprocket = false;
    } else {
      gearboxSelected = nearestGearboxAtOrBelow(overallRatio);
      trimRatio = gearboxSelected > 0 ? overallRatio / gearboxSelected : 0;
      drivenTeeth = Math.round(driverTeeth * trimRatio);
      actualTrim = drivenTeeth / driverTeeth;
      actualOverall = gearboxSelected * actualTrim;
      actualShaftRpm = actualOverall > 0 ? motorRpm / actualOverall : 0;
      speedError = usedRpm > 0 ? ((actualShaftRpm - usedRpm) / usedRpm) * 100 : 0;
      needsSprocket = Math.abs(trimRatio - 1) > 0.03;
    }

    return { A, kfactor, perRpm_m3hr, usedRpm, capacity_m3hr, capacity_TPH, maxRpmGuideline, overspeed,
             MHP_kW_raw, overloadFactor, MHP_kW_corrected, Fd, Fb, FHP_kW, P_kW_running, P_kW, P_HP,
             overallRatio, gearboxSelected, trimRatio, drivenTeeth, actualTrim, actualOverall, actualShaftRpm, speedError, needsSprocket };
  }, [diaD, shaftD, pitch, loadingEff, inclineDeg, density, mode, rpm, targetTPH, beltCapacityTPH, convLength, liftHeight, materialFactor, powerEff, screwServiceFactor, hangerBearing, motorRpm, driveType, driverTeeth]);

  return (
    <div>
      <StickyResults items={[
        { label: "Speed", value: fmt(r.usedRpm,1), unit: "rpm", warn: r.overspeed },
        { label: "Flow", value: fmt(r.capacity_TPH,2), unit: "TPH" },
        { label: "Motor", value: fmt(nearestStandardMotor(r.P_kW),2), unit: "kW" },
      ]} />

      <Plate title="Inputs">
        <SubHeader>Solve for</SubHeader>
        <div className="flex flex-col gap-2 mb-3">
          <button
            onClick={() => setMode("rpmToCapacity")}
            className={`w-full py-2 rounded text-xs font-semibold uppercase tracking-wide border ${mode === "rpmToCapacity" ? "bg-amber-500 text-neutral-950 border-amber-500" : "border-neutral-700 text-neutral-300"}`}
          >
            RPM → Capacity
          </button>
          <button
            onClick={() => setMode("targetToRpm")}
            className={`w-full py-2 rounded text-xs font-semibold uppercase tracking-wide border ${mode === "targetToRpm" ? "bg-amber-500 text-neutral-950 border-amber-500" : "border-neutral-700 text-neutral-300"}`}
          >
            Target flow → RPM
          </button>
          <button
            onClick={() => setMode("matchBelt")}
            className={`w-full py-2 rounded text-xs font-semibold uppercase tracking-wide border ${mode === "matchBelt" ? "bg-sky-500 text-neutral-950 border-sky-500" : "border-neutral-700 text-neutral-300"}`}
          >
            🔗 Match belt conveyor feed rate
          </button>
        </div>
        {mode === "rpmToCapacity" && (
          <Field label="Screw speed" unit="rpm" value={rpm} onChange={setRpm} />
        )}
        {mode === "targetToRpm" && (
          <Field label="Target mass flow" unit="TPH" value={targetTPH} onChange={setTargetTPH} />
        )}
        {mode === "matchBelt" && (
          <div className="text-[11px] text-sky-400 bg-sky-950/30 border border-sky-900 rounded px-2 py-2">
            Synced to Belt Conveyor tab's target capacity: <span className="font-mono font-bold">{fmt(beltCapacityTPH, 2)} TPH</span>.
            Change it on the Belt tab and this screw's required RPM updates automatically.
          </div>
        )}

        <SubHeader>Screw geometry</SubHeader>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Screw outer dia." unit="mm" value={diaD} onChange={setDiaD} />
          <Field label="Shaft/pipe dia." unit="mm" value={shaftD} onChange={setShaftD} />
        </div>
        <Field label="Pitch" unit="mm" value={pitch} onChange={setPitch} hint="Standard pitch is usually = screw diameter (full pitch)." />
        <Field label="Loading (fill) efficiency" unit="0–1" step="0.01" value={loadingEff} onChange={setLoadingEff} hint="0.15 (abrasive/sluggish) – 0.45 (free-flowing, non-abrasive). Biomass chips/sawdust ≈ 0.30–0.35." />
        <Field label="Incline angle" unit="deg" value={inclineDeg} onChange={setInclineDeg} hint={`Derating factor at this angle: ${fmt(inclineFactor(inclineDeg),2)}`} />

        <SubHeader>Material</SubHeader>
        <Select label="Material (bulk density)" value={densityPreset} onChange={setDensityPreset} options={BULK_DENSITY_PRESETS} />
        {densityPreset === "Custom…" && (
          <Field label="Bulk density" unit="kg/m³" value={customDensity} onChange={setCustomDensity} />
        )}

        <SubHeader>For power estimate</SubHeader>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Conveyor length" unit="m" value={convLength} onChange={setConvLength} />
          <Field label="Lift height" unit="m" value={liftHeight} onChange={setLiftHeight} />
        </div>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Material factor λ" unit="—" step="0.1" value={materialFactor} onChange={setMaterialFactor} hint="~1.2 sawdust, 2–3 wood chip, 3–4 abrasive/EFB." />
          <Field label="Drive efficiency" unit="0–1" step="0.01" value={powerEff} onChange={setPowerEff} />
        </div>
        <Field label="Service factor" unit="×" step="0.05" value={screwServiceFactor} onChange={setScrewServiceFactor} hint="Margin for starting torque under a full/loaded screw, wear, and minor blockages. 1.15–1.5 typical." />
        <Select label="Hanger bearing type" value={hangerBearing} onChange={setHangerBearing} options={HANGER_BEARING_FACTORS.map(h => ({ label: h.label }))} />

        <SubHeader>Drive selection</SubHeader>
        <div className="flex gap-2 mb-3">
          <button onClick={() => setDriveType("direct")} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${driveType === "direct" ? "bg-amber-500 text-neutral-950 border-amber-500" : "border-neutral-700 text-neutral-300"}`}>Direct to gearbox</button>
          <button onClick={() => setDriveType("sprocket")} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${driveType === "sprocket" ? "bg-sky-500 text-neutral-950 border-sky-500" : "border-neutral-700 text-neutral-300"}`}>Gearbox + sprocket trim</button>
        </div>
        <Select label="Motor sync speed" value={String(motorRpm)} onChange={(v) => setMotorRpm(parseFloat(v))} options={SYNC_RPM.map(v => ({ label: String(v) }))} />
        {driveType === "sprocket" && (
          <Field label="Drive sprocket teeth (assumed)" unit="T" value={driverTeeth} onChange={setDriverTeeth} />
        )}
      </Plate>

      <Plate title="Speed & mass flow result">
        <Readout label="Cross-section area (annulus)" value={fmt(r.A * 1e4,1)} unit="cm²" />
        <Readout label="Incline derating factor" value={fmt(r.kfactor,2)} unit="" />
        <Readout label={mode === "rpmToCapacity" ? "Screw speed (input)" : mode === "matchBelt" ? "Required speed (belt-matched)" : "Required screw speed"} value={fmt(r.usedRpm,1)} unit="rpm" big />
        <Readout label="Volumetric capacity" value={fmt(r.capacity_m3hr,2)} unit="m³/hr" />
        <Readout label="Mass flow" value={fmt(r.capacity_TPH,2)} unit="TPH" big />
        <Readout label="Guideline max speed for this dia." value={fmt(r.maxRpmGuideline,0)} unit="rpm" />
        {r.overspeed && (
          <div className="mt-2 text-[11px] text-red-400 bg-red-950/40 border border-red-900 rounded px-2 py-1.5">
            Required speed exceeds typical guideline max for this diameter — consider a larger screw or coarser pitch.
          </div>
        )}
      </Plate>

      <Plate title="Estimated drive power">
        <Readout label="Material HP (raw)" value={fmt(r.MHP_kW_raw,3)} unit="kW" />
        <Readout label="Overload correction factor" value={fmt(r.overloadFactor,2)} unit="×" />
        <Readout label="Material HP (corrected)" value={fmt(r.MHP_kW_corrected,3)} unit="kW" />
        <Readout label="Friction HP (diameter/speed dependent)" value={fmt(r.FHP_kW,3)} unit="kW" />
        <Readout label="Calculated running power" value={fmt(r.P_kW_running,2)} unit="kW" />
        <Readout label="With service factor" value={fmt(r.P_kW,2)} unit="kW" />
        <Readout label="With service factor" value={fmt(r.P_HP,2)} unit="HP" />
        <Readout label="Nearest standard motor" value={fmt(nearestStandardMotor(r.P_kW),2)} unit="kW" big />
        <div className="mt-2 text-[10px] text-neutral-500 leading-relaxed">
          Uses the published screw conveyor method: Material HP (with the standard "corrected material HP"
          overload allowance applied below 5 HP) plus a diameter- and speed-dependent Friction HP for the
          empty screw's own drag. Diameter factor table is verified up to 12"; larger diameters extrapolate
          from it and are more approximate — cross-check against a manufacturer's own chart for anything final.
        </div>
      </Plate>

      <Plate title="Drive selection result">
        <Readout label="Overall reduction required" value={fmt(r.overallRatio,2)} unit=":1" />
        <Readout label="Selected gearbox ratio" value={fmt(r.gearboxSelected,1)} unit=":1" big />
        {driveType === "direct" ? (
          <>
            <Readout label="Actual screw speed achieved" value={fmt(r.actualShaftRpm,2)} unit="rpm" />
            <Readout label="Speed deviation from target" value={fmt(r.speedError,2)} unit="%" />
            {Math.abs(r.speedError) > 5 && (
              <div className="mt-2 text-[11px] text-amber-400 bg-amber-950/30 border border-amber-900 rounded px-2 py-1.5">
                Direct-to-gearbox deviation exceeds 5% — standard ratios don't land close to target here.
                Switch to gearbox + sprocket trim for a precise match.
              </div>
            )}
          </>
        ) : r.needsSprocket ? (
          <>
            <Readout label="Sprocket trim ratio needed" value={fmt(r.trimRatio,3)} unit=":1" />
            <Readout label="Driven sprocket" value={`${driverTeeth}T → ${r.drivenTeeth}T`} unit="" />
            <Readout label="Actual screw speed achieved" value={fmt(r.actualShaftRpm,2)} unit="rpm" />
            <Readout label="Speed deviation from target" value={fmt(r.speedError,2)} unit="%" />
          </>
        ) : (
          <div className="mt-2 text-[11px] text-emerald-400 bg-emerald-950/30 border border-emerald-900 rounded px-2 py-1.5">
            Gearbox ratio alone is within 3% of target — no trim sprocket needed, couple direct.
          </div>
        )}
      </Plate>

      <div className="text-[10px] text-neutral-500 leading-relaxed px-1">
        Simplified sizing estimate (CEMA/DIN-style lumped formulas) for preliminary selection.
        Confirm final motor, gearbox and screw speed against manufacturer torque/speed curves
        and CEMA 350 tables before finalizing.
      </div>
    </div>
  );
}

// ================= 3-VIEW ROUGH DRAWING =================
function ThreeViewDrawing({ binLength, topWidth, straightHeight, hopperHeight, bottomTroughWidth, showVibrator }) {
  const margin = 30;
  const maxDim = Math.max(binLength, topWidth, straightHeight + hopperHeight, 0.5);
  const px = 220 / maxDim; // pixels per meter, shared across all 3 views

  const totalH = straightHeight + hopperHeight;
  const dim = (v) => v * px;

  // ---- View A: front elevation (trapezoid — taper across width, screw axis into the page) ----
  const svgAw = dim(topWidth) + margin * 2;
  const svgAh = dim(totalH) + margin * 2 + 20;
  const topL = margin, topR = margin + dim(topWidth);
  const midY = margin + dim(straightHeight);
  const botY = margin + dim(totalH);
  const botL = margin + dim((topWidth - bottomTroughWidth) / 2);
  const botR = margin + dim((topWidth + bottomTroughWidth) / 2);
  const vibX = botL + (topL - botL) * 0.4;
  const vibY = midY + (botY - midY) * 0.45;
  const shaftCx = (botL + botR) / 2;
  const shaftCy = botY - dim(hopperHeight) * 0.12;

  // ---- View B: side elevation (rectangle, no taper — extruded along screw length) ----
  const svgBw = dim(binLength) + margin * 2;
  const svgBh = dim(totalH) + margin * 2 + 20;

  // ---- View C: plan view (top-down) — trough runs the full bin length ----
  const svgCw = dim(binLength) + margin * 2;
  const svgCh = dim(topWidth) + margin * 2 + 20;
  const slotY1 = margin + dim((topWidth - bottomTroughWidth) / 2);
  const slotY2 = margin + dim((topWidth + bottomTroughWidth) / 2);

  const strokeMain = "#a8adb5";
  const strokeDim = "#5b616b";
  const textDim = { fontSize: 9, fill: "#9aa0a8", fontFamily: "monospace" };

  return (
    <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
      <div className="bg-neutral-950 border border-neutral-800 rounded p-2">
        <div className="text-[10px] text-neutral-500 uppercase tracking-wider mb-1 text-center">Front elevation (taper, screw axis into page)</div>
        <svg viewBox={`0 0 ${svgAw} ${svgAh}`} className="w-full h-auto">
          <path
            d={`M ${topL} ${margin} L ${topR} ${margin} L ${topR} ${midY} L ${botR} ${botY} L ${botL} ${botY} L ${topL} ${midY} Z`}
            fill="#3a3d43" stroke={strokeMain} strokeWidth="1.5"
          />
          <line x1={topL} y1={midY} x2={topR} y2={midY} stroke={strokeDim} strokeDasharray="2,2" />
          <circle cx={shaftCx} cy={shaftCy} r={Math.max(5, dim(bottomTroughWidth) * 0.18)} fill="#6b6f76" stroke="#cfd2d6" strokeWidth="1" />
          <text x={shaftCx} y={botY + 14} style={textDim} textAnchor="middle" fill="#c8ccd1">screw</text>
          {showVibrator && (
            <g>
              <rect x={vibX - 7} y={vibY - 5} width="14" height="10" fill="#5B8FA8" stroke="#cfe3ec" strokeWidth="0.5" transform={`rotate(${-Math.atan2(botY-midY, botL-topL)*180/Math.PI} ${vibX} ${vibY})`} />
              <text x={vibX + 12} y={vibY} style={textDim} fill="#8fc4dc">VIB</text>
            </g>
          )}
          {/* dimension: top width */}
          <line x1={topL} y1={margin - 10} x2={topR} y2={margin - 10} stroke={strokeDim} />
          <text x={(topL + topR) / 2} y={margin - 14} style={textDim} textAnchor="middle">{fmt(topWidth,2)} m</text>
          {/* dimension: straight height */}
          <text x={topL - 6} y={(margin + midY) / 2} style={textDim} textAnchor="end">{fmt(straightHeight,2)}</text>
          {/* dimension: hopper height */}
          <text x={topL - 6} y={(midY + botY) / 2} style={textDim} textAnchor="end">{fmt(hopperHeight,2)}</text>
          {/* dimension: bottom trough width */}
          <line x1={botL} y1={botY + 22} x2={botR} y2={botY + 22} stroke={strokeDim} />
          <text x={(botL + botR) / 2} y={botY + 34} style={textDim} textAnchor="middle">{fmt(bottomTroughWidth,2)} m</text>
        </svg>
      </div>

      <div className="bg-neutral-950 border border-neutral-800 rounded p-2">
        <div className="text-[10px] text-neutral-500 uppercase tracking-wider mb-1 text-center">Side elevation (no taper — extruded)</div>
        <svg viewBox={`0 0 ${svgBw} ${svgBh}`} className="w-full h-auto">
          <rect x={margin} y={margin} width={dim(binLength)} height={dim(totalH)} fill="#3a3d43" stroke={strokeMain} strokeWidth="1.5" />
          <line x1={margin} y1={margin + dim(straightHeight)} x2={margin + dim(binLength)} y2={margin + dim(straightHeight)} stroke={strokeDim} strokeDasharray="2,2" />
          <line x1={margin} y1={margin - 10} x2={margin + dim(binLength)} y2={margin - 10} stroke={strokeDim} />
          <text x={margin + dim(binLength) / 2} y={margin - 14} style={textDim} textAnchor="middle">{fmt(binLength,2)} m</text>
        </svg>
      </div>

      <div className="bg-neutral-950 border border-neutral-800 rounded p-2">
        <div className="text-[10px] text-neutral-500 uppercase tracking-wider mb-1 text-center">Plan view (top-down)</div>
        <svg viewBox={`0 0 ${svgCw} ${svgCh}`} className="w-full h-auto">
          <rect x={margin} y={margin} width={dim(binLength)} height={dim(topWidth)} fill="#3a3d43" stroke={strokeMain} strokeWidth="1.5" />
          <rect x={margin} y={slotY1} width={dim(binLength)} height={slotY2 - slotY1} fill="none" stroke="#e8a33d" strokeDasharray="3,2" strokeWidth="1.5" />
          <line x1={margin} y1={(slotY1 + slotY2) / 2} x2={margin + dim(binLength)} y2={(slotY1 + slotY2) / 2} stroke="#5B8FA8" strokeWidth="1" markerEnd="url(#arrow)" />
          <defs>
            <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
              <path d="M0,0 L6,3 L0,6 Z" fill="#5B8FA8" />
            </marker>
          </defs>
          <text x={margin + dim(binLength) + 4} y={(slotY1 + slotY2) / 2 + 3} style={textDim} fill="#8fc4dc">screw axis</text>
          <text x={margin + dim(binLength) / 2} y={margin - 8} style={textDim} textAnchor="middle">{fmt(binLength,2)} m</text>
          <text x={margin - 6} y={margin + dim(topWidth) / 2} style={textDim} textAnchor="end">{fmt(topWidth,2)}</text>
        </svg>
      </div>
    </div>
  );
}

// ================= SILO / HOPPER + RECLAIM SCREW MODULE =================
function SiloHopperPanel() {
  // geometry — screw runs along the constant "bin length"; taper is across width only
  const [binLength, setBinLength] = useState(4.0);
  const [topWidth, setTopWidth] = useState(1.5);
  const [straightHeight, setStraightHeight] = useState(1.8);
  const [hopperHeight, setHopperHeight] = useState(1.6);
  const [bottomTroughWidth, setBottomTroughWidth] = useState(0.5);
  const [fillFactor, setFillFactor] = useState(0.85);
  const [minAngleHoriz, setMinAngleHoriz] = useState(60);
  const [densityPreset, setDensityPreset] = useState("Wood chip (biomass)");
  const [customDensity, setCustomDensity] = useState(300);

  // consumption / autonomy
  const [consumptionTPH, setConsumptionTPH] = useState(2.5);

  // reclaim screw
  const [screwMode, setScrewMode] = useState("consumptionToRpm"); // 'consumptionToRpm' | 'rpmToCapacity'
  const [diaD, setDiaD] = useState(250);
  const [shaftD, setShaftD] = useState(76);
  const [pitch, setPitch] = useState(200);
  const [loadingEff, setLoadingEff] = useState(0.2);
  const [rpmInput, setRpmInput] = useState(30);
  const [materialFactor, setMaterialFactor] = useState(3);
  const [powerEff, setPowerEff] = useState(0.85);
  const [reclaimServiceFactor, setReclaimServiceFactor] = useState(1.2);
  const [hangerBearing, setHangerBearing] = useState("Bronze / babbitt / oil-impregnated wood");

  // vibration motor (anti-bridging)
  const [includeVibrator, setIncludeVibrator] = useState(false);
  const [vibMultiplier, setVibMultiplier] = useState(2.5);

  const density = densityPreset === "Custom…" ? customDensity : BULK_DENSITY_PRESETS.find(p => p.label === densityPreset)?.value ?? customDensity;

  const geo = useMemo(() => {
    const V_straight = binLength * topWidth * straightHeight;
    const trapArea = ((topWidth + bottomTroughWidth) / 2) * hopperHeight;
    const V_hopper = trapArea * binLength;
    const V_total = V_straight + V_hopper;
    const V_effective = V_total * fillFactor;
    const mass_kg = V_effective * density;
    const mass_ton = mass_kg / 1000;
    const consumption_kg_hr = consumptionTPH * 1000;
    const autonomy_hr = consumption_kg_hr > 0 ? mass_kg / consumption_kg_hr : Infinity;
    const autonomy_day = autonomy_hr / 24;

    const horizOffsetPerSide = (topWidth - bottomTroughWidth) / 2;
    const angleFromVertical = (Math.atan(horizOffsetPerSide / hopperHeight) * 180) / Math.PI;
    const angleFromHorizontal = 90 - angleFromVertical;
    const flowOk = angleFromHorizontal >= minAngleHoriz;

    return { V_straight, V_hopper, V_total, V_effective, mass_kg, mass_ton, autonomy_hr, autonomy_day, angleFromVertical, angleFromHorizontal, flowOk };
  }, [binLength, topWidth, straightHeight, hopperHeight, bottomTroughWidth, fillFactor, density, consumptionTPH, minAngleHoriz]);

  const vib = useMemo(() => {
    const hopperMaterialWeight_kg = geo.V_hopper * fillFactor * density;
    const requiredForce_kgf = hopperMaterialWeight_kg * vibMultiplier;
    const requiredForce_N = requiredForce_kgf * 9.81;
    const selected = nearestVibrator(requiredForce_kgf);
    return { hopperMaterialWeight_kg, requiredForce_kgf, requiredForce_N, selected };
  }, [geo.V_hopper, fillFactor, density, vibMultiplier]);

  const screw = useMemo(() => {
    const A = (Math.PI / 4) * ((diaD / 1000) ** 2 - (shaftD / 1000) ** 2);
    const perRpm_m3hr = A * (pitch / 1000) * 60 * loadingEff;
    let usedRpm, capacity_m3hr, capacity_TPH;
    if (screwMode === "rpmToCapacity") {
      usedRpm = rpmInput;
      capacity_m3hr = perRpm_m3hr * rpmInput;
      capacity_TPH = (capacity_m3hr * density) / 1000;
    } else {
      capacity_TPH = consumptionTPH;
      capacity_m3hr = (consumptionTPH * 1000) / density;
      usedRpm = perRpm_m3hr > 0 ? capacity_m3hr / perRpm_m3hr : 0;
    }
    const maxRpmGuideline = screwMaxRpmGuideline(diaD);
    const overspeed = usedRpm > maxRpmGuideline;
    // conveying length = the reclaim screw's actual run length (binLength), not the trough width
    const MHP_kW_raw = (capacity_TPH * binLength * materialFactor) / 367;
    const overloadFactor = correctedMaterialHpFactor_kW(MHP_kW_raw);
    const MHP_kW_corrected = MHP_kW_raw * overloadFactor;
    const Fd = diameterFactor(diaD / 25.4);
    const Fb = HANGER_BEARING_FACTORS.find(h => h.label === hangerBearing)?.Fb ?? 1.7;
    const FHP_kW = binLength * usedRpm * Fd * Fb * 2.44622e-6;
    const P_kW_running = (MHP_kW_corrected + FHP_kW) / powerEff;
    const P_kW = P_kW_running * reclaimServiceFactor;
    const P_HP = P_kW / 0.7457;
    return { A, perRpm_m3hr, usedRpm, capacity_m3hr, capacity_TPH, maxRpmGuideline, overspeed,
             MHP_kW_raw, overloadFactor, MHP_kW_corrected, Fd, Fb, FHP_kW, P_kW_running, P_kW, P_HP };
  }, [diaD, shaftD, pitch, loadingEff, screwMode, rpmInput, consumptionTPH, density, binLength, materialFactor, powerEff, reclaimServiceFactor, hangerBearing]);

  return (
    <div>
      <StickyResults items={[
        { label: "Storage", value: fmt(geo.mass_ton,2), unit: "t" },
        { label: "Autonomy", value: fmt(geo.autonomy_hr,1), unit: "hr" },
        { label: "Wall angle", value: fmt(geo.angleFromHorizontal,1), unit: "°", warn: !geo.flowOk },
        { label: "Reclaim motor", value: fmt(nearestStandardMotor(screw.P_kW),2), unit: "kW" },
      ]} />

      <Plate title="Rough general arrangement (3 views)">
        <ThreeViewDrawing
          binLength={binLength}
          topWidth={topWidth}
          straightHeight={straightHeight}
          hopperHeight={hopperHeight}
          bottomTroughWidth={bottomTroughWidth}
          showVibrator={includeVibrator}
        />
        <div className="text-[10px] text-neutral-500 mt-2 leading-relaxed">
          Schematic, to relative scale from your inputs — not a fabrication drawing. The screw axis runs
          along the bin length (into the page in the front elevation); the taper is across the width.
        </div>
      </Plate>

      <Plate title="Inputs">
        <SubHeader>Hopper geometry (straight + wedge)</SubHeader>
        <div className="text-[10px] text-neutral-500 mb-3 leading-relaxed">
          Wedge-bottom bin: the reclaim screw runs the full bin length (no taper along that axis).
          The hopper tapers across the width only, down to a trough matching the screw diameter,
          running the entire bin length underneath.
        </div>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Bin length (screw axis, constant)" unit="m" step="0.1" value={binLength} onChange={setBinLength} />
          <Field label="Top width (tapers)" unit="m" step="0.1" value={topWidth} onChange={setTopWidth} />
        </div>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Straight wall height" unit="m" step="0.1" value={straightHeight} onChange={setStraightHeight} />
          <Field label="Hopper (taper) height" unit="m" step="0.1" value={hopperHeight} onChange={setHopperHeight} />
        </div>
        <Field label="Bottom trough width" unit="m" step="0.05" value={bottomTroughWidth} onChange={setBottomTroughWidth} hint="Width of the discharge trough at the very bottom — matches the screw's outer diameter plus clearance, running the full bin length." />
        <Field label="Fill factor" unit="0–1" step="0.01" value={fillFactor} onChange={setFillFactor} hint="Usable volume vs full geometric volume — accounts for headspace, bridging clearance, uneven fill." />
        <Field label="Min. recommended angle from horizontal" unit="deg" value={minAngleHoriz} onChange={setMinAngleHoriz} hint="Rule-of-thumb design minimum, not a substitute for a Jenike flow-property test." />

        <SubHeader>Material & consumption</SubHeader>
        <Select label="Material (bulk density)" value={densityPreset} onChange={setDensityPreset} options={BULK_DENSITY_PRESETS} />
        {densityPreset === "Custom…" && (
          <Field label="Bulk density" unit="kg/m³" value={customDensity} onChange={setCustomDensity} />
        )}
        <Field label="Consumption rate" unit="TPH" step="0.1" value={consumptionTPH} onChange={setConsumptionTPH} hint="Boiler/process fuel burn rate — also drives the reclaim screw sizing below." />

        <SubHeader>Reclaim screw feeder</SubHeader>
        <div className="flex flex-col gap-2 mb-3">
          <button
            onClick={() => setScrewMode("consumptionToRpm")}
            className={`w-full py-2 rounded text-xs font-semibold uppercase tracking-wide border ${screwMode === "consumptionToRpm" ? "bg-sky-500 text-neutral-950 border-sky-500" : "border-neutral-700 text-neutral-300"}`}
          >
            🔗 Match consumption → required RPM
          </button>
          <button
            onClick={() => setScrewMode("rpmToCapacity")}
            className={`w-full py-2 rounded text-xs font-semibold uppercase tracking-wide border ${screwMode === "rpmToCapacity" ? "bg-amber-500 text-neutral-950 border-amber-500" : "border-neutral-700 text-neutral-300"}`}
          >
            RPM → Capacity check
          </button>
        </div>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Screw outer dia." unit="mm" value={diaD} onChange={setDiaD} />
          <Field label="Shaft dia." unit="mm" value={shaftD} onChange={setShaftD} />
        </div>
        <Field label="Pitch" unit="mm" value={pitch} onChange={setPitch} />
        <Field label="Loading (fill) efficiency" unit="0–1" step="0.01" value={loadingEff} onChange={setLoadingEff} hint="Live-bottom reclaim screws typically run lower fill (0.15–0.25) than transfer screws since they draw unevenly along the trough." />
        {screwMode === "rpmToCapacity" && (
          <Field label="Screw speed" unit="rpm" value={rpmInput} onChange={setRpmInput} />
        )}
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Material factor λ" unit="—" step="0.1" value={materialFactor} onChange={setMaterialFactor} />
          <Field label="Drive efficiency" unit="0–1" step="0.01" value={powerEff} onChange={setPowerEff} />
        </div>
        <Field label="Service factor" unit="×" step="0.05" value={reclaimServiceFactor} onChange={setReclaimServiceFactor} hint="Margin for starting torque under a loaded screw, wear, and blockages. 1.15–1.5 typical." />
        <Select label="Hanger bearing type" value={hangerBearing} onChange={setHangerBearing} options={HANGER_BEARING_FACTORS.map(h => ({ label: h.label }))} />

        <SubHeader>Vibration motor (anti-bridging)</SubHeader>
        <button
          onClick={() => setIncludeVibrator(!includeVibrator)}
          className={`w-full py-2 mb-3 rounded text-xs font-semibold uppercase tracking-wide border ${includeVibrator ? "bg-sky-500 text-neutral-950 border-sky-500" : "border-neutral-700 text-neutral-300"}`}
        >
          {includeVibrator ? "✓ Vibration motor included" : "+ Add vibration motor"}
        </button>
        {!geo.flowOk && !includeVibrator && (
          <div className="mb-3 text-[11px] text-amber-400 bg-amber-950/30 border border-amber-900 rounded px-2 py-1.5">
            Wall angle is shallow — biomass is prone to bridging here. Consider enabling a vibration motor.
          </div>
        )}
        {includeVibrator && (
          <Field label="Sizing multiplier (force ÷ static weight)" unit="×" step="0.1" value={vibMultiplier} onChange={setVibMultiplier} hint="Typical hopper wall vibrators are sized at 2–4× the static weight of material bearing on the vibrated panel." />
        )}
      </Plate>

      <Plate title="Volume & storage capacity">
        <Readout label="Straight section volume" value={fmt(geo.V_straight,2)} unit="m³" />
        <Readout label="Hopper (wedge) volume" value={fmt(geo.V_hopper,2)} unit="m³" />
        <Readout label="Total geometric volume" value={fmt(geo.V_total,2)} unit="m³" />
        <Readout label="Effective usable volume" value={fmt(geo.V_effective,2)} unit="m³" big />
        <Readout label="Storage mass capacity" value={fmt(geo.mass_ton,2)} unit="tonnes" big />
      </Plate>

      <Plate title="Autonomy">
        <Readout label="Runtime at set consumption" value={fmt(geo.autonomy_hr,1)} unit="hours" big />
        <Readout label="Runtime at set consumption" value={fmt(geo.autonomy_day,2)} unit="days" />
      </Plate>

      <Plate title="Hopper wall flow check">
        <Readout label="Wall angle from vertical" value={fmt(geo.angleFromVertical,1)} unit="deg" />
        <Readout label="Wall angle from horizontal" value={fmt(geo.angleFromHorizontal,1)} unit="deg" big />
        {geo.flowOk ? (
          <div className="mt-2 text-[11px] text-emerald-400 bg-emerald-950/30 border border-emerald-900 rounded px-2 py-1.5">
            Wall angle meets your {minAngleHoriz}° minimum — reasonable for reliable gravity flow of biomass.
            Confirm against actual angle of repose / wall friction for the specific fuel if this is a firm design.
          </div>
        ) : (
          <div className="mt-2 text-[11px] text-red-400 bg-red-950/40 border border-red-900 rounded px-2 py-1.5">
            Wall angle is shallower than your {minAngleHoriz}° minimum — biomass (chips, EFB, bark) is prone to
            bridging/ratholing at shallow angles. Steepen the hopper (more height or narrower trough),
            or add flow aids (vibrator, air cannon, agitator).
          </div>
        )}
      </Plate>

      {includeVibrator && (
        <Plate title="Vibration motor result">
          <Readout label="Material weight in hopper section" value={fmt(vib.hopperMaterialWeight_kg,0)} unit="kg" />
          <Readout label="Required centrifugal force" value={fmt(vib.requiredForce_kgf,0)} unit="kgf" />
          <Readout label="Required centrifugal force" value={fmt(vib.requiredForce_N,0)} unit="N" />
          <Readout label="Indicative vibrator motor" value={fmt(vib.selected.kw,2)} unit="kW" big />
          <div className="mt-2 text-[10px] text-neutral-500 leading-relaxed">
            Mount on the lower third of the steepest sloped wall panel, on a stiffened/reinforced plate
            (isolated from the main structure where possible). This table is a generic 3000 rpm-class
            reference — confirm final model against the vendor's selection chart for your actual wall
            plate size and material.
          </div>
        </Plate>
      )}

      <Plate title="Reclaim screw result">
        <Readout label={screwMode === "rpmToCapacity" ? "Screw speed (input)" : "Required screw speed"} value={fmt(screw.usedRpm,1)} unit="rpm" big />
        <Readout label="Capacity at this speed" value={fmt(screw.capacity_m3hr,2)} unit="m³/hr" />
        <Readout label="Mass flow at this speed" value={fmt(screw.capacity_TPH,2)} unit="TPH" />
        <Readout label="Guideline max speed for this dia." value={fmt(screw.maxRpmGuideline,0)} unit="rpm" />
        {screw.overspeed && (
          <div className="mt-2 text-[11px] text-red-400 bg-red-950/40 border border-red-900 rounded px-2 py-1.5">
            Required speed exceeds the typical guideline max — use a larger diameter, coarser pitch, or split into two screws.
          </div>
        )}
        <Readout label="Material HP (raw)" value={fmt(screw.MHP_kW_raw,3)} unit="kW" />
        <Readout label="Overload correction factor" value={fmt(screw.overloadFactor,2)} unit="×" />
        <Readout label="Material HP (corrected)" value={fmt(screw.MHP_kW_corrected,3)} unit="kW" />
        <Readout label="Friction HP (diameter/speed dependent)" value={fmt(screw.FHP_kW,3)} unit="kW" />
        <Readout label="Calculated running power" value={fmt(screw.P_kW_running,2)} unit="kW" />
        <Readout label="With service factor" value={fmt(screw.P_kW,2)} unit="kW" />
        <Readout label="Nearest standard motor" value={fmt(nearestStandardMotor(screw.P_kW),2)} unit="kW" big />
        <div className="mt-2 text-[10px] text-neutral-500 leading-relaxed">
          Uses the published screw conveyor method: Material HP (with the standard "corrected material HP"
          overload allowance below 5 HP) plus a diameter- and speed-dependent Friction HP. Diameter factor
          table verified to 12"; larger diameters extrapolate and are more approximate.
        </div>
      </Plate>

      <div className="text-[10px] text-neutral-500 leading-relaxed px-1">
        Storage and flow figures assume a single-taper (wedge) hopper matching the trough profile shown.
        For conical or pyramidal hoppers, or for hard biomass flow-property data, size final geometry with
        a Jenike shear test rather than the rule-of-thumb angle check above.
      </div>
    </div>
  );
}


function TextField({ label, value, onChange, placeholder, area }) {
  return (
    <label className="block mb-3">
      <div className="text-[11px] uppercase tracking-wider text-neutral-400 font-semibold mb-1">{tr(label)}</div>
      {area ? (
        <textarea
          value={value}
          onChange={(e) => onChange(e.target.value)}
          placeholder={placeholder}
          rows={2}
          className="w-full bg-neutral-900 border border-neutral-700 focus:border-amber-500 focus:outline-none rounded px-3 py-2 text-neutral-100 text-sm"
        />
      ) : (
        <input
          type="text"
          value={value}
          onChange={(e) => onChange(e.target.value)}
          placeholder={placeholder}
          className="w-full bg-neutral-900 border border-neutral-700 focus:border-amber-500 focus:outline-none rounded px-3 py-2 text-neutral-100 text-sm"
        />
      )}
    </label>
  );
}

function HeadInputs({ label, type, setType, ratio, setRatio, torisL, setTorisL, torisR, setTorisR, flatC, setFlatC }) {
  return (
    <div className="mb-3 border border-neutral-800 rounded p-2">
      <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-semibold mb-2">{label}</div>
      <Select label="Head type" value={type} onChange={setType} options={HEAD_TYPES.map(h => ({ label: h }))} />
      {type === "2:1 Ellipsoidal" && (
        <Field label="Ratio D/2h" unit="—" step="0.1" value={ratio} onChange={setRatio} hint="2.0 = standard 2:1 semi-elliptical head." />
      )}
      {type === "Torispherical (F&D)" && (
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Crown radius L/D" unit="—" step="0.05" value={torisL} onChange={setTorisL} hint="1.0 = standard ASME F&D." />
          <Field label="Knuckle radius r/D" unit="—" step="0.01" value={torisR} onChange={setTorisR} hint="0.06 = standard 6% knuckle." />
        </div>
      )}
      {type === "Flat" && (
        <Field label="Attachment factor C" unit="—" step="0.01" value={flatC} onChange={setFlatC} hint="Per UG-34; 0.33 is a common conservative default — verify against the actual edge/attachment detail." />
      )}
    </div>
  );
}

function TankVesselPanel() {
  // identification
  const [tag, setTag] = useState("T-001");
  const [service, setService] = useState("Latex Storage Tank");
  const [description, setDescription] = useState("Horizontal cylindrical storage tank, SUS304, atmospheric.");
  const [docNo, setDocNo] = useState("");
  const [rev, setRev] = useState("0");

  // geometry
  const [idMm, setIdMm] = useState(2000);
  const [tanTanMm, setTanTanMm] = useState(6000);
  const [sfPerHead, setSfPerHead] = useState(25);

  const [headAType, setHeadAType] = useState("2:1 Ellipsoidal");
  const [headARatio, setHeadARatio] = useState(2.0);
  const [headATorisL, setHeadATorisL] = useState(1.0);
  const [headATorisR, setHeadATorisR] = useState(0.06);
  const [headAFlatC, setHeadAFlatC] = useState(0.33);

  const [headBType, setHeadBType] = useState("2:1 Ellipsoidal");
  const [headBRatio, setHeadBRatio] = useState(2.0);
  const [headBTorisL, setHeadBTorisL] = useState(1.0);
  const [headBTorisR, setHeadBTorisR] = useState(0.06);
  const [headBFlatC, setHeadBFlatC] = useState(0.33);

  // design conditions
  const [designPBar, setDesignPBar] = useState(3.5);
  const [designTempC, setDesignTempC] = useState(60);
  const [materialLabel, setMaterialLabel] = useState("SA-240-304 (SS)");
  const [customS, setCustomS] = useState(138);
  const [jointLabel, setJointLabel] = useState("Spot radiography (E = 0.85)");
  const [caMm, setCaMm] = useState(0);

  // actual/nominal thicknesses for MAWP check
  const [shellNomMm, setShellNomMm] = useState(8);
  const [headANomMm, setHeadANomMm] = useState(8);
  const [headBNomMm, setHeadBNomMm] = useState(8);

  // nozzles
  const [nozzles, setNozzles] = useState([
    { tag: "N1", service: "Fill inlet", size: "80A", rating: "150#/SCH40S", location: "Top, near Head A" },
    { tag: "N2", service: "Outlet", size: "80A", rating: "150#/SCH40S", location: "Bottom, near Head B" },
    { tag: "MW1", service: "Manway", size: "500 NB", rating: "—", location: "Top, mid-length" },
  ]);
  const addNozzle = () => setNozzles([...nozzles, { tag: "", service: "", size: "", rating: "", location: "" }]);
  const removeNozzle = (i) => setNozzles(nozzles.filter((_, idx) => idx !== i));
  const updateNozzle = (i, field, val) => setNozzles(nozzles.map((n, idx) => (idx === i ? { ...n, [field]: val } : n)));

  // paint
  const [surfacePrep, setSurfacePrep] = useState("SSPC-SP6 / Sa2");
  const [primer, setPrimer] = useState("Epoxy zinc-rich primer, 75 µm DFT");
  const [topcoat, setTopcoat] = useState("Epoxy topcoat, 100 µm DFT");
  const [paintColor, setPaintColor] = useState("RAL 7035 (Light Grey)");

  // additional components (manual)
  const [components, setComponents] = useState([
    { description: "Magnetic level gauge", qty: "1", notes: "Full length, top-mounted" },
    { description: "High-level float switch", qty: "1", notes: "SPDT, top nozzle" },
  ]);
  const addComponent = () => setComponents([...components, { description: "", qty: "", notes: "" }]);
  const removeComponent = (i) => setComponents(components.filter((_, idx) => idx !== i));
  const updateComponent = (i, field, val) => setComponents(components.map((c, idx) => (idx === i ? { ...c, [field]: val } : c)));

  const S = materialLabel === "Custom…" ? customS : MATERIAL_PRESETS.find(m => m.label === materialLabel)?.S ?? customS;
  const E = JOINT_EFFICIENCIES.find(j => j.label === jointLabel)?.E ?? 1.0;
  const P_MPa = designPBar * 0.1;

  const calc = useMemo(() => {
    const D_m = idMm / 1000;
    const L_m = tanTanMm / 1000;
    const V_shell = (Math.PI / 4) * D_m * D_m * L_m;
    const headA = headGeometry(headAType, D_m, headARatio, headATorisL, headATorisR);
    const headB = headGeometry(headBType, D_m, headBRatio, headBTorisL, headBTorisR);
    const V_total = V_shell + headA.volume_m3 + headB.volume_m3;
    const liters = V_total * 1000;
    const usGal = V_total * 264.172;
    const ukGal = V_total * 219.969;
    const OAL_mm = tanTanMm + 2 * sfPerHead + headA.depth_m * 1000 + headB.depth_m * 1000;

    const t_shell_req = (P_MPa * (idMm / 2)) / (S * E - 0.6 * P_MPa) + caMm;
    const t_headA_req = headReqThickness(headAType, P_MPa, S, E, idMm, headARatio, headATorisL, headAFlatC, caMm);
    const t_headB_req = headReqThickness(headBType, P_MPa, S, E, idMm, headBRatio, headBTorisL, headBFlatC, caMm);

    const tc_shell = shellNomMm - caMm;
    const tc_headA = headANomMm - caMm;
    const tc_headB = headBNomMm - caMm;
    const mawp_shell = (S * E * tc_shell) / (idMm / 2 + 0.6 * tc_shell) * 10; // MPa -> bar
    const mawp_headA = headMawp(headAType, tc_headA, S, E, idMm, headARatio, headATorisL, headAFlatC) * 10;
    const mawp_headB = headMawp(headBType, tc_headB, S, E, idMm, headBRatio, headBTorisL, headBFlatC) * 10;
    const mawp_governing = Math.min(mawp_shell, mawp_headA, mawp_headB);
    const hydrotest_bar = 1.3 * mawp_governing;

    return {
      V_shell, headA, headB, V_total, liters, usGal, ukGal, OAL_mm,
      t_shell_req, t_headA_req, t_headB_req,
      mawp_shell, mawp_headA, mawp_headB, mawp_governing, hydrotest_bar,
    };
  }, [idMm, tanTanMm, sfPerHead, headAType, headARatio, headATorisL, headATorisR, headAFlatC,
      headBType, headBRatio, headBTorisL, headBTorisR, headBFlatC, S, E, P_MPa, caMm,
      shellNomMm, headANomMm, headBNomMm]);

  const shellOk = shellNomMm >= calc.t_shell_req;
  const headAOk = headANomMm >= calc.t_headA_req;
  const headBOk = headBNomMm >= calc.t_headB_req;

  return (
    <div>
      <style>{`
        @page { size: A4; margin: 12mm; }
        @media print {
          .no-print { display: none !important; }
          .print-sheet { display: block !important; }
          body { background: white; }
          .print-sheet table { page-break-inside: avoid; }
          .print-sheet .print-section { page-break-inside: avoid; }
        }
        .print-sheet { display: none; }
      `}</style>

      <div className="no-print flex justify-end mb-3">
        <button
          onClick={() => window.print()}
          className="px-4 py-2 rounded text-xs font-bold uppercase tracking-wide bg-emerald-600 text-white hover:bg-emerald-500"
        >
          {tr("🖨 Print / Save as PDF")}
        </button>
      </div>

      <div className="no-print">
        <StickyResults items={[
          { label: "Volume", value: fmt(calc.V_total,2), unit: "m³" },
          { label: "MAWP", value: fmt(calc.mawp_governing,2), unit: "barg" },
          { label: "Shell t", value: fmt(shellNomMm,1), unit: "mm", warn: !shellOk },
        ]} />

        <Plate title="Sizing inputs">
          <SubHeader>Identification</SubHeader>
          <div className="grid grid-cols-2 gap-x-3">
            <TextField label="Tank tag" value={tag} onChange={setTag} />
            <TextField label="Rev." value={rev} onChange={setRev} />
          </div>
          <TextField label="Service" value={service} onChange={setService} />
          <TextField label="Description" value={description} onChange={setDescription} area />
          <TextField label="Document no." value={docNo} onChange={setDocNo} placeholder="e.g. TPE-YYH-TANK-001" />

          <SubHeader>Shell geometry</SubHeader>
          <div className="grid grid-cols-2 gap-x-3">
            <Field label="Inside diameter" unit="mm" value={idMm} onChange={setIdMm} />
            <Field label="Tan–tan length" unit="mm" value={tanTanMm} onChange={setTanTanMm} />
          </div>
          <Field label="Straight flange (per head)" unit="mm" value={sfPerHead} onChange={setSfPerHead} />

          <SubHeader>Head A (left)</SubHeader>
          <HeadInputs label="Head A" type={headAType} setType={setHeadAType} ratio={headARatio} setRatio={setHeadARatio}
            torisL={headATorisL} setTorisL={setHeadATorisL} torisR={headATorisR} setTorisR={setHeadATorisR}
            flatC={headAFlatC} setFlatC={setHeadAFlatC} />
          <Field label="Head A nominal thickness" unit="mm" step="0.5" value={headANomMm} onChange={setHeadANomMm} />

          <SubHeader>Head B (right)</SubHeader>
          <HeadInputs label="Head B" type={headBType} setType={setHeadBType} ratio={headBRatio} setRatio={setHeadBRatio}
            torisL={headBTorisL} setTorisL={setHeadBTorisL} torisR={headBTorisR} setTorisR={setHeadBTorisR}
            flatC={headBFlatC} setFlatC={setHeadBFlatC} />
          <Field label="Head B nominal thickness" unit="mm" step="0.5" value={headBNomMm} onChange={setHeadBNomMm} />

          <SubHeader>Design conditions (ASME BPVC Sec. VIII Div. 1)</SubHeader>
          <div className="grid grid-cols-2 gap-x-3">
            <Field label="Design pressure" unit="barg" step="0.1" value={designPBar} onChange={setDesignPBar} />
            <Field label="Design temperature" unit="°C" value={designTempC} onChange={setDesignTempC} />
          </div>
          <Select label="Shell/head material" value={materialLabel} onChange={setMaterialLabel} options={MATERIAL_PRESETS.map(m => ({ label: m.label }))} />
          {materialLabel === "Custom…" && (
            <Field label="Allowable stress S" unit="MPa" value={customS} onChange={setCustomS} />
          )}
          <Select label="Joint efficiency" value={jointLabel} onChange={setJointLabel} options={JOINT_EFFICIENCIES.map(j => ({ label: j.label }))} />
          <div className="grid grid-cols-2 gap-x-3">
            <Field label="Corrosion allowance" unit="mm" step="0.5" value={caMm} onChange={setCaMm} />
            <Field label="Shell nominal thickness" unit="mm" step="0.5" value={shellNomMm} onChange={setShellNomMm} />
          </div>
          <div className="text-[10px] text-neutral-500 mt-1 leading-relaxed">
            S values shown are representative low/moderate-temperature figures for common materials — always
            confirm the actual allowable stress from ASME II-D for your specific design temperature before finalizing.
          </div>
        </Plate>

        <Plate title="Nozzle schedule">
          {nozzles.map((n, i) => (
            <div key={i} className="border border-neutral-800 rounded p-2 mb-2 relative">
              <button onClick={() => removeNozzle(i)} className="absolute top-1 right-1 text-neutral-500 hover:text-red-400 text-xs px-1">✕</button>
              <div className="grid grid-cols-2 gap-x-2">
                <TextField label="Tag" value={n.tag} onChange={(v) => updateNozzle(i, "tag", v)} />
                <TextField label="Size" value={n.size} onChange={(v) => updateNozzle(i, "size", v)} />
              </div>
              <TextField label="Service" value={n.service} onChange={(v) => updateNozzle(i, "service", v)} />
              <div className="grid grid-cols-2 gap-x-2">
                <TextField label="Rating/Sch." value={n.rating} onChange={(v) => updateNozzle(i, "rating", v)} />
                <TextField label="Location" value={n.location} onChange={(v) => updateNozzle(i, "location", v)} />
              </div>
            </div>
          ))}
          <button onClick={addNozzle} className="w-full py-2 rounded text-xs font-semibold uppercase tracking-wide border border-neutral-700 text-neutral-300 hover:border-amber-500">
            + Add nozzle
          </button>
          <div className="text-[10px] text-neutral-500 mt-2 leading-relaxed">
            Sizes/locations only — this doesn't perform UG-37 area-replacement reinforcement calculations.
            Check nozzle reinforcement separately for any nozzle taking significant load or above ~2" on a thin shell.
          </div>
        </Plate>

        <Plate title="Paint / coating">
          <TextField label="Surface preparation" value={surfacePrep} onChange={setSurfacePrep} />
          <TextField label="Primer" value={primer} onChange={setPrimer} />
          <TextField label="Topcoat" value={topcoat} onChange={setTopcoat} />
          <TextField label="Colour" value={paintColor} onChange={setPaintColor} />
        </Plate>

        <Plate title="Additional components (manual)">
          {components.map((c, i) => (
            <div key={i} className="border border-neutral-800 rounded p-2 mb-2 relative">
              <button onClick={() => removeComponent(i)} className="absolute top-1 right-1 text-neutral-500 hover:text-red-400 text-xs px-1">✕</button>
              <TextField label="Description" value={c.description} onChange={(v) => updateComponent(i, "description", v)} />
              <div className="grid grid-cols-2 gap-x-2">
