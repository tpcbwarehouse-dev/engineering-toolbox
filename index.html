function GanttPanel() {
  const [projectName, setProjectName] = useState("");
  const [clientName, setClientName] = useState("");
  const [projectStartDate, setProjectStartDate] = useState(gnTodayStr());
  const [tasks, setTasks] = useState(GANTT_DEFAULT_TASKS);

  const updateTask = (id, field, val) => setTasks(tasks.map((t) => (t.id === id ? { ...t, [field]: val } : t)));
  const removeTask = (id) => setTasks(tasks.filter((t) => t.id !== id));
  const addTask = () => setTasks([...tasks, gnNewTask({ name: "New task" })]);
  const duplicateTask = (id) => {
    const idx = tasks.findIndex((t) => t.id === id);
    if (idx < 0) return;
    const copy = { ...tasks[idx], id: Math.random().toString(36).slice(2), name: tasks[idx].name + " (copy)" };
    setTasks([...tasks.slice(0, idx + 1), copy, ...tasks.slice(idx + 1)]);
  };
  const moveTask = (id, dir) => {
    const idx = tasks.findIndex((t) => t.id === id);
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= tasks.length) return;
    const copy = [...tasks];
    [copy[idx], copy[newIdx]] = [copy[newIdx], copy[idx]];
    setTasks(copy);
  };

  const computed = useMemo(() => {
    let cursor = 0;
    const done = {}; // id -> computed task (tasks can only depend on rows above them)
    return tasks.map((t) => {
      // Back-compat: old rows have no startMode; a set startOverrideDay meant "fixed".
      const mode = t.startMode || (t.startOverrideDay != null && t.startOverrideDay !== "" ? "fixed" : "prev");
      const lag = Number(t.lagDays) || 0;
      let start;
      let depWarning = "";
      if (mode === "fixed") {
        start = Number(t.startOverrideDay) || 0;
      } else if (mode === "after") {
        const dep = t.dependsOnId ? done[t.dependsOnId] : null;
        if (dep) {
          start = dep.endDay + lag;
        } else {
          start = cursor + lag;
          depWarning = t.dependsOnId
            ? "Depends on a task that is below it (or was deleted) — falling back to 'after previous'. Move the predecessor above this task."
            : "No predecessor selected — falling back to 'after previous'.";
        }
      } else {
        start = cursor + lag;
      }
      start = Math.max(0, start);
      const dur = t.isMilestone ? 0 : Number(t.durationDays) || 0;
      const end = start + dur;
      cursor = end;
      const c = { ...t, startDay: start, endDay: end, durationDaysComputed: dur, depWarning };
      done[t.id] = c;
      return c;
    });
  }, [tasks]);

  const totalDays = Math.max(1, ...computed.map((t) => t.endDay)) * 1.05;
  const todayOffset = gnDaysBetween(projectStartDate, gnTodayStr());
  const todayVisible = todayOffset >= 0 && todayOffset <= totalDays;

  const monthMarks = useMemo(() => {
    const marks = [];
    const start = new Date(projectStartDate + "T00:00:00");
    let cursor = new Date(start);
    cursor.setDate(1);
    cursor.setMonth(cursor.getMonth() + 1);
    let guard = 0;
    while (guard < 60) {
      guard++;
      const offset = gnDaysBetween(projectStartDate, cursor.toISOString().slice(0, 10));
      if (offset > totalDays) break;
      if (offset >= 0) marks.push({ offset, label: cursor.toLocaleDateString("en-GB", { month: "short", year: "2-digit" }) });
      cursor.setMonth(cursor.getMonth() + 1);
    }
    return marks;
  }, [projectStartDate, totalDays]);

  const projectEndDate = gnFmtDate(gnAddDays(projectStartDate, Math.max(...computed.map((t) => t.endDay), 0)));

  const [copyStatus, setCopyStatus] = useState("");
  const buildTsv = () => {
    const header = ["Task", "Phase", "Follows", "Start", "Finish", "Duration (days)", "% Complete"].join("\t");
    const rows = computed.map((t, i) => {
      const mode = t.startMode || (t.startOverrideDay != null ? "fixed" : "prev");
      let follows = "—";
      if (!(i === 0 && mode === "prev")) {
        const lagTxt = (Number(t.lagDays) || 0) !== 0 ? ` ${t.lagDays > 0 ? "+" : ""}${fmt(t.lagDays,0)}d` : "";
        if (mode === "fixed") follows = `Day ${fmt(t.startDay,0)} (fixed)`;
        else if (mode === "after") {
          const dep = computed.find((x) => x.id === t.dependsOnId);
          follows = dep ? `${dep.name || "(untitled)"}${lagTxt}` : `Previous task${lagTxt}`;
        } else follows = `Previous task${lagTxt}`;
      }
      return [
        t.name,
        t.phase,
        follows,
        gnISODate(gnAddDays(projectStartDate, t.startDay)),
        t.isMilestone ? gnISODate(gnAddDays(projectStartDate, t.startDay)) : gnISODate(gnAddDays(projectStartDate, t.endDay)),
        t.isMilestone ? "0" : fmt(t.durationDaysComputed, 0),
        t.isMilestone ? "" : fmt(t.pctComplete, 0),
      ].join("\t");
    });
    return [header, ...rows].join("\n");
  };
  const copyForSheets = async () => {
    const tsv = buildTsv();
    try {
      await navigator.clipboard.writeText(tsv);
      setCopyStatus("Copied! Paste into a Google Sheet with Ctrl+V / Cmd+V.");
    } catch (e) {
      // fallback for browsers/contexts blocking the Clipboard API
      const ta = document.createElement("textarea");
      ta.value = tsv;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      try {
        document.execCommand("copy");
        setCopyStatus("Copied! Paste into a Google Sheet with Ctrl+V / Cmd+V.");
      } catch (e2) {
        setCopyStatus("Couldn't copy automatically — see the text box below, select all and copy manually.");
      }
      document.body.removeChild(ta);
    }
    setTimeout(() => setCopyStatus(""), 6000);
  };

  return (
    <div>
      <style>{`
        @page { size: A4 landscape; margin: 10mm; }
        @media print {
          .no-print { display: none !important; }
          .print-sheet { display: block !important; }
          body { background: white; }
          .print-sheet table { page-break-inside: avoid; }
        }
        .print-sheet { display: none; }
      `}</style>

      <div className="no-print flex justify-end mb-3">
        <button onClick={() => window.print()} className="px-4 py-2 rounded text-xs font-bold uppercase tracking-wide bg-emerald-600 text-white hover:bg-emerald-500">
          {tr("🖨 Print / Save as PDF")}
        </button>
      </div>

      <div className="no-print">
        <StickyResults items={[
          { label: "Duration", value: fmt(Math.max(...computed.map((t) => t.endDay), 0),0), unit: "days" },
          { label: "Finish", value: projectEndDate, unit: "" },
          { label: "Tasks", value: fmt(tasks.length,0), unit: "" },
        ]} />

        <Plate title="Project info">
          <div className="grid grid-cols-2 gap-x-3">
            <TextField label="Project name" value={projectName} onChange={setProjectName} />
            <TextField label="Client" value={clientName} onChange={setClientName} />
          </div>
          <div>
            <div className="text-[10px] uppercase tracking-wider text-neutral-400 mb-1">Project start date</div>
            <input type="date" value={projectStartDate} onChange={(e) => setProjectStartDate(e.target.value)}
              className="w-full bg-neutral-900 border border-neutral-700 focus:border-amber-500 focus:outline-none rounded px-3 py-2 text-neutral-100 text-sm mb-3" />
          </div>
        </Plate>

        <Plate title="Export to Google Sheets">
          <div className="text-[10px] text-neutral-500 mb-3 leading-relaxed">
            No direct "create sheet" API is available from a standalone page like this one without Google
            account sign-in, but this gets you there in two clicks: copy the schedule, then paste into a
            blank sheet — Google Sheets automatically splits it into columns and rows.
          </div>
          <div className="grid grid-cols-2 gap-2 mb-2">
            <button onClick={copyForSheets} className="py-2 rounded text-xs font-bold uppercase tracking-wide bg-sky-600 text-white hover:bg-sky-500">
              1. Copy schedule
            </button>
            <button onClick={() => window.open("https://sheets.new", "_blank")} className="py-2 rounded text-xs font-bold uppercase tracking-wide border border-neutral-700 text-neutral-300 hover:border-amber-500">
              2. Open blank Google Sheet ↗
            </button>
          </div>
          {copyStatus && (
            <div className="text-[11px] text-emerald-400 bg-emerald-950/30 border border-emerald-900 rounded px-2 py-1.5 mb-2">{copyStatus}</div>
          )}
          <div className="text-[10px] text-neutral-500 leading-relaxed">
            If your browser blocks clipboard access (common inside an embedded iframe), a text box will
            appear below instead — select all and copy manually.
          </div>
          {copyStatus.startsWith("Couldn't") && (
            <textarea readOnly value={buildTsv()} onClick={(e) => e.target.select()}
              className="w-full mt-2 bg-neutral-900 border border-neutral-700 rounded px-2 py-2 text-neutral-100 text-[10px] font-mono" rows={6} />
          )}
        </Plate>

        <Plate title="Tasks">
          <div className="text-[10px] text-neutral-500 mb-3 leading-relaxed">
            Tasks chain sequentially by default (each starts when the previous one ends) — use the ▲▼ buttons
            to reorder, ⧉ to duplicate. For parallel tracks, set "Starts: After a specific task" and pick the
            predecessor — the schedule then auto-adjusts whenever that predecessor's duration changes. Lag
            adds a gap (positive) or an overlap (negative). "On a fixed day" pins a task to an absolute day
            offset. Milestones have zero duration and show as a diamond marker instead of a bar.
          </div>
          {computed.map((t, i) => (
            <div key={t.id} className="border border-neutral-800 rounded p-2 mb-2 relative">
              <div className="absolute top-1 right-1 flex gap-1">
                <button onClick={() => moveTask(t.id, -1)} disabled={i === 0} className="text-neutral-500 hover:text-amber-400 disabled:opacity-30 text-xs px-1">▲</button>
                <button onClick={() => moveTask(t.id, 1)} disabled={i === tasks.length - 1} className="text-neutral-500 hover:text-amber-400 disabled:opacity-30 text-xs px-1">▼</button>
                <button onClick={() => duplicateTask(t.id)} title="Duplicate task" className="text-neutral-500 hover:text-sky-400 text-xs px-1">⧉</button>
                <button onClick={() => removeTask(t.id)} className="text-neutral-500 hover:text-red-400 text-xs px-1">✕</button>
              </div>
              <TextField label="Task name" value={t.name} onChange={(v) => updateTask(t.id, "name", v)} />
              <div className="grid grid-cols-2 gap-x-2 mb-2">
                <div>
                  <div className="text-[10px] uppercase tracking-wider text-neutral-400 mb-1">Phase</div>
                  <select value={t.phase} onChange={(e) => updateTask(t.id, "phase", e.target.value)}
                    className="w-full bg-neutral-900 border border-neutral-700 focus:border-amber-500 focus:outline-none rounded px-2 py-1.5 text-neutral-100 text-xs">
                    {GANTT_PHASES.map((p) => <option key={p.label} value={p.label}>{p.label}</option>)}
                  </select>
                </div>
                <label className="flex items-center gap-2 mt-5 text-xs text-neutral-300">
                  <input type="checkbox" checked={t.isMilestone} onChange={(e) => updateTask(t.id, "isMilestone", e.target.checked)} />
                  Milestone (zero duration)
                </label>
              </div>
              {!t.isMilestone && (
                <div className="grid grid-cols-2 gap-x-2">
                  <Field label="Duration" unit="days" step="1" value={t.durationDays} onChange={(v) => updateTask(t.id, "durationDays", v)} />
                  <Field label="% Complete" unit="%" step="5" value={t.pctComplete} onChange={(v) => updateTask(t.id, "pctComplete", v)} />
                </div>
              )}
              <div className="grid grid-cols-2 gap-x-2 mb-2">
                <div>
                  <div className="text-[10px] uppercase tracking-wider text-neutral-400 mb-1">Starts</div>
                  <select value={t.startMode || (t.startOverrideDay != null ? "fixed" : "prev")}
                    onChange={(e) => updateTask(t.id, "startMode", e.target.value)}
                    className="w-full bg-neutral-900 border border-neutral-700 focus:border-amber-500 focus:outline-none rounded px-2 py-1.5 text-neutral-100 text-xs">
                    <option value="prev">After previous task</option>
                    <option value="after">After a specific task…</option>
                    <option value="fixed">On a fixed day</option>
                  </select>
                </div>
                {(t.startMode || (t.startOverrideDay != null ? "fixed" : "prev")) === "after" ? (
                  <div>
                    <div className="text-[10px] uppercase tracking-wider text-neutral-400 mb-1">Predecessor (must be above)</div>
                    <select value={t.dependsOnId || ""}
                      onChange={(e) => updateTask(t.id, "dependsOnId", e.target.value || null)}
                      className="w-full bg-neutral-900 border border-neutral-700 focus:border-amber-500 focus:outline-none rounded px-2 py-1.5 text-neutral-100 text-xs">
                      <option value="">— select task —</option>
                      {tasks.slice(0, i).map((other) => (
                        <option key={other.id} value={other.id}>{other.name || "(untitled)"}</option>
                      ))}
                    </select>
                  </div>
                ) : (t.startMode || (t.startOverrideDay != null ? "fixed" : "prev")) === "fixed" ? (
                  <Field label="Fixed day (from project start)" unit="days" step="1"
                    value={t.startOverrideDay ?? 0} onChange={(v) => updateTask(t.id, "startOverrideDay", v)} />
                ) : (
                  <Field label="Lag (+gap / −overlap)" unit="days" step="1"
                    value={t.lagDays ?? 0} onChange={(v) => updateTask(t.id, "lagDays", v)} />
                )}
              </div>
              {(t.startMode || "prev") === "after" && (
                <Field label="Lag (+gap / −overlap)" unit="days" step="1"
                  value={t.lagDays ?? 0} onChange={(v) => updateTask(t.id, "lagDays", v)} />
              )}
              {t.depWarning && (
                <div className="text-[10px] text-amber-400 bg-amber-950/30 border border-amber-900 rounded px-2 py-1 mb-2">{t.depWarning}</div>
              )}
              <div className="text-[10px] text-neutral-500">
                {gnFmtDate(gnAddDays(projectStartDate, t.startDay))}
                {!t.isMilestone && ` → ${gnFmtDate(gnAddDays(projectStartDate, t.endDay))}`}
              </div>
            </div>
          ))}
          <button onClick={addTask} className="w-full py-2 rounded text-xs font-semibold uppercase tracking-wide border border-neutral-700 text-neutral-300 hover:border-amber-500">
            + Add task
          </button>
        </Plate>

        <Plate title="Gantt chart">
          <GanttChartView computed={computed} totalDays={totalDays} monthMarks={monthMarks} todayOffset={todayOffset} todayVisible={todayVisible} dark />
        </Plate>
      </div>

      <div className="print-sheet text-black bg-white p-6" style={{ fontFamily: "Arial, sans-serif" }}>
        <div className="border-b-2 border-black pb-2 mb-3">
          <div className="text-lg font-bold">{projectName || "Project Schedule"}</div>
          <div className="text-xs">Client: {clientName || "—"} | Start: {gnFmtDate(gnAddDays(projectStartDate,0))} | Finish: {projectEndDate} | Duration: {fmt(Math.max(...computed.map((t) => t.endDay), 0),0)} days</div>
        </div>
        <GanttChartView computed={computed} totalDays={totalDays} monthMarks={monthMarks} todayOffset={todayOffset} todayVisible={todayVisible} dark={false} />

        <table className="w-full text-xs mt-4" style={{ borderCollapse: "collapse" }}>
          <thead>
            <tr>
              <th className="border border-black px-2 py-1">Task</th>
              <th className="border border-black px-2 py-1">Phase</th>
              <th className="border border-black px-2 py-1">Follows</th>
              <th className="border border-black px-2 py-1">Start</th>
              <th className="border border-black px-2 py-1">Finish</th>
              <th className="border border-black px-2 py-1">Duration</th>
              <th className="border border-black px-2 py-1">% Complete</th>
            </tr>
          </thead>
          <tbody>
            {computed.map((t, i) => (
              <tr key={i}>
                <td className="border border-black px-2 py-1">{t.name}{t.isMilestone ? " (milestone)" : ""}</td>
                <td className="border border-black px-2 py-1">{t.phase}</td>
                <td className="border border-black px-2 py-1">{(() => {
                  const mode = t.startMode || (t.startOverrideDay != null ? "fixed" : "prev");
                  if (i === 0 && mode === "prev") return "—";
                  if (mode === "fixed") return `Day ${fmt(t.startDay,0)} (fixed)`;
                  const lagTxt = (Number(t.lagDays) || 0) !== 0 ? ` ${t.lagDays > 0 ? "+" : ""}${fmt(t.lagDays,0)}d` : "";
                  if (mode === "after") {
                    const dep = computed.find((x) => x.id === t.dependsOnId);
                    return dep ? `${dep.name || "(untitled)"}${lagTxt}` : `Previous task${lagTxt}`;
                  }
                  return `Previous task${lagTxt}`;
                })()}</td>
                <td className="border border-black px-2 py-1">{gnFmtDate(gnAddDays(projectStartDate, t.startDay))}</td>
                <td className="border border-black px-2 py-1">{gnFmtDate(gnAddDays(projectStartDate, t.endDay))}</td>
                <td className="border border-black px-2 py-1">{t.isMilestone ? "—" : `${fmt(t.durationDaysComputed,0)} days`}</td>
                <td className="border border-black px-2 py-1">{t.isMilestone ? "—" : `${fmt(t.pctComplete,0)}%`}</td>
              </tr>
            ))}
          </tbody>
        </table>
        <div className="text-[9px] text-neutral-600 mt-4 leading-relaxed">
          Schedule generated as a planning tool — actual dates subject to contract terms, site conditions, and
          confirmed order/delivery dates.
        </div>
      </div>
    </div>
  );
}

function GanttChartView({ computed, totalDays, monthMarks, todayOffset, todayVisible, dark }) {
  const labelWidth = 220;
  const rowH = 32;
  const textColor = dark ? "#e5e5e5" : "#000";
  const gridColor = dark ? "#404040" : "#ccc";
  const trackBg = dark ? "#262626" : "#f0f0f0";

  return (
    <div style={{ overflowX: "auto" }}>
      <div style={{ minWidth: 700, position: "relative" }}>
        <div style={{ display: "flex", marginBottom: 4 }}>
          <div style={{ width: labelWidth, flexShrink: 0 }} />
          <div style={{ position: "relative", flex: 1, height: 20 }}>
            {monthMarks.map((m, i) => (
              <div key={i} style={{ position: "absolute", left: `${(m.offset / totalDays) * 100}%`, fontSize: 10, color: textColor, borderLeft: `1px solid ${gridColor}`, paddingLeft: 3, height: "100%" }}>
                {m.label}
              </div>
            ))}
          </div>
        </div>

        {computed.map((t, i) => (
          <div key={t.id || i} style={{ display: "flex", alignItems: "center", height: rowH, borderBottom: `1px solid ${gridColor}` }}>
            <div style={{ width: labelWidth, flexShrink: 0, fontSize: 11, color: textColor, paddingRight: 8, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", fontWeight: t.isMilestone ? 700 : 400 }}>
              {t.name || "(untitled task)"}
            </div>
            <div style={{ position: "relative", flex: 1, height: "100%" }}>
              {monthMarks.map((m, mi) => (
                <div key={mi} style={{ position: "absolute", left: `${(m.offset / totalDays) * 100}%`, top: 0, bottom: 0, borderLeft: `1px solid ${gridColor}` }} />
              ))}
              {todayVisible && (
                <div style={{ position: "absolute", left: `${(todayOffset / totalDays) * 100}%`, top: 0, bottom: 0, borderLeft: "2px solid #ef4444", zIndex: 5 }} />
              )}
              {t.isMilestone ? (
                <div style={{
                  position: "absolute", left: `calc(${(t.startDay / totalDays) * 100}% - 7px)`, top: "50%", transform: "translateY(-50%) rotate(45deg)",
                  width: 14, height: 14, background: "#facc15", border: "1px solid #a16207",
                }} />
              ) : (
                <div style={{
                  position: "absolute", left: `${(t.startDay / totalDays) * 100}%`, width: `${((t.endDay - t.startDay) / totalDays) * 100}%`,
                  top: "50%", transform: "translateY(-50%)", height: 16, borderRadius: 3, background: trackBg, border: `1px solid ${gnPhaseColor(t.phase)}`,
                }}>
                  <div style={{ height: "100%", width: `${t.pctComplete}%`, background: gnPhaseColor(t.phase), borderRadius: 3 }} />
                </div>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ================= ENGINEERING AI ASSISTANT =================
// This panel calls a backend proxy endpoint rather than the Anthropic API directly.
// Reason: this tool is deployed as a static page (GitHub Pages) with no server component.
// An API key placed in this file's code would be visible to anyone who loads the page
// (view-source), not just people with repo access — so it must live in a backend instead.
// See worker.js (provided alongside this file) for a ready-to-deploy Cloudflare Worker
// that holds the key as a secret and proxies requests here. Once deployed, paste its URL
// into CHAT_BACKEND_URL below.

const CHAT_BACKEND_URL = "PASTE_YOUR_BACKEND_PROXY_URL_HERE";

const ENGINEER_SYSTEM_PROMPT = "You are a senior engineering consultant assisting staff at Thanaphon Engineering Co. (TPE), a Thai industrial engineering firm specializing in Champion Boiler systems (biomass step-grate, firetube, once-through LPG boilers), water treatment, industrial instrumentation, and EPC project execution. Respond the way a senior engineering colleague would: technically precise, citing relevant standards (ASME BPVC, TIS, JIS) where applicable, direct about assumptions and limitations, and professional in tone. Prefer concrete numbers and calculations over vague generalities. If a question needs information you don't have (site conditions, exact equipment specs, etc.), say so and ask, rather than guessing silently.";

function ChatAssistantPanel() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const notConfigured = CHAT_BACKEND_URL === "PASTE_YOUR_BACKEND_PROXY_URL_HERE";

  const sendMessage = async () => {
    if (!input.trim() || loading) return;
    if (notConfigured) {
      setError("Backend proxy URL not configured yet — see the setup note below.");
      return;
    }
    const userMsg = { role: "user", content: input.trim() };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput("");
    setLoading(true);
    setError("");
    try {
      const res = await fetch(CHAT_BACKEND_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ system: ENGINEER_SYSTEM_PROMPT, messages: newMessages }),
      });
      if (!res.ok) throw new Error(`Backend returned ${res.status}`);
      const data = await res.json();
      const replyText = data.reply || data.content || "(empty response)";
      setMessages([...newMessages, { role: "assistant", content: replyText }]);
    } catch (e) {
      setError(`Couldn't reach the assistant: ${e.message}. Check the backend proxy is deployed and CHAT_BACKEND_URL is correct.`);
    }
    setLoading(false);
  };

  const handleKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  };

  return (
    <div>
      <Plate title="Engineering AI Assistant">
        <div className="text-[10px] text-neutral-500 mb-3 leading-relaxed">
          Chats as a senior engineering consultant familiar with TPE's boiler product lines — for quick
          technical questions, standards references, or sanity-checking a calculation. This is a general
          assistant, not a substitute for the calculators elsewhere in this toolbox.
        </div>

        {notConfigured && (
          <div className="text-[11px] text-amber-400 bg-amber-950/30 border border-amber-900 rounded px-3 py-2 mb-3 leading-relaxed">
            <div className="font-bold mb-1">Setup needed</div>
            Backend proxy URL isn't configured yet. Deploy the included <code>worker.js</code> (Cloudflare
            Workers has a free tier) with your Anthropic API key as a secret, then paste the deployed
            worker's URL into <code>CHAT_BACKEND_URL</code> near the top of this file's source. The key
            never needs to touch this page's code — it stays in the worker.
          </div>
        )}

        <div className="border border-neutral-800 rounded bg-neutral-950 p-3 mb-3" style={{ minHeight: 240, maxHeight: 420, overflowY: "auto" }}>
          {messages.length === 0 && !notConfigured && (
            <div className="text-xs text-neutral-600 italic">Ask a question to get started — e.g. "What NDE is typically required on longitudinal welds for an ASME Sec I firetube shell?"</div>
          )}
          {messages.map((m, i) => (
            <div key={i} className={`mb-3 flex ${m.role === "user" ? "justify-end" : "justify-start"}`}>
              <div className={`max-w-[85%] rounded-lg px-3 py-2 text-xs whitespace-pre-wrap ${m.role === "user" ? "bg-amber-500 text-neutral-950" : "bg-neutral-800 text-neutral-100"}`}>
                {m.content}
              </div>
            </div>
          ))}
          {loading && (
            <div className="flex justify-start mb-3">
              <div className="bg-neutral-800 text-neutral-400 rounded-lg px-3 py-2 text-xs">Thinking…</div>
            </div>
          )}
        </div>

        {error && (
          <div className="text-[11px] text-red-400 bg-red-950/30 border border-red-900 rounded px-2 py-1.5 mb-2">{error}</div>
        )}

        <div className="flex gap-2">
          <textarea
            value={input}
            onChange={(e) => setInput(e.target.value)}
            onKeyDown={handleKeyDown}
            placeholder="Type a question... (Enter to send, Shift+Enter for new line)"
            rows={2}
            className="flex-1 bg-neutral-900 border border-neutral-700 focus:border-amber-500 focus:outline-none rounded px-3 py-2 text-neutral-100 text-sm resize-none"
          />
          <button onClick={sendMessage} disabled={loading || !input.trim()}
            className="px-4 rounded text-xs font-bold uppercase tracking-wide bg-emerald-600 text-white hover:bg-emerald-500 disabled:opacity-40 disabled:cursor-not-allowed">
            Send
          </button>
        </div>
        {messages.length > 0 && (
          <button onClick={() => setMessages([])} className="mt-2 text-[10px] text-neutral-500 underline">
            Clear conversation
          </button>
        )}
      </Plate>
    </div>
  );
}

function ImportCostPanel() {
  const [fxLabel, setFxLabel] = useState("USD");
  const [fxRate, setFxRate] = useState(33.0);
  const [goodsFC, setGoodsFC] = useState(10000);
  const [freightFC, setFreightFC] = useState(800);
  const [insMode, setInsMode] = useState("auto"); // auto = 1% of (goods+freight), manual = FC amount
  const [insFC, setInsFC] = useState(0);
  const [dutyPct, setDutyPct] = useState(10);
  const [fta, setFta] = useState(false);
  const [vatPct, setVatPct] = useState(7);
  const [qty, setQty] = useState(1);
  const [charges, setCharges] = useState(IMPORT_LOCAL_CHARGE_PRESETS.map((c, i) => ({ id: "lc" + i, ...c })));

  const addCharge = () => setCharges([...charges, { id: Math.random().toString(36).slice(2), desc: "", amount: 0 }]);
  const removeCharge = (id) => setCharges(charges.filter((c) => c.id !== id));
  const updateCharge = (id, field, val) => setCharges(charges.map((c) => (c.id === id ? { ...c, [field]: val } : c)));

  const calc = useMemo(() => {
    const insFC_eff = insMode === "auto" ? 0.01 * (Number(goodsFC) + Number(freightFC)) : Number(insFC);
    const cif_FC = Number(goodsFC) + Number(freightFC) + insFC_eff;
    const cif_THB = cif_FC * Number(fxRate);
    const dutyRate = fta ? 0 : Number(dutyPct) / 100;
    const duty_THB = cif_THB * dutyRate;
    const vatBase = cif_THB + duty_THB;
    const vat_THB = vatBase * (Number(vatPct) / 100);
    const local_THB = charges.reduce((s, c) => s + (Number(c.amount) || 0), 0);
    const landedCash_THB = cif_THB + duty_THB + vat_THB + local_THB; // total cash outlay
    const landedExVat_THB = cif_THB + duty_THB + local_THB;          // true cost if VAT is claimed back
    const q = Math.max(1, Number(qty) || 1);
    return {
      insFC_eff, cif_FC, cif_THB, duty_THB, vatBase, vat_THB, local_THB,
      landedCash_THB, landedExVat_THB,
      perUnitCash: landedCash_THB / q, perUnitExVat: landedExVat_THB / q,
    };
  }, [goodsFC, freightFC, insMode, insFC, fxRate, dutyPct, fta, vatPct, charges, qty]);

  return (
    <div>
      <StickyResults items={[
        { label: "Landed (cash)", value: fmt(calc.landedCash_THB, 0), unit: "THB" },
        { label: "Ex-VAT cost", value: fmt(calc.landedExVat_THB, 0), unit: "THB" },
        { label: "Per unit ex-VAT", value: fmt(calc.perUnitExVat, 2), unit: "THB" },
      ]} />

      <Plate title="1. Goods & Freight (foreign currency)">
        <div className="grid grid-cols-2 gap-x-3">
          <TextField label="Currency" value={fxLabel} onChange={setFxLabel} placeholder="USD / CNY / EUR" />
          <Field label={`Exchange rate (THB per 1 ${fxLabel})`} unit="THB" step="0.05" value={fxRate} onChange={setFxRate} />
        </div>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label={`Goods value (${fxLabel})`} unit={fxLabel} step="100" value={goodsFC} onChange={setGoodsFC} />
          <Field label={`Freight (${fxLabel})`} unit={fxLabel} step="50" value={freightFC} onChange={setFreightFC} />
        </div>
        <div className="flex gap-2 mb-2">
          <button onClick={() => setInsMode("auto")} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${insMode === "auto" ? "bg-amber-500 text-neutral-950 border-amber-500" : "border-neutral-700 text-neutral-300"}`}>Insurance auto (1% of C+F)</button>
          <button onClick={() => setInsMode("manual")} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${insMode === "manual" ? "bg-sky-500 text-neutral-950 border-sky-500" : "border-neutral-700 text-neutral-300"}`}>Insurance manual</button>
        </div>
        {insMode === "manual" ? (
          <Field label={`Insurance (${fxLabel})`} unit={fxLabel} step="10" value={insFC} onChange={setInsFC} />
        ) : (
          <div className="text-[10px] text-neutral-500 mb-3">Auto insurance = 1% × (goods + freight) = {fmt(calc.insFC_eff, 2)} {fxLabel} — the customary customs assumption when no policy value is declared.</div>
        )}
        <Readout label={`CIF value`} value={`${fmt(calc.cif_FC, 2)} ${fxLabel} = ${fmt(calc.cif_THB, 0)}`} unit="THB" />
      </Plate>

      <Plate title="2. Duty & VAT">
        <label className="flex items-center gap-2 text-xs text-neutral-300 mb-2">
          <input type="checkbox" checked={fta} onChange={(e) => setFta(e.target.checked)} />
          FTA preferential rate (e.g. Form E under ACFTA) — duty 0%
        </label>
        {!fta && <Field label="Import duty rate (per HS code)" unit="%" step="1" value={dutyPct} onChange={setDutyPct} hint="Check the HS code in the Thai Customs tariff — rates vary widely (0–30%+). FTA certificate must accompany the shipment to claim 0%." />}
        <Field label="VAT rate" unit="%" step="0.5" value={vatPct} onChange={setVatPct} />
        <Readout label="Import duty" value={fmt(calc.duty_THB, 0)} unit="THB" />
        <Readout label={`VAT ${fmt(vatPct,1)}% on (CIF + duty)`} value={fmt(calc.vat_THB, 0)} unit="THB" />
        <div className="text-[10px] text-neutral-500 mt-1 leading-relaxed">
          Note the compounding: VAT is charged on CIF <b>plus duty</b>, not on the goods price alone.
        </div>
      </Plate>

      <Plate title="3. Local charges (THB)">
        {charges.map((c) => (
          <div key={c.id} className="grid grid-cols-5 gap-1 mb-1 items-end">
            <div className="col-span-3"><TextField label="Description" value={c.desc} onChange={(v) => updateCharge(c.id, "desc", v)} /></div>
            <Field label="Amount" unit="THB" step="100" value={c.amount} onChange={(v) => updateCharge(c.id, "amount", v)} />
            <button onClick={() => removeCharge(c.id)} className="text-neutral-500 hover:text-red-400 text-xs pb-4">✕</button>
          </div>
        ))}
        <button onClick={addCharge} className="w-full py-2 rounded text-xs font-semibold uppercase tracking-wide border border-neutral-700 text-neutral-300 hover:border-amber-500">+ Add charge</button>
        <div className="text-[10px] text-neutral-500 mt-2">Preset amounts are editable placeholders — replace with your actual broker/port quotes.</div>
      </Plate>

      <Plate title="4. Landed cost">
        <Field label="Quantity (units in this shipment)" unit="EA" step="1" value={qty} onChange={setQty} />
        <Readout label="Total cash outlay (incl. VAT)" value={fmt(calc.landedCash_THB, 0)} unit="THB" />
        <Readout label="True landed cost (ex-VAT, if VAT claimed as input tax)" value={fmt(calc.landedExVat_THB, 0)} unit="THB" big />
        <div className="grid grid-cols-2 gap-x-3 mt-2">
          <Readout label="Per unit (cash)" value={fmt(calc.perUnitCash, 2)} unit="THB" />
          <Readout label="Per unit (ex-VAT)" value={fmt(calc.perUnitExVat, 2)} unit="THB" />
        </div>
        <div className="text-[10px] text-neutral-500 mt-2 leading-relaxed">
          If TPE is VAT-registered (it is), the import VAT is recoverable as input tax — so use the <b>ex-VAT</b>
          figure as the cost basis for pricing, and the cash figure for cash-flow planning.
        </div>
        <button onClick={() => { SHARED_LANDED_UNIT_COST = calc.perUnitExVat; }} className="w-full mt-3 py-2 rounded text-xs font-bold uppercase tracking-wide bg-emerald-600 text-white hover:bg-emerald-500">
          Send per-unit ex-VAT cost → Selling Price tool
        </button>
      </Plate>
    </div>
  );
}

function SellingPricePanel() {
  const [unitCost, setUnitCost] = useState(1000);
  const [overheadPct, setOverheadPct] = useState(10);
  const [supplierCreditDays, setSupplierCreditDays] = useState(0);
  const [holdingDays, setHoldingDays] = useState(30);
  const [customerCreditDays, setCustomerCreditDays] = useState(60);
  const [financeRatePct, setFinanceRatePct] = useState(8);
  const [method, setMethod] = useState("margin"); // margin (of selling price) | markup (on cost)
  const [targetPct, setTargetPct] = useState(30);
  const [vatPct, setVatPct] = useState(7);
  const [marketPrice, setMarketPrice] = useState(0);
  const [loadedMsg, setLoadedMsg] = useState("");

  const loadFromImport = () => {
    if (SHARED_LANDED_UNIT_COST != null) {
      setUnitCost(Number(SHARED_LANDED_UNIT_COST.toFixed(2)));
      setLoadedMsg(`Loaded ${fmt(SHARED_LANDED_UNIT_COST, 2)} THB/unit from the Import Cost tool.`);
    } else {
      setLoadedMsg("Nothing to load yet — run the Import Cost tool and press its Send button first.");
    }
    setTimeout(() => setLoadedMsg(""), 5000);
  };

  const calc = useMemo(() => {
    const cost = Number(unitCost) || 0;
    const overhead = cost * (Number(overheadPct) / 100);
    // Financing: days we carry the money = holding + customer credit − supplier credit
    const finDays = Math.max(0, Number(holdingDays) + Number(customerCreditDays) - Number(supplierCreditDays));
    const financing = (cost + overhead) * (Number(financeRatePct) / 100) * (finDays / 365);
    const costBasis = cost + overhead + financing;
    const t = Number(targetPct) / 100;
    const priceExVat = method === "margin" ? (t < 1 ? costBasis / (1 - t) : NaN) : costBasis * (1 + t);
    const vat = priceExVat * (Number(vatPct) / 100);
    const priceIncVat = priceExVat + vat;
    const profit = priceExVat - costBasis;
    const achievedMargin = priceExVat > 0 ? (profit / priceExVat) * 100 : 0;
    const achievedMarkup = costBasis > 0 ? (profit / costBasis) * 100 : 0;
    const sens = [20, 25, 30, 35].map((m) => ({ m, price: costBasis / (1 - m / 100) }));
    // Reverse: market price entered ex-VAT
    const mkt = Number(marketPrice) || 0;
    const mktProfit = mkt - costBasis;
    const mktMargin = mkt > 0 ? (mktProfit / mkt) * 100 : 0;
    const mktMarkup = costBasis > 0 ? (mktProfit / costBasis) * 100 : 0;
    return { cost, overhead, finDays, financing, costBasis, priceExVat, vat, priceIncVat, profit, achievedMargin, achievedMarkup, sens, mkt, mktProfit, mktMargin, mktMarkup };
  }, [unitCost, overheadPct, supplierCreditDays, holdingDays, customerCreditDays, financeRatePct, method, targetPct, vatPct, marketPrice]);

  return (
    <div>
      <StickyResults items={[
        { label: "Cost basis", value: fmt(calc.costBasis, 2), unit: "THB" },
        { label: "Price ex-VAT", value: fmt(calc.priceExVat, 2), unit: "THB" },
        { label: "Inc. VAT", value: fmt(calc.priceIncVat, 2), unit: "THB" },
      ]} />

      <Plate title="1. Cost basis">
        <Field label="Unit cost (landed, ex-VAT)" unit="THB" step="10" value={unitCost} onChange={setUnitCost} />
        <button onClick={loadFromImport} className="w-full mb-2 py-1.5 rounded text-[10px] font-semibold uppercase tracking-wide border border-neutral-700 text-neutral-300 hover:border-emerald-500">
          ↙ Load from Import Cost tool
        </button>
        {loadedMsg && <div className="text-[11px] text-emerald-400 bg-emerald-950/30 border border-emerald-900 rounded px-2 py-1.5 mb-2">{loadedMsg}</div>}
        <Field label="Overhead allocation" unit="%" step="1" value={overheadPct} onChange={setOverheadPct} hint="Admin, warehousing, sales effort share." />
      </Plate>

      <Plate title="2. Payment terms & cost of money">
        <div className="text-[10px] text-neutral-500 mb-2 leading-relaxed">
          If you pay the supplier before the customer pays you, the gap is financed by your working capital.
          Financing days = stock holding + customer credit − supplier credit (floored at zero).
        </div>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Supplier credit terms" unit="days" step="15" value={supplierCreditDays} onChange={setSupplierCreditDays} hint="0 = cash/TT upfront." />
          <Field label="Stock holding period" unit="days" step="15" value={holdingDays} onChange={setHoldingDays} hint="Time in warehouse before sale/installation." />
        </div>
        <div className="grid grid-cols-2 gap-x-3">
          <Field label="Customer credit terms" unit="days" step="15" value={customerCreditDays} onChange={setCustomerCreditDays} hint="0 = customer pays cash on delivery." />
          <Field label="Annual finance rate" unit="%/yr" step="0.5" value={financeRatePct} onChange={setFinanceRatePct} hint="Your borrowing cost or opportunity cost of capital." />
        </div>
        <Readout label={`Financing days`} value={fmt(calc.finDays, 0)} unit="days" />
        <Readout label="Financing cost per unit" value={fmt(calc.financing, 2)} unit="THB" />
        <Readout label="Cost basis (cost + overhead + financing)" value={fmt(calc.costBasis, 2)} unit="THB" big />
      </Plate>

      <Plate title="3. Target pricing">
        <div className="flex gap-2 mb-3">
          <button onClick={() => setMethod("margin")} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${method === "margin" ? "bg-amber-500 text-neutral-950 border-amber-500" : "border-neutral-700 text-neutral-300"}`}>Margin (of selling price)</button>
          <button onClick={() => setMethod("markup")} className={`flex-1 py-2 rounded text-xs font-semibold uppercase tracking-wide border ${method === "markup" ? "bg-sky-500 text-neutral-950 border-sky-500" : "border-neutral-700 text-neutral-300"}`}>Markup (on cost)</button>
        </div>
        <Field label={method === "margin" ? "Target margin" : "Target markup"} unit="%" step="1" value={targetPct} onChange={setTargetPct} />
        <div className="text-[10px] text-neutral-500 mb-2 leading-relaxed">
          These are different: at 30%, margin gives price = cost/(1−0.30) = cost × 1.429, while markup gives
          cost × 1.30. Margin-of-selling-price is what appears in financial statements.
        </div>
        <Field label="VAT" unit="%" step="0.5" value={vatPct} onChange={setVatPct} />
        <Readout label="Suggested price (ex-VAT)" value={fmt(calc.priceExVat, 2)} unit="THB" big />
        <Readout label="Customer price (inc. VAT)" value={fmt(calc.priceIncVat, 2)} unit="THB" />
        <div className="grid grid-cols-2 gap-x-3 mt-1">
          <Readout label="Profit per unit" value={fmt(calc.profit, 2)} unit="THB" />
          <Readout label="Achieved margin / markup" value={`${fmt(calc.achievedMargin, 1)}% / ${fmt(calc.achievedMarkup, 1)}%`} unit="" />
        </div>
        <SubHeader>Sensitivity (price ex-VAT at margin %)</SubHeader>
        <div className="grid grid-cols-4 gap-2">
          {calc.sens.map((s) => (
            <div key={s.m} className="border border-neutral-800 rounded p-2 text-center">
              <div className="text-[10px] text-neutral-500">{s.m}%</div>
              <div className="text-xs font-bold text-neutral-100">{fmt(s.price, 0)}</div>
            </div>
          ))}
        </div>
      </Plate>

      <Plate title="4. Reverse check — market price">
        <Field label="Competitor / market price (ex-VAT)" unit="THB" step="10" value={marketPrice} onChange={setMarketPrice} hint="Enter 0 to skip." />
        {calc.mkt > 0 && (
          <>
            <Readout label="Profit at market price" value={fmt(calc.mktProfit, 2)} unit="THB" />
            <Readout label="Margin / markup at market price" value={`${fmt(calc.mktMargin, 1)}% / ${fmt(calc.mktMarkup, 1)}%`} unit="" big />
            {calc.mktProfit < 0 && (
              <div className="text-[11px] text-red-400 bg-red-950/30 border border-red-900 rounded px-2 py-1.5 mt-1">
                Below cost basis — selling at market price loses money once overhead and financing are counted.
              </div>
            )}
          </>
        )}
      </Plate>
    </div>
  );
}

    case "steel": return (
      <svg {...p}>
        <line x1="4" y1="4" x2="20" y2="4" />
        <line x1="4" y1="20" x2="20" y2="20" />
        <line x1="12" y1="4" x2="12" y2="20" />
      </svg>
    );
    case "unitconv": return (
      <svg {...p}>
        <path d="M4 8 H18 M14 4 L18 8 L14 12" />
        <path d="M20 16 H6 M10 12 L6 16 L10 20" />
      </svg>
    );
    case "geometry": return (
      <svg {...p}>
        <rect x="3" y="9" width="18" height="6" rx="1" />
        <line x1="6" y1="9" x2="6" y2="12" />
        <line x1="9" y1="9" x2="9" y2="12" />
        <line x1="12" y1="9" x2="12" y2="13" />
        <line x1="15" y1="9" x2="15" y2="12" />
        <line x1="18" y1="9" x2="18" y2="12" />
      </svg>
    );
    case "steamtable": return (
      <svg {...p}>
        <path d="M12 2 C8 6 6 10 8 14 C9 16.5 12 18 12 18 C12 18 15 16.5 16 14 C18 10 16 6 12 2 Z" />
        <line x1="6" y1="20" x2="18" y2="20" />
      </svg>
    );
    case "bolttorque": return (
      <svg {...p}>
        <path d="M12 3 L19 7 V15 L12 19 L5 15 V7 Z" />
        <circle cx="12" cy="11" r="2.4" />
      </svg>
    );
    case "motorcable": return (
      <svg {...p}>
        <circle cx="10" cy="12" r="6" />
        <line x1="16" y1="10" x2="21" y2="10" />
        <line x1="16" y1="14" x2="21" y2="14" />
      </svg>
    );
    case "signalscale": return (
      <svg {...p}>
        <path d="M2 12 H6 L9 5 L13 19 L16 12 H22" />
      </svg>
    );
    case "importcost": return (
      <svg {...p}>
        <path d="M3 15 L5 19 H19 L21 15 H3z" />
        <path d="M6 15 V9 H18 V15" />
        <line x1="12" y1="9" x2="12" y2="4" />
        <path d="M12 4 H16 L14 6.5 L16 9" />
      </svg>
    );
    case "sellingprice": return (
      <svg {...p}>
        <path d="M4 4 H11 L20 13 L13 20 L4 11 Z" />
        <circle cx="8.5" cy="8.5" r="1.4" />
      </svg>
    );
    case "chatassistant": return (
      <svg {...p}>
        <path d="M4 4h16v12H8l-4 4V4z" />
        <line x1="8" y1="9" x2="16" y2="9" />
        <line x1="8" y1="13" x2="13" y2="13" />
      </svg>
    );
    default: return (
      <svg {...p}><circle cx="12" cy="12" r="8" /></svg>
    );
  }
}

const CATEGORY_COLORS = {
  "Conveyor & Material Handling": "text-sky-400 group-hover:border-sky-500",
  "Pressure Vessel": "text-violet-400 group-hover:border-violet-500",
  "Water Treatment": "text-cyan-400 group-hover:border-cyan-500",
  "Boiler Engineering": "text-orange-400 group-hover:border-orange-500",
  "Reference / Materials": "text-teal-400 group-hover:border-teal-500",
  "Electrical & Instrumentation": "text-amber-400 group-hover:border-amber-500",
  "AI Assistant": "text-emerald-400 group-hover:border-emerald-500",
  "Commercial": "text-rose-400 group-hover:border-rose-500",
};

function ToolboxHome({ onSelect, lang, onToggleLang }) {
  return (
    <div>
      <div className="mb-4 flex items-center justify-center gap-3">
        <h1 className="text-base font-bold text-neutral-50 tracking-tight">Engineering Toolbox</h1>
        <button onClick={onToggleLang} className="px-2 py-0.5 rounded text-[10px] font-bold border border-neutral-700 text-neutral-400 hover:border-amber-500 hover:text-amber-400">
          {lang === "th" ? "TH | en" : "th | EN"}
        </button>
      </div>
      <div className="space-y-5">
        {TOOL_CATALOG.map((group) => (
          <div key={group.category}>
            <div className="text-[9px] uppercase tracking-wider text-neutral-500 font-bold mb-2 text-center">{tr(group.category)}</div>
            <div className="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 gap-3 justify-items-center">
              {group.tools.map((t) => (
                <button
                  key={t.id}
                  onClick={() => onSelect(t.id)}
                  title={tr(t.desc)}
                  className="group flex flex-col items-center gap-1"
                >
                  <div className={`w-14 h-14 rounded-2xl bg-neutral-900 border border-neutral-700 flex items-center justify-center transition-all group-hover:scale-105 group-active:scale-95 ${CATEGORY_COLORS[group.category]}`}>
                    <ToolIcon id={t.id} className="w-6 h-6" />
                  </div>
                  <span className="text-[10px] text-neutral-400 text-center leading-tight w-16">{tr(t.name)}</span>
                </button>
              ))}
            </div>
          </div>
        ))}
      </div>
      <div className="text-[9px] text-neutral-600 mt-4 text-center leading-snug">
        {lang === "th"
          ? "เครื่องมือคำนวณเบื้องต้น — โปรดตรวจสอบกับข้อมูลผู้ผลิตและมาตรฐานที่เกี่ยวข้องก่อนใช้งานจริง"
          : "Preliminary sizing tools — confirm against manufacturer data and applicable codes before finalizing."}
      </div>
    </div>
  );
}

function ConveyorSizingCalculator() {
  const [tab, setTab] = useState(null); // null = home screen
  const [sharedCapacityTPH, setSharedCapacityTPH] = useState(20);
  const [lang, setLang] = useState("th");
  CURRENT_LANG = lang; // module-level, read by tr() everywhere on each render
  const toggleLang = () => setLang(lang === "th" ? "en" : "th");

  const currentTool = TOOL_CATALOG.flatMap((g) => g.tools).find((t) => t.id === tab);

  return (
    <div className="min-h-screen bg-neutral-950 text-neutral-100 p-4 md:p-6">
      <div className="max-w-5xl mx-auto">
        {tab === null ? (
          <ToolboxHome onSelect={setTab} lang={lang} onToggleLang={toggleLang} />
        ) : (
          <>
            <div className="flex items-center gap-3 mb-5 border-b border-neutral-800 pb-4">
              <button
                onClick={() => setTab(null)}
                className="px-3 py-1.5 rounded text-xs font-bold uppercase tracking-wide border border-neutral-700 text-neutral-300 hover:border-amber-500 hover:text-amber-400 shrink-0"
              >
                ← Toolbox
              </button>
              <div className="min-w-0 flex-1">
                <div className="text-[10px] uppercase tracking-[0.15em] text-neutral-500 font-semibold truncate">
                  {tr(TOOL_CATALOG.find((g) => g.tools.some((t) => t.id === tab))?.category)}
                </div>
                <h1 className="text-lg font-bold text-neutral-50 tracking-tight truncate">{tr(currentTool?.name)}</h1>
              </div>
              <button onClick={toggleLang} className="px-2 py-1 rounded text-[10px] font-bold border border-neutral-700 text-neutral-400 hover:border-amber-500 hover:text-amber-400 shrink-0">
                {lang === "th" ? "TH | en" : "th | EN"}
              </button>
            </div>

            {tab === "belt" ? (
              <BeltConveyorPanel capacityTPH={sharedCapacityTPH} setCapacityTPH={setSharedCapacityTPH} />
            ) : tab === "screw" ? (
              <ScrewConveyorPanel beltCapacityTPH={sharedCapacityTPH} />
            ) : tab === "silo" ? (
              <SiloHopperPanel />
            ) : tab === "tank" ? (
              <TankVesselPanel />
            ) : tab === "watertreatment" ? (
              <WaterTreatmentPanel />
            ) : tab === "boiler" ? (
              <BoilerPanel />
            ) : tab === "fuelconsumption" ? (
              <FuelConsumptionPanel />
            ) : tab === "stepgrate" ? (
              <StepGratePanel />
            ) : tab === "pressuredrop" ? (
              <SystemPressureDropPanel />
            ) : tab === "refractory" ? (
              <RefractoryPanel />
            ) : tab === "insulation" ? (
              <InsulationPanel />
            ) : tab === "specsheet" ? (
              <SpecSheetPanel />
            ) : tab === "gantt" ? (
              <GanttPanel />
            ) : tab === "steel" ? (
              <SteelPropertiesPanel />
            ) : tab === "unitconv" ? (
              <UnitConverterPanel />
            ) : tab === "bolttorque" ? (
              <BoltTorquePanel />
            ) : tab === "geometry" ? (
              <GeometryCalculator />
            ) : tab === "steamtable" ? (
              <SteamTableStandalonePanel />
            ) : tab === "motorcable" ? (
              <MotorCablePanel />
            ) : tab === "chatassistant" ? (
              <ChatAssistantPanel />
            ) : tab === "importcost" ? (
              <ImportCostPanel />
            ) : tab === "sellingprice" ? (
              <SellingPricePanel />
            ) : (
              <SignalScalingPanel />
            )}
          </>
        )}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(ConveyorSizingCalculator));
</script>
</body>
</html>
